================================================================================
                    1. VISUAL REGRESSION TESTING
================================================================================

WHAT IS VISUAL REGRESSION TESTING?
--------------------------------------------------------------------------------
Visual Regression Testing is the process of comparing the current UI screenshot
with a previously approved baseline screenshot to identify any unexpected
visual changes.

Unlike functional testing, which verifies behavior, Visual Regression Testing
ensures that the UI appearance remains unchanged.

DEFINITION:
  Visual Regression Testing verifies the visual consistency of an application
  by comparing screenshots taken during test execution against baseline images.

WHY VISUAL REGRESSION TESTING?
--------------------------------------------------------------------------------
Functional tests may pass even when the UI is broken.

Example:
Expected:
+-------------------+
|   Login Button    |
+-------------------+

Developer changes CSS:
+-------------------+
|        Login      |
|        Button     |
+-------------------+

All functional tests still pass because the button exists.
But from a user perspective, the UI is broken.

Visual Regression Testing catches these problems.

WHAT PROBLEMS CAN IT DETECT?
--------------------------------------------------------------------------------
  • Button Alignment
  • Font Changes
  • Color Changes
  • Missing Icons
  • Broken Images
  • Layout Changes
  • CSS Issues
  • Responsive Problems
  • Spacing Issues

HOW DOES PLAYWRIGHT PERFORM VISUAL TESTING?
--------------------------------------------------------------------------------
Playwright automatically captures a screenshot and compares it with a stored
baseline image.

Architecture:
Application → Current Screenshot → Baseline Screenshot → Pixel Comparison → PASS/FAIL

SCREENSHOT LIFECYCLE:
--------------------------------------------------------------------------------
First Execution:
  await expect(page).toHaveScreenshot();

  No Baseline → Capture Screenshot → Save Baseline

  Example file structure:
  tests/
    login.spec.ts
    login.spec.ts-snapshots/
      Login Page-chromium-win32.png

Second Execution:
  Current Screenshot → Baseline Screenshot → Pixel Comparison → PASS/FAIL

  If differences exist, Playwright generates:
    expected.png
    actual.png
    diff.png

SCREENSHOT vs VISUAL REGRESSION:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Screenshot                     │ Visual Regression                         │
├────────────────────────────────┼────────────────────────────────────────────┤
│ Captures image                 │ Captures + Compares                       │
│ Used for reporting             │ Used for automated verification           │
│ Never fails because UI changed │ Fails when UI changes                    │
│ page.screenshot()              │ expect().toHaveScreenshot()               │
└────────────────────────────────┴────────────────────────────────────────────┘

PAGE SCREENSHOT:
--------------------------------------------------------------------------------
await page.screenshot({ path: 'home.png' })

Purpose: Debugging, Documentation, Reports

VISUAL REGRESSION:
--------------------------------------------------------------------------------
await expect(page).toHaveScreenshot();

Purpose: UI validation

LOCATOR LEVEL SCREENSHOT:
--------------------------------------------------------------------------------
Instead of comparing the entire page:

await expect(page.locator('#loginForm')).toHaveScreenshot();

Only Login Form gets compared.

Recommended in enterprise applications.

WHY NOT COMPARE THE ENTIRE PAGE?
--------------------------------------------------------------------------------
Large applications contain:
  • Advertisements
  • Current Time
  • Notifications
  • Live Charts
  • Maps
  • Random IDs

These change every execution.

Result: False Failures.

DYNAMIC UI CHALLENGES:
--------------------------------------------------------------------------------
Dashboard contains:
  • Current Time
  • Advertisement
  • Weather Widget

Next day:
  • Advertisement Changed
  • Time Changed

Visual test fails even though application is working correctly.

SOLUTION 1 - MASK DYNAMIC ELEMENTS (★★★★★ Recommended)
--------------------------------------------------------------------------------
Mask hides unstable UI during comparison.

await expect(page).toHaveScreenshot({
    mask: [
        page.locator('.advertisement'),
        page.locator('.clock')
    ]
})

Playwright replaces masked regions with solid color before comparison.

SOLUTION 2 - STYLE INJECTION (★★★★★ Recommended)
--------------------------------------------------------------------------------
Temporarily hide elements only while taking the screenshot.

await expect(page).toHaveScreenshot({
    style: `
        .advertisement {
            visibility: hidden !important;
        }
    `
})

Useful for: Ads, Notifications, Popups

SOLUTION 3 - BLOCK ADVERTISEMENT REQUESTS (★★★★★ Recommended)
--------------------------------------------------------------------------------
Enterprise preferred approach.

await page.route('**/*doubleclick.net/**', route => route.abort())

Ads never load. Visual testing becomes stable.

SOLUTION 4 - PIXEL THRESHOLD
--------------------------------------------------------------------------------
Sometimes browser rendering differs by few pixels.

await expect(page).toHaveScreenshot({
    maxDiffPixelRatio: 0.01
})

OR

await expect(page).toHaveScreenshot({
    maxDiffPixels: 100
})

REAL-TIME USE CASES:
--------------------------------------------------------------------------------
Banking:
  Dashboard, Transfer Screen, Cards, Loan Section

Ecommerce:
  Product Details, Checkout, Cart, Offers

Healthcare:
  Patient Dashboard, Doctor Dashboard, Reports

CRM:
  Salesforce, ServiceNow, Zoho
  Lead Page, Account Page, Opportunity Page

ENTERPRISE BEST PRACTICES:
--------------------------------------------------------------------------------
  ✅ Compare stable components instead of the entire page
  ✅ Block third-party advertisements
  ✅ Mask dynamic UI
  ✅ Store baseline images in Git
  ✅ Execute visual tests in same OS
  ✅ Execute visual tests using same browser version

COMMON MISTAKES:
--------------------------------------------------------------------------------
❌ Using page.screenshot() instead of expect(page).toHaveScreenshot()

❌ Comparing pages containing Ads, Current Time, Maps, Animations without masking

❌ Running visual tests on different operating systems (rendering differs)

INTERVIEW QUESTIONS:
--------------------------------------------------------------------------------
Q1: Difference between Screenshot and Visual Regression?
  Screenshot only captures. Visual Regression captures and compares.

Q2: Why do Visual Tests fail even when application works?
  Dynamic UI: Advertisements, Time, Maps, Notifications

Q3: What is baseline image?
  The approved reference screenshot used for future comparison.

Q4: What is masking?
  Mask hides unstable regions during screenshot comparison.

Q5: Why is Locator Screenshot preferred?
  Smaller comparison area, faster, more stable, less false failures.

KEY TAKEAWAYS:
--------------------------------------------------------------------------------
  • Visual Regression validates UI appearance.
  • Baseline images are automatically created.
  • toHaveScreenshot() performs comparison.
  • page.screenshot() only captures.
  • Dynamic UI should be masked or blocked.
  • Locator-level comparison is recommended.


================================================================================
                    2. NETWORK MOCKING (page.route())
================================================================================

WHAT IS NETWORK MOCKING?
--------------------------------------------------------------------------------
Network Mocking is the process of intercepting network requests before they
reach the server and deciding how they should be handled.

Playwright provides this capability using page.route()

WHY NETWORK MOCKING?
--------------------------------------------------------------------------------
Normally:
Browser → json[response]   Server → Database → Response

Testing depends on: Backend, Database, API, Network

If backend is unavailable, UI testing stops.

Instead, Playwright can replace the backend.

INTERNAL ARCHITECTURE:
--------------------------------------------------------------------------------
Without Route:
Browser → Server → Response

With Route:
Browser → Playwright Route → Continue/Abort/Fulfill/Modify → Server

Playwright becomes a Man-In-The-Middle (MITM).

WHAT HAPPENS INTERNALLY?
--------------------------------------------------------------------------------
Browser sends request → Playwright intercepts → Your code decides:
  • Continue → Allow request to reach server
  • Abort → Stop request completely
  • Fulfill → Return mocked response
  • Modify → Change request/response

CONTINUE:
--------------------------------------------------------------------------------
Allow request to reach server.

await page.route('**/api/**', route => route.continue())

Use Case: Inspect request, Modify headers

ABORT:
--------------------------------------------------------------------------------
Stop request completely.

await page.route('**/*.png', route => route.abort())

Real-time Uses: Block Images, Videos, Advertisements, Analytics

FULFILL (Mock Response):
--------------------------------------------------------------------------------
Instead of calling backend, Playwright returns fake response.

await page.route('**/accounts', async route => {
    await route.fulfill({
        status: 200,
        contentType: 'application/json',
        body: JSON.stringify({
            records: [{ Name: "Testleaf" }]
        })
    })
})

Application believes backend returned the data.

MODIFY REQUEST:
--------------------------------------------------------------------------------
Suppose browser sends POST /login

Modify headers:
await page.route('**/login', async route => {
    const request = route.request()
    await route.continue({
        headers: {
            ...request.headers(),
            Authorization: "Bearer xyz"
        }
    })
})

SIMULATING SERVER ERRORS:
--------------------------------------------------------------------------------
await route.fulfill({
    status: 500,
    body: "Internal Server Error"
})

Verify: Error Page, Retry Button, Toast Message

SIMULATING SLOW NETWORK:
--------------------------------------------------------------------------------
await page.route('**/api/**', async route => {
    await new Promise(r => setTimeout(r, 5000))
    await route.continue()
})

Verify: Loading Spinner, Progress Bar, Skeleton Screen

MOCKING BACKEND:
--------------------------------------------------------------------------------
Real Backend:
Browser → Salesforce → Accounts

Mock Backend:
Browser → Playwright → Fake JSON → Browser

Frontend cannot distinguish the difference.

REAL-TIME USE CASES:
--------------------------------------------------------------------------------
Backend Not Ready:
  Frontend team continues testing.

Contract Testing:
  Validate UI against expected API contract.

Error Handling:
  404, 500, 401, 403

Load Testing UI:
  Simulate Slow API, Timeout, Retry

Third-party Dependency:
  Block Google Analytics, Facebook Pixel, Advertisements

page.route() vs browserContext.route():
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ page.route()                   │ browserContext.route()                     │
├────────────────────────────────┼────────────────────────────────────────────┤
│ Single Page                    │ Entire Browser Context                    │
│ One Test                       │ Framework Level                           │
│ Doesn't intercept popup        │ Intercepts popup requests                 │
│ Page Specific                  │ Global                                    │
└────────────────────────────────┴────────────────────────────────────────────┘

ENTERPRISE FRAMEWORK PATTERN:
--------------------------------------------------------------------------------
Create utility:

async function blockAds(page) {
    const adDomains = [
        '**/*doubleclick.net/**',
        '**/*googlesyndication.com/**'
    ]
    for (const domain of adDomains) {
        await page.route(domain, route => route.abort())
    }
}

Reuse across framework.

ENTERPRISE BEST PRACTICES:
--------------------------------------------------------------------------------
  ✅ Mock only unstable APIs
  ✅ Keep mock data version controlled
  ✅ Use realistic JSON
  ✅ Use route only for required APIs
  ✅ Prefer browserContext.route() for global mocks

COMMON MISTAKES:
--------------------------------------------------------------------------------
❌ Mocking every API.
  Result: Application no longer behaves realistically.

❌ Hardcoding unrealistic JSON.

❌ Forgetting route.continue() or route.fulfill()
  Requests remain stalled.

INTERVIEW QUESTIONS:
--------------------------------------------------------------------------------
Q1: What is page.route()?
  It intercepts outgoing network requests before they reach the server,
  allowing the request to be continued, aborted, modified, or fulfilled with
  a mocked response.

Q2: Why is page.route() called Network Mocking?
  Because Playwright replaces the actual backend response with a fake response,
  making the frontend believe the data came from the real server.

Q3: Difference between continue(), abort() and fulfill()?
  continue() → Send request to server
  abort() → Cancel request
  fulfill() → Return mocked response

Q4: Why is page.route() preferred for blocking advertisements?
  Because it is deterministic, framework-controlled, CI/CD friendly, does not
  depend on browser profiles or extension versions, and keeps the automation
  suite consistent across environments.

Q5: Why shouldn't we mock every API?
  Over-mocking reduces confidence in end-to-end testing and can hide
  integration issues. Mock only unstable, unavailable, or third-party services,
  while allowing core business APIs to communicate with the real backend
  whenever appropriate.

KEY TAKEAWAYS:
--------------------------------------------------------------------------------
  • page.route() intercepts network requests before they reach the server.
  • Playwright acts as a Man-In-The-Middle (MITM) between the browser and the
    server.
  • Requests can be continued, aborted, modified, or fulfilled with mocked
    responses.
  • Network Mocking enables frontend testing even when the backend is
    unavailable.
  • page.route() is widely used to block ads, simulate failures, inject test
    data, and validate UI behavior independently of backend services.
  • Use browserContext.route() for framework-wide interception and
    page.route() for page-specific scenarios.

=================================================================================
                    3. PERSISTENT CONTEXT
================================================================================

WHAT IS PERSISTENT CONTEXT?
--------------------------------------------------------------------------------
Persistent Context launches a browser using a persistent user profile.

Unlike a normal Browser Context (Incognito), the browser stores:
  • Cookies
  • Local Storage
  • Cache
  • History
  • Browser Preferences
  • Installed Extensions

between executions.

DEFINITION:
  Persistent Context creates a browser session whose state is stored on disk
  and reused across multiple executions.

WHY PERSISTENT CONTEXT?
--------------------------------------------------------------------------------
Normally:
Execution 1 → Login → Browser Closed → Everything Lost

Next execution: Login Again

Persistent Context:
Execution 1 → Login → Cookies Saved → Browser Closed
Execution 2 → Already Logged In

INTERNAL ARCHITECTURE:
--------------------------------------------------------------------------------
Browser
      │
      ▼
User Data Directory
      │
 ┌───────────────┐
 │ Cookies       │
 │ Local Storage │
 │ Cache         │
 │ History       │
 │ Extensions    │
 │ Preferences   │
 └───────────────┘

LAUNCHING PERSISTENT CONTEXT:
--------------------------------------------------------------------------------
const context = await chromium.launchPersistentContext(
    './user-data',
    { headless: false }
);

WHAT IS userDataDir?
--------------------------------------------------------------------------------
It is the folder where browser profile information is stored.

Example:
user-data/
  Cookies
  History
  Preferences
  Cache
  Extensions

WHAT GETS PERSISTED?
--------------------------------------------------------------------------------
  ✅ Cookies
  ✅ Local Storage
  ✅ Session Storage (while browser remains open)
  ✅ Cache
  ✅ Browser History
  ✅ Downloads Metadata
  ✅ Browser Preferences
  ✅ Extensions

REAL-TIME USE CASES:
--------------------------------------------------------------------------------
Login Once:
  Salesforce, Microsoft, Google
  Login only once. Reuse session.

MFA Authentication:
  Skip repeated OTP.

Browser Preferences:
  Dark Theme, Language, Zoom remain unchanged.

Browser Extensions:
  Ad Blocker, Password Manager, Developer Tools remain installed.

Notification Permission:
  Once allowed, permission remains.

PERSISTENT CONTEXT vs STORAGE STATE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Persistent Context            │ Storage State                               │
├───────────────────────────────┼────────────────────────────────────────────┤
│ Entire Browser Profile        │ Authentication Data Only                   │
│ Stores Cookies                │ Stores Cookies                             │
│ Stores Local Storage          │ Stores Local Storage                       │
│ Stores Cache                  │ No                                         │
│ Stores History                │ No                                         │
│ Stores Extensions             │ No                                         │
│ Slower                        │ Faster                                     │
│ Used for long-running profile │ Used for authentication reuse             │
└───────────────────────────────┴────────────────────────────────────────────┘

PERSISTENT INCOGNITO vs CONTEXT:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Incognito                     │ Persistent Context                          │
├───────────────────────────────┼────────────────────────────────────────────┤
│ Temporary                     │ Permanent                                   │
│ Deletes Cookies               │ Stores Cookies                              │
│ No History                    │ History Preserved                           │
│ No Extensions                 │ Extensions Supported                        │
│ Clean Session                 │ Existing Session                            │
└───────────────────────────────┴────────────────────────────────────────────┘

CAN PERSISTENT CONTEXT BLOCK ADVERTISEMENTS?
--------------------------------------------------------------------------------
Not directly.

Persistent Context simply remembers the browser profile.

However, if an Ad Block extension is installed, Persistent Context remembers it.

Example:
Persistent Context → uBlock Origin Installed → Next Launch → Ads Blocked

WHY page.route() IS PREFERRED?
--------------------------------------------------------------------------------
Enterprise teams prefer page.route() because:
  • Deterministic
  • CI Friendly
  • No Browser Dependency
  • No Extension Dependency

PERSISTENT CONTEXT EXAMPLE:
--------------------------------------------------------------------------------
const context = await chromium.launchPersistentContext(
    './profile',
    { headless: false }
);

const page = await context.newPage();

ENTERPRISE USE CASES:
--------------------------------------------------------------------------------
Salesforce, Microsoft Dynamics, SAP, Oracle, ServiceNow

Applications with:
  • SSO
  • MFA
  • Long Login Flow

BEST PRACTICES:
--------------------------------------------------------------------------------
  ✅ Use separate profile for automation
  ✅ Never use personal Chrome profile
  ✅ Close browser properly
  ✅ Store profile outside source code

COMMON MISTAKES:
--------------------------------------------------------------------------------
❌ Using default Chrome profile.
  Chrome blocks remote debugging.

❌ Sharing same profile among multiple tests.
  Profile corruption.

❌ Running parallel tests using same profile.
  Browser locks profile.

INTERVIEW QUESTIONS:
--------------------------------------------------------------------------------
Q1: What is Persistent Context?
  Persistent Context launches a browser with a reusable profile stored on disk.

Q2: What is userDataDir?
  Folder where browser session data is stored.

Q3: Difference between Persistent Context and Storage State?
  Persistent Context stores the entire browser profile.
  Storage State stores only authentication-related data.

Q4: Can Persistent Context replace Storage State?
  No. Storage State is lightweight and preferred for authentication reuse.
  Persistent Context is used when the entire browser profile must be preserved.

Q5: Can Persistent Context block advertisements?
  Not directly. It can remember installed Ad Block extensions, but enterprise
  automation prefers page.route() for deterministic request blocking.

Q6: Why can't multiple browsers use the same userDataDir simultaneously?
  Chromium locks the browser profile to prevent data corruption. Attempting to
  launch multiple browser instances with the same userDataDir results in
  profile lock conflicts.

Q7: Why shouldn't we use our personal Chrome profile?
  Chrome's security policies discourage automation of the default user profile.
  It may fail to launch, behave unpredictably, or expose personal browsing
  data. Always create a separate automation profile.

KEY TAKEAWAYS:
--------------------------------------------------------------------------------
  • Persistent Context stores the complete browser profile.
  • userDataDir is the storage location for browser state.
  • It is ideal for SSO, MFA, long login flows, browser preferences, and
    extensions.
  • It is NOT a replacement for storageState.
  • It does NOT inherently block advertisements; page.route() remains the
    preferred approach for request interception.
  • Never automate your personal Chrome profile or share the same profile
    across parallel tests.


