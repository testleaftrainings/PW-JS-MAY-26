PART 6: test.step()
================================================================================

Groups actions inside a test.

SYNTAX:
await test.step('Login', async () => { });

WHY USE IT?
--------------------------------------------------------------------------------
Improves HTML reports.

Without step:
  Create Lead

With step:
  Create Lead
      Login
      Open CRM
      Create Lead
      Verify Success

NESTED STEPS (Allowed):
await test.step('Create Lead', async () => {
    await test.step('Fill Details', async () => { });
});

RETURNING VALUES:
const id = await test.step('Get Lead Id', async () => {
    return '1001';
});

BOX OPTION:
await test.step(
    'Login',
    async () => { },
    { box: true }
);

Useful in Page Object Models to report failures at the business-step level.

INTERVIEW QUESTIONS:
• Where do you use test.step() in projects?
• Can test.step() be nested?
• What is box: true?


