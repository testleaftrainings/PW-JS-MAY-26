PART 7: HOOKS
================================================================================

Playwright provides four hooks.

┌─────────────────────────────────────────────────────────────────────────────┐
│ Hook           │ Executes                                                   │
├────────────────┼────────────────────────────────────────────────────────────┤
│ beforeAll()    │ Once before all tests                                      │
│ beforeEach()   │ Before every test                                          │
│ afterEach()    │ After every test                                           │
│ afterAll()     │ Once after all tests                                       │
└────────────────┴────────────────────────────────────────────────────────────┘

EXECUTION FLOW:
beforeAll()
    ↓
beforeEach()
    ↓
Test1
    ↓
afterEach()
    ↓
beforeEach()
    ↓
Test2
    ↓
afterEach()
    ↓
afterAll()

beforeAll():
--------------------------------------------------------------------------------
Runs once before all tests.

Used for:
  • Create shared data
  • API Authentication
  • Database setup
  • Generate token

beforeEach():
--------------------------------------------------------------------------------
Runs before every test.

Used for:
  • Login
  • Launch application
  • Navigate to Home Page

afterEach():
--------------------------------------------------------------------------------
Runs after every test.

Used for:
  • Logout
  • Screenshot on failure
  • Clean up test data
  • Close dialogs

afterAll():
--------------------------------------------------------------------------------
Runs once after all tests.

Used for:
  • Delete created data
  • Close database connections
  • Release shared resources

SCOPE:
--------------------------------------------------------------------------------
Hooks declared inside test.describe() apply only to that group.

MULTIPLE HOOKS:
--------------------------------------------------------------------------------
Hooks execute in the order they are declared.

test.beforeEach(Hook1);
test.beforeEach(Hook2);

Execution: Hook1 → Hook2 → Test

INTERVIEW QUESTIONS:
• Difference between beforeAll() and beforeEach()?
• Can hooks use fixtures?
• Can hooks be scoped to a group?
• What happens if multiple beforeEach() hooks are declared?


