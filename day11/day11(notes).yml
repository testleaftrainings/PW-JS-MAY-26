DETAILED EXPLANATIONS
================================================================================

STORAGE LIMIT:
--------------------------------------------------------------------------------
Local Storage: ~5–10 MB (depends on browser)
Session Storage: ~5 MB
Cookies: ~4 KB per cookie (20–50 cookies per domain)

LIFETIME:
--------------------------------------------------------------------------------
Local Storage: Data persists until explicitly deleted by JavaScript or user
Session Storage: Data cleared when the browser tab is closed
Cookies: Data persists until the expiry date set in the cookie (or session ends)

SHARED ACROSS TABS:
--------------------------------------------------------------------------------
Local Storage: ✅ Yes — shared across all tabs with the same origin
Session Storage: ❌ No — each tab has its own isolated storage
Cookies: ✅ Yes — shared across all tabs with the same domain/path

SENT WITH EVERY HTTP REQUEST:
--------------------------------------------------------------------------------
Local Storage: ❌ Not sent automatically (must be added manually)
Session Storage: ❌ Not sent automatically (must be added manually)
Cookies: ✅ Yes — automatically sent with every request to the domain

ACCESSIBLE VIA JAVASCRIPT:
--------------------------------------------------------------------------------
Local Storage: ✅ Yes — accessible via localStorage API
Session Storage: ✅ Yes — accessible via sessionStorage API
Cookies: ✅ Only non-HttpOnly cookies (HttpOnly cookies cannot be read by JS)

CAN BE HTTPONLY:
--------------------------------------------------------------------------------
Local Storage: ❌ No — always accessible via JavaScript
Session Storage: ❌ No — always accessible via JavaScript
Cookies: ✅ Yes — HttpOnly flag prevents JavaScript access (security)

USED FOR AUTHENTICATION:
--------------------------------------------------------------------------------
Local Storage: Sometimes — used for JWT tokens in SPA
Session Storage: Rarely — mostly used for temporary session data
Cookies: ✅ Very common — traditional session-based auth

PLAYWRIGHT storageState():
--------------------------------------------------------------------------------
Local Storage: ✅ Captured — includes all localStorage data
Session Storage: ❌ Not captured — session-specific data not persisted
Cookies: ✅ Captured — includes all cookies


================================================================================
                    PLAYWRIGHT CODE EXAMPLES
================================================================================

ACCESSING LOCAL STORAGE:
--------------------------------------------------------------------------------
// Get all localStorage items
const localStorageData = await page.evaluate(() => ({ ...localStorage }));

// Get specific item
const token = await page.evaluate(() => localStorage.getItem('authToken'));

// Set item
await page.evaluate(() => {
    localStorage.setItem('theme', 'dark');
});

ACCESSING SESSION STORAGE:
--------------------------------------------------------------------------------
// Get all sessionStorage items
const sessionData = await page.evaluate(() => ({ ...sessionStorage }));

// Get specific item
const sessionId = await page.evaluate(() => sessionStorage.getItem('sessionId'));

// Set item
await page.evaluate(() => {
    sessionStorage.setItem('cartData', JSON.stringify({ items: 3 }));
});

ACCESSING COOKIES:
--------------------------------------------------------------------------------
// Get all cookies
const cookies = await context.cookies();

// Get cookies for a specific URL
const cookies = await context.cookies(['https://example.com']);

// Get specific cookie
const cookies = await context.cookies();
const authCookie = cookies.find(c => c.name === 'session_id');


================================================================================
                    INTERVIEW QUESTION & ANSWER
================================================================================

Q: Why do we use ...localStorage inside page.evaluate()?

A: localStorage is a browser Storage object, not a plain JavaScript object.
   Playwright can only transfer serializable values from the browser context
   back to the Node.js test context.

   localStorage is a special browser object with methods like getItem(), setItem(),
   and removeItem(). It is NOT a plain object with key-value pairs directly
   enumerable in a standard JavaScript way.

   Using the spread operator (...localStorage) copies all key-value pairs into
   a new plain object, making the data serializable and easy to inspect or use
   in the test.

EXPLANATION:
--------------------------------------------------------------------------------
// ❌ This returns a Storage object (not directly usable in Node.js)
const storage = await page.evaluate(() => localStorage);
console.log(storage); // Storage object with methods

// ✅ This returns a plain serializable object
const storage = await page.evaluate(() => ({ ...localStorage }));
console.log(storage); // { 'key1': 'value1', 'key2': 'value2' }

// ✅ Alternative: JSON.stringify
const storage = await page.evaluate(() => JSON.stringify(localStorage));
const data = JSON.parse(storage);

WHY SERIALIZATION MATTERS:
--------------------------------------------------------------------------------
Playwright uses a process called "serialization" to transfer data between:
  • Browser context (where page.evaluate() runs)
  • Node.js context (where your test runs)

Only JSON-serializable values can be transferred:
  ✓ Strings, Numbers, Booleans, null
  ✓ Arrays and Objects (plain key-value)
  ✗ Functions (cannot be serialized)
  ✗ DOM Elements (cannot be serialized)
  ✗ Special objects like Storage (cannot be serialized directly)

COMMON PATTERN:
--------------------------------------------------------------------------------
// Get both localStorage and cookies in one go
const state = await page.evaluate(() => ({
    localStorage: { ...localStorage },
    sessionStorage: { ...sessionStorage }
}));


