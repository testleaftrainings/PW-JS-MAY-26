                    PLAYWRIGHT TEST ORGANIZATION, ANNOTATIONS & HOOKS
================================================================================


PART 1: INTRODUCTION TO PLAYWRIGHT TEST STRUCTURE
================================================================================

A Playwright test file is generally organized as follows:

import { test, expect } from '@playwright/test';

test.describe('Feature Name', () => {

    // Variables

    test.beforeAll(async () => {
        // Runs once before all tests in this describe block
    });

    test.beforeEach(async ({ page }) => {
        // Runs before every test in this describe block
    });

    test('Test Case 1', async ({ page }) => {
        // Test implementation
    });

    test('Test Case 2', async ({ page }) => {
        // Test implementation
    });

    test.afterEach(async () => {
        // Runs after every test in this describe block
    });

    test.afterAll(async () => {
        // Runs once after all tests in this describe block
    });

});

This structure is followed in most enterprise Playwright frameworks.


================================================================================
PART 2: test.describe()
================================================================================

WHAT IS IT?
--------------------------------------------------------------------------------
test.describe() groups related test cases into a logical suite.

test.describe('Lead Management', () => {
    test('Create Lead', async () => { });
    test('Edit Lead', async () => { });
});

WHY DO WE USE IT?
--------------------------------------------------------------------------------
• Organize tests by feature/module
• Scope hooks (beforeAll, beforeEach, etc.)
• Apply common tags and annotations
• Improve report readability

CAN WE NEST test.describe()?
--------------------------------------------------------------------------------
✅ YES.

test.describe('Lead Module', () => {
    test.describe('Create Lead', () => {
        test('Mandatory Fields');
        test('Optional Fields');
    });
});

CAN WE NEST test()?
--------------------------------------------------------------------------------
❌ NO.

test('Create Lead', async () => {
    test('Delete Lead');   // Invalid
});

Reason: Playwright discovers all tests before execution. Tests cannot be created
dynamically during another test.

INTERVIEW QUESTION:
Q: Can we nest one test() inside another?
A: No. Only test.describe() supports nesting.


================================================================================
PART 3: PLAYWRIGHT ANNOTATIONS
================================================================================

Annotations control test execution or add metadata to reports.

BUILT-IN ANNOTATIONS:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Annotation     │ Purpose                                                    │
├────────────────┼────────────────────────────────────────────────────────────┤
│ test.only()    │ Run only selected tests                                    │
│ test.skip()    │ Skip a test                                                │
│ test.fail()    │ Expected to fail                                           │
│ test.fixme()   │ Known broken test (does not execute)                      │
│ test.slow()    │ Triple the timeout                                         │
└────────────────┴────────────────────────────────────────────────────────────┘

test.only():
--------------------------------------------------------------------------------
Runs only the focused test.

test.only('Create Lead', async () => { });

test.skip():
--------------------------------------------------------------------------------
Skips execution.

test.skip('Delete Lead', async () => { });

Conditional Skip:
test('Delete Lead', async ({ browserName }) => {
    test.skip(browserName === 'firefox');
});

test.fail():
--------------------------------------------------------------------------------
Runs the test but expects it to fail.

test.fail('Known Bug', async () => { });

test.fixme():
--------------------------------------------------------------------------------
Marks a test as broken. The test will NOT execute.

test.fixme('Feature under development', async () => { });

test.slow():
--------------------------------------------------------------------------------
Triples the timeout for this test.

test.slow();
test('Large File Upload', async () => { });

DIFFERENCE BETWEEN skip, fail, fixme:
┌─────────────────────────────────────────────────────────────────────────────┐
│ skip            │ fail                │ fixme                              │
├─────────────────┼─────────────────────┼────────────────────────────────────┤
│ Doesn't execute │ Executes            │ Doesn't execute                    │
│ Not applicable  │ Expected failure    │ Known broken feature               │
└─────────────────┴─────────────────────┴────────────────────────────────────┘

INTERVIEW QUESTIONS:
• Difference between skip, fail, and fixme?
• When would you use test.fail() instead of test.skip()?


