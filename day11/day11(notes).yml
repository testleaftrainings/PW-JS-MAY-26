│ Shared Across Tabs           │ ✅ Yes        │ ❌ No           │ ✅ Yes     │
│                              │ (same origin) │ (per tab)       │ (same do-  │
│                              │               │                 │ main/path) │
│ Sent with Every HTTP Request │ ❌ No         │ ❌ No           │ ✅ Yes     │
│ Accessible via JavaScript    │ ✅ Yes        │ ✅ Yes          │ ✅ Only    │
