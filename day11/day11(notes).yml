PART 4: TAGS
================================================================================

Tags categorize tests.

SYNTAX:
test('Create Lead', { tag: '@smoke' }, async () => { });

Multiple tags:
tag: ['@smoke', '@regression']

RUN TAGGED TESTS:
npx playwright test --grep @smoke

EXCLUDE TAGS:
npx playwright test --grep-invert @smoke

GROUP TAGS:
test.describe(
    'Lead Module',
    { tag: '@crm' },
    () => {
        // Every test inherits the tag
    }
);

INTERVIEW QUESTIONS:
• What is the purpose of tags?
• How do you execute only Smoke tests?


