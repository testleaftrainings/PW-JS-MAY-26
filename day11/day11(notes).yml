PART 9: ENTERPRISE PROJECT STRUCTURE
================================================================================

LeadManagement.spec.ts

test.describe('Lead Module')
        │
        ├── Tags (@crm, @regression)
        ├── Annotations (JIRA, TC, etc.)
        ├── Variables (shared test data)
        ├── beforeAll() (Setup: API auth, generate token)
        ├── beforeEach() (Login, navigate to page)
        ├── Test 1 (Create Lead)
        ├── Test 2 (Edit Lead)
        ├── Test 3 (Delete Lead)
        ├── afterEach() (Cleanup, screenshot on failure)
        └── afterAll() (Delete created data, close connections)


