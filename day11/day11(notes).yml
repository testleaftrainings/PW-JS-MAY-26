    'Create Lead',
    {
        annotation: {
            type: 'issue',
            description: 'JIRA-101'
        }
    },
    async () => { }
);

RUNTIME ANNOTATION:
testInfo.annotations.push({
    type: 'test_case',
    description: 'TC-101'
});

