PART 8: MAPPING TESTNG TO PLAYWRIGHT
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ TestNG               │ Playwright                                           │
├──────────────────────┼──────────────────────────────────────────────────────┤
│ @BeforeSuite         │ Global Setup (globalSetup.ts)                        │
│ @AfterSuite          │ Global Teardown (globalTeardown.ts)                  │
│ @BeforeTest          │ beforeAll()                                          │
│ @AfterTest           │ afterAll()                                           │
│ @BeforeClass         │ beforeAll()                                          │
│ @AfterClass          │ afterAll()                                           │
│ @BeforeMethod        │ beforeEach()                                         │
│ @AfterMethod         │ afterEach()                                          │
│ @Test                │ test()                                               │
│ enabled = false      │ test.skip()                                          │
│ priority             │ Not supported                                        │
│ DataProvider         │ Arrays + forEach() / test.describe.parallel()        │
└──────────────────────┴──────────────────────────────────────────────────────┘


