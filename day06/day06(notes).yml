================================================================================
PART 3: FRAMES INTRODUCTION
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
A Page can have one or more Frame objects attached to it. Each page has a main
frame and page-level interactions (like click) are assumed to operate in the
main frame.

A page can have additional frames attached with the iframe HTML tag. These
frames can be accessed for interactions inside the frame.

EXAMPLE - Interacting with elements inside a frame:
--------------------------------------------------------------------------------
// Locate element inside frame
const username = await page.frameLocator('.frame-class').getByLabel('User Name');
await username.fill('John');


FRAME OBJECTS API:
--------------------------------------------------------------------------------
One can access frame objects using the page.frame() API:

// Get frame using the frame's name attribute
const frame = page.frame('frame-login');

// Get frame using frame's URL
const frame = page.frame({ url: /.*domain.*/ });


FRAME LOCATOR VS PAGE.FRAME()
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Method                      │ Description                                    │
├─────────────────────────────┼────────────────────────────────────────────────┤
│ page.frameLocator()         │ Returns a FrameLocator object for chaining     │
│                             │ element lookups inside the iframe             │
├─────────────────────────────┼────────────────────────────────────────────────┤
│ page.frame()                │ Returns a Frame object by name or URL          │
│                             │ Used for direct frame access                  │
└─────────────────────────────┴────────────────────────────────────────────────┘

EXAMPLE WITH FRAMELOCATOR:
--------------------------------------------------------------------------------
const frame = page.frameLocator('#payment-iframe');
await frame.getByRole('button', { name: 'Submit' }).click();

EXAMPLE WITH PAGE.FRAME():
--------------------------------------------------------------------------------
const frame = page.frame('payment-frame');
await frame.locator('#submit').click();

================================================================================
                    FRAME vs FRAMES vs FRAMELOCATOR IN PLAYWRIGHT
================================================================================

INTRODUCTION
================================================================================

This is one of the most confusing topics for Selenium users because Playwright
provides 3 different APIs.

Think of it like this:

┌─────────────────────────────────────────────────────────────────────────────┐
│ Method                    │ Purpose                                         │
├───────────────────────────┼─────────────────────────────────────────────────┤
│ frameLocator()            │ I know the frame locator and want to work       │
│                           │ inside it                                       │
├───────────────────────────┼─────────────────────────────────────────────────┤
│ frame()                   │ I want a specific Frame object                  │
├───────────────────────────┼─────────────────────────────────────────────────┤
│ frames()                  │ I want all Frame objects available on the page  │
└───────────────────────────┴─────────────────────────────────────────────────┘


================================================================================
1. page.frameLocator()
================================================================================

WHAT IT IS:
--------------------------------------------------------------------------------
Returns: FrameLocator

Used to:
  Locate a frame → Locate elements inside the frame → Perform actions

WHEN TO USE:
--------------------------------------------------------------------------------
✅ Most automation scenarios
✅ Interacting with elements inside a frame
✅ Recommended by Playwright

HOW TO USE:
--------------------------------------------------------------------------------
HTML:
<iframe id="loginFrame">

Code:
await page
    .frameLocator('#loginFrame')
    .locator('#username')
    .fill('admin');

WHY PLAYWRIGHT RECOMMENDS IT:
--------------------------------------------------------------------------------
Benefits:
  • Auto Waiting
  • Auto Retry
  • Strict Mode
  • Lazy Evaluation

Same benefits as Locator.

REAL PROJECT EXAMPLE:
--------------------------------------------------------------------------------
await page
    .frameLocator('#paymentFrame')
    .getByPlaceholder('Card Number')
    .fill('123456789');


================================================================================
2. page.frame()
================================================================================

WHAT IT IS:
--------------------------------------------------------------------------------
Returns: Frame | null

Used to fetch a specific frame object.

WHEN TO USE:
--------------------------------------------------------------------------------
✅ Need frame metadata
✅ Need frame name/url
✅ Need to store frame in a variable
✅ Dynamic frame handling

HOW TO USE:
--------------------------------------------------------------------------------

By Name:
const frame = page.frame({
    name: 'loginFrame'
});

By URL:
const frame = page.frame({
    url: /login/
});

Then:
await frame?.locator('#username')
            .fill('admin');

REAL PROJECT EXAMPLE:
--------------------------------------------------------------------------------
Suppose:
  • Frame Name changes
  • Frame URL remains constant

const frame = page.frame({
    url: /payment/
});

Now work inside it.


================================================================================
3. page.frames()
================================================================================

WHAT IT IS:
--------------------------------------------------------------------------------
Returns: Frame[]

Array of all frames on the page.

WHEN TO USE:
--------------------------------------------------------------------------------
✅ Debugging
✅ Frame discovery
✅ Unknown frame names
✅ Interview demonstrations

HOW TO USE:
--------------------------------------------------------------------------------
const frames = page.frames();
console.log(frames.length);

Output:
4

Meaning:
  • Main Frame
  • Frame 1
  • Frame 2
  • Frame 3

ITERATE ALL FRAMES:
--------------------------------------------------------------------------------
for(const frame of page.frames()){
    console.log(frame.name());
    console.log(frame.url());
}

Output:
main
https://app.com

paymentFrame
https://payment.com

chatFrame
https://chat.com


================================================================================
COMPARISON TABLE
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ frameLocator() │ frame()    │ frames()         │
├────────────────────────────┼────────────────┼────────────┼──────────────────┤
│ Return Type                │ FrameLocator   │ Frame|null │ Frame[]          │
│ Recommended                │ ✅ Yes         │ ⚠️ Sometimes│ ⚠️ Rarely       │
│ Auto Waiting               │ ✅ Yes         │ ❌ No      │ ❌ No            │
│ Auto Retry                 │ ✅ Yes         │ ❌ No      │ ❌ No            │
│ Locator Chaining           │ ✅ Yes         │ ❌ No      │ ❌ No            │
│ Interact Inside Frame      │ ✅ Best Choice │ ✅ Possible│ ❌ Need Frame    │
│ Get Frame Metadata         │ ❌ No          │ ✅ Yes     │ ✅ Yes           │
│ Discover All Frames        │ ❌ No          │ ❌ No      │ ✅ Yes           │
└────────────────────────────┴────────────────┴────────────┴──────────────────┘


================================================================================
SELENIUM MAPPING
================================================================================

SELENIUM:
--------------------------------------------------------------------------------
driver.switchTo().frame("frame1");
driver.findElement(...)

PLAYWRIGHT:
--------------------------------------------------------------------------------
page.frameLocator('#frame1')
    .locator(...)

No switching required!


================================================================================
QUICK DECISION GUIDE
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Scenario                                    │ Use This                      │
├─────────────────────────────────────────────┼────────────────────────────────┤
│ I need to click a button inside an iframe   │ frameLocator() ✅              │
│ I need to know the name of a frame          │ frame() ✅                     │
│ I need to get all frames on the page        │ frames() ✅                    │
│ I'm writing a new test                      │ frameLocator() ✅              │
│ I need frame URL for debugging              │ frame() ✅                     │
│ I don't know frame name or locator          │ frames() to discover first    │
└─────────────────────────────────────────────┴────────────────────────────────┘


================================================================================
ONE-LINE TAKEAWAY (INTERVIEW READY)
================================================================================

"Use frameLocator() for interacting with elements inside iframes as it provides
auto-waiting and retry capabilities. Use frame() when you need frame metadata
like name or URL. Use frames() for debugging or discovering all frames on a page."


PART 4: ALERT HANDLING IN PLAYWRIGHT - DEEP DIVE
================================================================================


FIRST UNDERSTAND WHAT AN ALERT IS
================================================================================

JavaScript Alerts are Browser Native Dialogs.

Examples:
--------------------------------------------------------------------------------
alert("Hello");
confirm("Are you sure?");
prompt("Enter your name");

These are NOT HTML elements.

They belong to:
  Browser Process

NOT to:
  DOM or Render Process


BROWSER ARCHITECTURE RELATION
================================================================================

When this executes:
alert("Hello");

Flow:
--------------------------------------------------------------------------------
Application JS
      ↓
Render Process
      ↓
Browser Process
      ↓
Native Dialog Appears

At this moment:
  • DOM becomes blocked
  • User interaction stops
  • JavaScript execution pauses

This is how browser dialogs work.


WHY CAN'T LOCATOR HANDLE ALERTS?
================================================================================

Many beginners try:
  page.locator("alert")
or
  page.getByText("OK")

This will NEVER work.

Reason:
  Alert is NOT part of DOM

It belongs to Browser Process.
Inspect Element won't show it.


 page.on()
================================================================================

page.on("dialog", async (alert) => {
  // handler
})

WHAT IS page.on()?
--------------------------------------------------------------------------------
It is an Event Listener.

Syntax:
  page.on(eventName, callback)

Similar to:
  button.addEventListener("click", callback)


