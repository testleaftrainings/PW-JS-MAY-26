                             2. PLAYWRIGHT CLI 
================================================================================


1. WHAT IS PLAYWRIGHT CLI?
================================================================================

Playwright CLI is a command-line interface developed by the Playwright team to
help AI coding agents (such as GitHub Copilot and Claude Code) interact with
web applications efficiently.

Instead of exposing browser actions through the Model Context Protocol (MCP),
Playwright CLI provides lightweight command-line operations that reduce token
consumption and improve performance for AI-assisted development.


2. PURPOSE OF PLAYWRIGHT CLI
================================================================================

Playwright CLI enables AI agents to:
  • Launch browsers
  • Navigate to web applications
  • Inspect web pages
  • Capture page snapshots
  • Discover elements
  • Generate accurate locators
  • Capture screenshots
  • Assist in generating Playwright automation

It is designed to improve AI-assisted browser interaction while keeping
communication lightweight.


3. ARCHITECTURE
================================================================================

Developer
      │
      ▼
GitHub Copilot Agent
      │
      ▼
Playwright CLI
      │
      ▼
Browser

The Copilot Agent decides what to do, while Playwright CLI performs the browser
interactions.


