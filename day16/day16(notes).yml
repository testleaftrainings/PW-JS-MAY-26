                    GITHUB ACTIONS WITH PLAYWRIGHT 
================================================================================


1. THE STORY BEHIND GITHUB ACTIONS AND PLAYWRIGHT
================================================================================

Before learning GitHub Actions, it is important to understand WHY Microsoft
built Playwright and how GitHub Actions fits into the automation ecosystem.

THE EVOLUTION OF CI/CD:
--------------------------------------------------------------------------------
As software development evolved, manually building, testing, and deploying
applications became inefficient. Organizations started adopting Continuous
Integration (CI) and Continuous Deployment (CD) pipelines to automate these
activities.

Several CI/CD tools emerged:
  • Jenkins
  • GitHub Actions
  • GitLab CI/CD
  • CircleCI
  • Bamboo
  • Azure DevOps Pipelines[microsoft]--> Pipeline,repos,plan,..etc

These tools automate repetitive tasks such as building applications, executing
automated tests, generating reports, and deploying software.

CLOUD BROWSER EXECUTION BECAME THE FUTURE:
--------------------------------------------------------------------------------
Around a decade ago, executing browser automation tests on local machines
became increasingly difficult due to:
  • Multiple browser versions
  • Multiple operating systems
  • Device compatibility
  • Infrastructure maintenance

Companies started moving browser execution to the cloud.

Leaders in this space:
  • Sauce Labs
  • BrowserStack
  • LambdaTest

These platforms provided cloud-hosted browsers where Selenium automation
scripts could be executed without maintaining local infrastructure.

MICROSOFT'S PERSPECTIVE:
--------------------------------------------------------------------------------
Microsoft observed that browser automation workloads were continuously
increasing. Since Microsoft owns Azure, it wanted browser execution workloads
to run within its own cloud ecosystem instead of depending entirely on
third-party services.

Rather than simply integrating with existing tools, Microsoft wanted complete
control over:
  • Browser automation
  • Cloud execution
  • Developer experience
  • CI/CD integration

WHY NOT CONTINUE WITH SELENIUM?
--------------------------------------------------------------------------------
Selenium was already the industry-standard automation framework. However,
Selenium was designed as a browser automation protocol rather than a modern
automation framework.

Microsoft wanted something that could provide:
  • Faster execution
  • Better stability
  • Modern APIs
  • Built-in waiting mechanisms
  • Better developer productivity

WHY NOT CYPRESS?
--------------------------------------------------------------------------------
Microsoft also evaluated Cypress. Although Cypress provided an excellent
developer experience, Microsoft wanted a framework that:
  • Supported multiple browsers equally
  • Could automate modern enterprise applications
  • Supported multiple tabs and windows
  • Worked across Chromium, Firefox, and WebKit
  • Could be completely open source

BUILDING PLAYWRIGHT:
--------------------------------------------------------------------------------
Microsoft hired experienced browser engineers, including developers who had
previously worked on Chromium-related projects.

The goal was simple: Build a modern browser automation framework designed for
today's web applications.

This framework eventually became Playwright.

Playwright introduced:
  • Auto Waiting
  • Auto Retry
  • Cross-browser support
  • Cross-platform execution
  • Faster execution
  • Reliable locators
  • Better debugging capabilities

GITHUB + PLAYWRIGHT:
--------------------------------------------------------------------------------
Microsoft also owns GitHub.

Instead of asking developers to install dedicated CI servers like Jenkins,
Microsoft integrated Playwright directly with GitHub Actions.

This created a complete ecosystem:
  • Source Code → GitHub
  • Automation → Playwright
  • CI/CD → GitHub Actions
  • Cloud → Azure

Everything works together seamlessly.


2. WHAT IS GITHUB ACTIONS?
================================================================================

GitHub Actions is GitHub's built-in Continuous Integration and Continuous
Deployment (CI/CD) platform.

It automates software development workflows whenever specific events occur
inside a GitHub repository.

Examples include:
  • Code Push
  • Pull Request
  • Scheduled Execution
  • Manual Execution

Instead of manually executing Playwright tests after every code change, GitHub
Actions performs these tasks automatically.


3. WHY USE GITHUB ACTIONS?
================================================================================

GitHub Actions provides several advantages:
  • No additional CI server installation
  • Direct integration with GitHub repositories
  • Cloud-hosted execution
  • Automatic Playwright test execution
  • Easy artifact management
  • Supports Linux, Windows, and macOS
  • Highly scalable
  • Free usage for public repositories


4. CI/CD PIPELINE TOOLS
================================================================================

Popular CI/CD tools include:
  • Jenkins
  • GitHub Actions
  • GitLab CI/CD
  • CircleCI
  • Bamboo
  • Azure DevOps Pipelines

Among these, GitHub Actions is widely adopted because it is built directly into
GitHub and requires minimal configuration.


5. PREREQUISITES
================================================================================

Before using GitHub Actions:
  • Create a GitHub account
  • Create a GitHub repository (preferably Public for learning)
  • Install Git
  • Install Visual Studio Code
  • Install Node.js
  • Create or clone a Playwright project


6. CONNECT VS CODE WITH GITHUB REPOSITORY
================================================================================

Initialize Git:
git init

Add the remote repository:
git remote add origin https://github.com/<username>/<repository>.git

Verify the connection:
git remote -v


7. CREATE THE GITHUB WORKFLOW
================================================================================

Inside the project create the following directory structure:

.github/
    workflows/
        playwright.yml

Every workflow is stored inside the .github/workflows directory.


8. WHAT IS A WORKFLOW?
================================================================================

A Workflow is a YAML configuration file that defines the automation process.

It specifies:
  • When the workflow should execute
  • Where it should execute
  • What steps should be performed

Example:
name: Playwright Tests


9. WORKFLOW COMPONENTS
================================================================================

A GitHub Actions workflow consists of five fundamental components:

WORKFLOW:
  The automation definition.

EVENT:
  The trigger that starts the workflow.
  Example: on: push:

JOB:
  A collection of related tasks executed on the same machine.
  Example: jobs:

RUNNER:
  The virtual machine where the job executes.
  Example: runs-on: ubuntu-latest

STEPS:
  Individual actions or commands executed sequentially.
  Example: steps:


10. PLAYWRIGHT WORKFLOW
================================================================================

A typical Playwright workflow performs the following tasks:
  1. Checkout Repository
  2. Install Node.js
  3. Install Dependencies
  4. Install Playwright Browsers
  5. Execute Tests
  6. Generate HTML Report
  7. Upload Report

Example:
name: Playwright Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/


11. PUSH CODE TO GITHUB
================================================================================

Commit the changes:
git add .
git commit -m "Added GitHub Actions workflow"

Push the code:
git push -u origin main

Every subsequent push automatically triggers the workflow.


12. WHAT HAPPENS AFTER A PUSH?
================================================================================

Once code is pushed:

Developer
      │
      ▼
Git Push
      │
      ▼
GitHub Repository
      │
      ▼
GitHub detects the Push Event
      │
      ▼
GitHub Actions starts the Workflow
      │
      ▼
Creates a Virtual Machine (Runner)
      │
      ▼
Checks out the Repository
      │
      ▼
Installs Node.js
      │
      ▼
Installs Project Dependencies
      │
      ▼
Installs Playwright Browsers
      │
      ▼
Executes Playwright Tests
      │
      ▼
Generates HTML Report
      │
      ▼
Uploads Report as an Artifact


13. VIEWING THE RESULTS
================================================================================

Navigate to:
Repository → Actions

Open the latest workflow execution.

You can inspect:
  • Checkout logs
  • Dependency installation logs
  • Browser installation logs
  • Test execution logs
  • Failed test details
  • Passed test details


14. DOWNLOADING REPORTS
================================================================================

After the workflow completes successfully:
Actions → Workflow Run → Artifacts → playwright-report.zip

Download the ZIP file. Extract it. Open index.html to view the Playwright
HTML Report.


15. REAL-WORLD USE CASE
================================================================================

In a real software project, every code push automatically triggers validation
through GitHub Actions.

The process is as follows:
  1. A developer writes Playwright automation scripts
  2. The code is committed and pushed to the GitHub repository
  3. GitHub detects the push event
  4. GitHub Actions provisions a fresh virtual machine (runner)
  5. The latest source code is checked out
  6. Node.js and project dependencies are installed
  7. Playwright browsers are installed
  8. The Playwright test suite is executed
  9. HTML reports are generated
  10. Reports are uploaded as artifacts for the team to review

This ensures that every code change is validated automatically, improving code
quality, reducing manual effort, and enabling faster feedback.

