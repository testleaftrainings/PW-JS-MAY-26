================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ GitHub Copilot Agent         │ Playwright CLI                              │
├───────────────────────────────┼─────────────────────────────────────────────┤
│ AI reasoning engine          │ Browser interaction tool                    │
│ Understands natural language │ Executes browser commands                   │
│ Generates Playwright code    │ Inspects live web pages                     │
│ Creates files                │ Does not generate project files             │
│ Plans workflow               │ Returns browser state and snapshots         │
│ Fixes code                   │ Provides browser information                │
└───────────────────────────────┴─────────────────────────────────────────────┘

KEY POINT:
Copilot Agent is the BRAIN, while Playwright CLI acts as the BROWSER
INTERACTION LAYER.


