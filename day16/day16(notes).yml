================================================================================
                         SONICFRAMEWORK - COMPLETE OVERVIEW
================================================================================


OVERVIEW [2-3 MINS]
================================================================================

The Sonicframework is a robust, enterprise-grade test automation framework
built on modern tools and best practices.

CORE TECHNOLOGIES:
--------------------------------------------------------------------------------
1. Node.js & Playwright:
   Core automation engine used throughout the framework for browser control
   and API requests.

2. TypeScript:
   Primary language ensuring strong typing and modern JavaScript features.

3. @playwright/test (Test Runner):
   Executes tests with powerful configuration and parallelization.

4. Faker & CSV Utils:
   Generate and read test data from external sources such as CSV and JSON.

5. Allure Reporter:
   Generates detailed reports; integration via custom reporter config.

6. fs-extra:
   Advanced file handling for screenshots, logs and temporary artifacts.

7. Page Object Model:
   Encapsulates UI interactions representing web pages as classes.

8. CI/CD Tooling:
   Git for version control, AZURE for CI/CD.


COMPONENTS (LAYERED ARCHITECTURE)
================================================================================

The Sonicframework is structured around a few key packages and utility modules,
mirroring a layered architecture.

PROJECT STRUCTURE:
--------------------------------------------------------------------------------
helpers/
  └── PlaywrightWrapper      Base class with common UI actions
  └── fakerUtils             Data generation utilities
  └── csv, json, db utils    File and database helpers

pages/
  └── SalesforceLoginPage    Page Object for Login screen
  └── SalesforceHomePage     Page Object for Home screen
  └── SalesforceLeadPage     Page Object for Lead management
  (Each page extends PlaywrightWrapper)

customFixtures/
  └── salesForceFixture      Playwright fixtures defining test-scoped
                             objects; injects page classes into tests

tests/
  └── *.spec.ts              Test files using custom fixtures and
                             Playwright's test runner

constants/
  └── Static data such as URLs, credentials and configuration values

data/
  └── *.json, *.csv          Test data files
  └── *.interface.ts         TypeScript interfaces for test data

reporter/
  └── Custom reporters or configuration for Allure


THIRD-PARTY LIBRARIES USED:
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Library                    │ Purpose                                        │
├────────────────────────────┼────────────────────────────────────────────────┤
│ Playwright                 │ Core automation engine for browser/HTTP       │
│                            │ interactions                                   │
│ TypeScript                 │ Language for strong typing                     │
│ @playwright/test           │ Test runner with fixtures and reporters       │
│ Allure Playwright reporter │ For detailed test reports                     │
│ faker                      │ Generates randomized test data                │
│ fs-extra                   │ Advanced filesystem operations, screenshot    │
│                            │ handling                                       │
│ axios                      │ For REST API calls in helpers if needed       │
└────────────────────────────┴────────────────────────────────────────────────┘


OBJECT ORIENTED PROGRAMMING IMPLEMENTATION
================================================================================

Sonicframework heavily leverages OOP principles:

1. INHERITANCE:
--------------------------------------------------------------------------------
  • Page classes extend from PlaywrightWrapper which provides shared methods
    (click, type, loadApp, etc.)
  • Fixture classes instantiate pages by passing page and context objects

2. ABSTRACTION:
--------------------------------------------------------------------------------
  • PlaywrightWrapper is abstract; some methods such as getNewPage() hide
    browser internals
  • Interfaces like data models (account.interface.ts) define contracts

3. POLYMORPHISM:
--------------------------------------------------------------------------------
  • Several overloaded helper methods (e.g. type, click variants)
  • Overridden methods in derived page classes
  • Custom fixtures demonstrate overriding default behaviors in tests

4. ENCAPSULATION:
--------------------------------------------------------------------------------
  • Private fields in wrapper classes and controlled accessors
  • Selectors stored as object literals inside page classes


SUPPORT FOR S.O.L.I.D PRINCIPLES
================================================================================

The framework was designed with SOLID principles in mind:

1. SINGLE RESPONSIBILITY:
--------------------------------------------------------------------------------
  Each class has one responsibility:
  • Wrappers handle browser interactions
  • Page classes model specific screens
  • Fixtures manage object creation
  • Helpers provide utility functions

2. OPEN/CLOSED:
--------------------------------------------------------------------------------
  • New page classes or utilities can be added without modifying existing code
  • The abstract PlaywrightWrapper is closed for modification but open for
    extension via subclassing

3. LISKOV SUBSTITUTION:
--------------------------------------------------------------------------------
  • Any subclass of PlaywrightWrapper (e.g. SalesforceLoginPage) can be used
    wherever the base type is expected
  • Methods behave consistently

4. INTERFACE SEGREGATION:
--------------------------------------------------------------------------------
  • Consumers depend only on the methods they use
  • Page objects expose only relevant actions, not a bloated common interface

5. DEPENDENCY INVERSION:
--------------------------------------------------------------------------------
  • High-level test logic depends on abstractions (page interfaces) rather than
    concrete Playwright implementations
  • Fixtures invert dependency by providing page instances to tests rather than
    tests creating them


EXECUTION FLOW (PLAYWRIGHT + FIXTURES)
================================================================================

1. TEST ENTRY:
--------------------------------------------------------------------------------
  Each *.spec.ts file imports the test object from customFixtures/salesForceFixture

  import { test } from "../customFixtures/salesForceFixture";

2. FIXTURE SETUP:
--------------------------------------------------------------------------------
  Before each test, Playwright provides a fresh page and context.
  The custom fixture extension instantiates page objects (login, home, lead,
  etc.) and makes them available as parameters.

3. TEST STEPS:
--------------------------------------------------------------------------------
  Inside the test callback, methods on the page objects are called.
  Example: SalesforceHome.salesforceLogin('ADMINLOGIN')

4. ANNOTATIONS & REPORTING:
--------------------------------------------------------------------------------
  Tests add metadata via test.info().annotations.push() for author, case IDs,
  etc. The playwright.config.ts defines reporters including Allure.

5. LIFECYCLE HOOKS:
--------------------------------------------------------------------------------
  Playwright provides test.beforeAll, test.afterEach, test.afterAll hooks.
  The fixture file contains commented examples for login and Jira integration.
  Global setup (if used) can prepare browser context.

6. DATA PROVISION:
--------------------------------------------------------------------------------
  Data comes from fakerUtils or static JSON/CSV files read via helper
  utilities.

7. RESULT GENERATION:
--------------------------------------------------------------------------------
  On completion, Playwright's reporters produce HTML and Allure reports;
  screenshots/logs are collected via helpers.


