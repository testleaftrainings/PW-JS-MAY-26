7. RELATIONSHIP BETWEEN PLAYWRIGHT CLI AND PLAYWRIGHT TEST
================================================================================

A Playwright automation project still requires:

npm init playwright@latest

This creates:
  • package.json
  • playwright.config.ts
  • tests/
  • node_modules/

Playwright CLI is NOT a replacement for Playwright Test.

Instead, it helps AI agents inspect the application and generate better
automation code for your Playwright project.


8. INSTALLATION
================================================================================

CREATE A PLAYWRIGHT PROJECT:
--------------------------------------------------------------------------------
npm init playwright@latest

UPDATE PLAYWRIGHT:
--------------------------------------------------------------------------------
npm install -D @playwright/test@latest

INSTALL PLAYWRIGHT CLI (GLOBAL):
--------------------------------------------------------------------------------
npm install -g @playwright/cli@latest

> Alternatively, you can invoke it using npx without installing it globally.


