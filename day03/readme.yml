## Arrays

### Key Concepts

• Arrays store multiple values in a single variable.
• Arrays are dynamic and can grow or shrink at runtime.
• Indexing starts from 0.
• Arrays can store mixed data types.

### Important Operations

• Add elements
• Remove elements
• Search elements
• Sort elements
• Transform data
• Filter data
• Aggregate data

### Common Methods

• push()
• pop()
• shift()
• unshift()
• splice()
• slice()
• sort()
• forEach()
• map()
• filter()
• find()
• reduce()

### Interview Highlights

• Understand the difference between modifying and non-modifying methods.
• Default sorting is lexicographical.
• Numeric sorting requires a comparison function.
• Arrays are one of the most commonly used data structures in automation frameworks.

---

## Strings

### Key Concepts

• Strings represent a sequence of characters.
• Strings are immutable.
• String operations return new values rather than modifying the original string.

### Common Operations

• Extract text
• Search text
• Replace text
• Split text
• Change case
• Remove whitespace

### Common Methods

• slice()
• substring()
• charAt()
• indexOf()
• includes()
• replace()
• replaceAll()
• split()
• trim()
• toUpperCase()
• toLowerCase()

### Interview Highlights

• Strings are primitive data types.
• Immutability is one of the most frequently asked concepts.
• Negative indexing support varies across string methods.
• String manipulation is heavily used in UI validations and API testing.

---

## String Creation

### Approaches

• Literal Creation
• Constructor-Based Creation

### Interview Highlights

• Literal creation produces primitive values.
• Constructor-based creation produces objects.
• Literal creation is preferred in production code.
• Constructor-based creation is rarely used in modern JavaScript projects.

---

## Functions

Functions are reusable blocks of code used to perform a specific task. They improve maintainability, readability, and code reusability.

### Types of Functions Covered

• Function Declaration
• Function Expression
• Anonymous Function
• Arrow Function
• IIFE (Immediately Invoked Function Expression)
• Async Function

### Key Points

• Function declarations are hoisted.
• Arrow functions provide concise syntax.
• Functions can be assigned, passed, returned, and executed dynamically.
• Functions are foundational to modern JavaScript development.

---

## Callback Functions

A Callback Function is a function passed as an argument to another function and executed later by the receiving function.

### Common Usage

• Array Helper Methods
• Event Handling
• Timers
• Asynchronous Operations

### Examples

• forEach()
• map()
• filter()
• find()

### Interview Highlights

• Callback functions are fundamental to JavaScript.
• Many built-in JavaScript APIs rely on callbacks.
• Understanding callbacks is essential before learning Promises.

---

## Higher Order Functions

A Higher Order Function is a function that accepts another function as an argument or returns a function.

### Examples

• forEach()
• map()
• filter()
• find()
• reduce()

### Benefits

• Promotes reusable code.
• Supports functional programming concepts.
• Makes data processing more expressive.

### Interview Highlights

• Every Array Helper Function is a Higher Order Function.
• Higher Order Functions heavily rely on callbacks.

---

## Promises

A Promise represents the eventual completion or failure of an asynchronous operation.

### Promise States

• Pending
• Fulfilled
• Rejected

### Promise Handlers

• .then() → Success Handling
• .catch() → Error Handling
• .finally() → Always Executes

### Why Promises?

• Avoid callback nesting.
• Improve code readability.
• Handle asynchronous operations efficiently.
• Represent future values.

### Interview Highlights

• A Promise can be settled only once.
• A Promise is either fulfilled or rejected.
• Promises are heavily used in modern JavaScript APIs.
• Async/Await is built on top of Promises.

---

## Async / Await

Async/Await is a modern way to work with Promises.

### async

• Declares an asynchronous function.
• Always returns a Promise.

### await

• Waits for a Promise to complete.
• Can only be used inside async functions.

### Benefits

• Cleaner syntax.
• Easier debugging.
• Improved readability.
• Simplifies Promise handling.

### Interview Highlights

• Every async function returns a Promise.
• Await pauses execution inside the async function.
• Async/Await is preferred over complex Promise chaining.

---

## Asynchronous Programming

Asynchronous Programming allows JavaScript to execute long-running operations without blocking the main execution flow.

### Common Examples

• API Calls
• Database Operations
• File Processing
• Browser Automation
• Network Requests

### Why Needed?

• External operations take unpredictable time.
• JavaScript should remain responsive while waiting.
• Improves application performance and user experience.



