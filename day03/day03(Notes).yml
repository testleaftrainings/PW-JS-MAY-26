STRING – Core Behaviour Notes
==================================================

Definition

A String is an immutable sequence of characters.

Key Behaviour

• Strings are primitive data types
• Strings are immutable
• String methods return a new string
• Index starts from 0

Example

"Playwright"

P = index 0
t = index 9

STRING CREATION – Core Behaviour Notes
==================================================

JavaScript provides 2 common ways to create a String

1) Literal Way
2) Instantiation (Constructor) Way

==================================================
1) Literal Way
==================================================

Definition

Creates a string directly using quotes.

Structure

let str = "Playwright"

Example

let trainer = "Bhuvanesh"

console.log(trainer)

Output

Bhuvanesh

Execution Behaviour

• Creates a primitive string
• Lightweight
• Faster
• Most commonly used
• Recommended approach

Type Check

let str = "Playwright"

console.log(typeof str)

Output

string

==================================================
2) Instantiation Way
==================================================

Definition

Creates a string object using the String constructor.

Structure

let str = new String("Playwright")

Example

let trainer = new String("Bhuvanesh")

console.log(trainer)

Output

[String: 'Bhuvanesh']

Execution Behaviour

• Creates a String Object
• Uses constructor
• Occupies more memory
• Rarely used in real projects

Type Check

let str = new String("Playwright")

console.log(typeof str)

Output

object

==================================================
Real-Time Recommendation
==================================================

Always use:

let str = "Playwright"

Avoid:

let str = new String("Playwright")

unless you specifically need a String object.

95%+ of Playwright, Selenium, Node.js, and
TypeScript projects use String Literals.

Helper Functions of String:
==================================================
1) slice() – Behaviour Notes
==================================================

Definition

Used to extract a portion of a string.

Structure

string.slice(startIndex,endIndex)

Execution Behaviour

• Returns new string
• End index excluded
• Supports negative index
• Original string unchanged

Example

let str="Playwright"

str.slice(0,4)

Output

"Play"

==================================================
2) substring() – Behaviour Notes
==================================================

Definition

Extracts part of a string.

Structure

string.substring(startIndex,endIndex)

Execution Behaviour

• End index excluded
• Negative values treated as 0
• Original string unchanged

Example

let str="Playwright"

str.substring(0,4)

Output

"Play"

Difference from slice()

slice(-3) works
substring(-3) treats -3 as 0

==================================================
