FUNCTIONS – Core Behaviour Notes
==================================================

Definition

A Function is a reusable block of code that performs
a specific task when invoked (called).

Why Functions?

• Avoid code duplication
• Improve reusability
• Improve maintainability
• Follow DRY Principle (Don't Repeat Yourself)

Structure

function functionName()
{
    // code
}

==================================================
1) Function Declaration
==================================================

Definition

A named function created using the function keyword.

Structure

function functionName()
{
}

Example

function greet()
{
    console.log("Hello")
}

greet()

Output

Hello

Execution Behaviour

• Hoisted completely
• Can be called before declaration
• Most common traditional approach

==================================================
2) Function Expression
==================================================

Definition

A function stored inside a variable.

Structure

let variableName = function()
{
}

Example

let greet = function()
{
    console.log("Hello")
}

greet()

Output

Hello

Execution Behaviour

• Not fully hoisted
• Variable is hoisted, function is not
• Called only after declaration

==================================================
3) Anonymous Function
==================================================

Definition

A function without a name.

Example

function()
{
    console.log("Hello")
}

Usually used inside:

• Callbacks
• Event handlers
• Function expressions
==================================================
 IIFE
(Immediately Invoked Function Expression)
==================================================

Definition

Function executes immediately after creation.

Structure

(function(){
})()

Example

(function(){
    console.log("Executed")
})()

Output

Executed

Execution Behaviour

• Runs immediately
• No explicit call needed
• Creates private scope
==================================================
4) Arrow Function
==================================================

Definition

Short-hand syntax introduced in ES6.

Structure

() => {}

Example

let greet = () =>
{
    console.log("Hello")
}

greet()

Output

Hello

Execution Behaviour

• Short syntax
• No own this
• Widely used in Playwright
• Common in map(), filter(), find()



==================================================
5) Callback Function
==================================================

Definition

A function passed as an argument to another function.

Example

function greet(name)
{
    console.log(name)
}

function execute(callback)
{
    callback("Bhuvanesh")
}

execute(greet)

Output

Bhuvanesh

Execution Behaviour

• Used heavily in JavaScript
• Used in async operations
• Used in Array helpers

WHY CALLBACK EXISTS?
==================================================

Because JavaScript often doesn't know
WHEN something will finish.

Examples:

• API Call
• Database Call
• File Download
• User Click
• Timer
• Browser Event

Since timing is unknown,

JavaScript says:

"Give me a function.
I'll call it when work is finished."

==================================================
6) Higher Order Function (HOF)
==================================================

Definition

A function that:

• Accepts another function
OR
• Returns another function

Example

function execute(callback)
{
    callback()
}

Execution Behaviour

• forEach()

All are Higher Order Functions

Example

let nums = [1,2,3]

nums.forEach(num => console.log(num))
