|Breakout : Check for Anagrams				          |
------------------------------------------------------------------

 
Write a JavaScript function that takes two strings and determines whether they are anagrams of each other.
 
Two strings are considered anagrams if they contain the same characters with the same frequency

Requirements:

1) Case-insensitive:
Treat uppercase and lowercase letters as the same.
Example: "Listen" and "Silent" should be considered anagrams.

2) Character scope:
Assume the strings contain only alphabetic characters and spaces.

3) Ignore spaces:
Spaces should not affect the comparison.
Example: "conversation" and "voices rant on" should be considered anagrams.

Examples:
Input: "listen", "silent" → Output: true
Input: "Listen", "Silent" → Output: true
Input: "conversation", "voices rant on" → Output: true
Input: "hello", "world" → Output: false


