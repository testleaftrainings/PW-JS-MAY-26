What is Array?

Array is a special object used to store multiple values in a single variable.
Values are stored using index positions.
Index starts from 0.

Why do we use Array?

To store a collection of related data.
Avoid creating multiple variables for similar data.
Makes looping and data manipulation easier.

Syntax

let Course= ["Selenium", "Cypress", "Playwright"];

Index Representation

Course[0] // Selenium
Course[1] // Cypress
Course[2] // Playwright

Common Array Operations

Add Element:
=============
Course.push("Appium"); // Add at end
Course.unshift("QTP"); // Add at beginning

Remove Element:
=============
Course.pop(); // Remove from end
Course.shift(); // Remove from beginning

Find Length:
=============
console.log(Course.length);

Access Element
================
console.log(Course[1]);

Loop Through Array
--------------------
for(let cour of Course){
    console.log(cour);
}

-----------------------------------------------------------------------------------
For Playwright interviews, focus especially on:
forEach(), map(), filter(), find(), some(), every(), reduce(), sort(), and splice(). 
These are the ones most commonly used in framework development and API response handling.

Below are the most commonly used Array Helper Functions we discussed and that are frequently used in JavaScript and Playwright automation.

push() – Add element at end
==============================
let arr = [1, 2];
arr.push(3);

console.log(arr);

Output 
[1, 2, 3]

pop() – Remove element from end
================================
let arr = [1, 2, 3];
arr.pop();

console.log(arr);

Output
[1, 2]


unshift() – Add element at beginning
======================================
let arr = [2, 3];
arr.unshift(1);

console.log(arr);

Output

[1, 2, 3]

shift() – Remove element from beginning
========================================
let arr = [1, 2, 3];
arr.shift();

console.log(arr);

Output

[2, 3]

splice() – Add/Remove elements
================================
let arr = [10, 20, 30, 40];

arr.splice(2, 1);

console.log(arr);

Output

[10, 20, 40]

slice() – Extract portion of array
========================================
let arr = [10, 20, 30, 40];

console.log(arr.slice(1, 3));

Output

[20, 30]

indexOf() – Find index of value
========================================
let arr = ["Chrome", "Edge", "Firefox"];

console.log(arr.indexOf("Edge"));

Output

1

includes() – Check value exists
========================================
let arr = ["Chrome", "Edge", "Firefox"];

console.log(arr.includes("Chrome"));

Output

true

sort() – Sort array
========================================
let arr = [100, 2, 30];

arr.sort((a, b) => a - b);

console.log(arr);

Output

[2, 30, 100]

reverse() – Reverse array
========================================
let arr = [1, 2, 3];

console.log(arr.reverse());

Output

[3, 2, 1]

forEach() – Iterate array
========================================
let arr = ["Chrome", "Edge"];

arr.forEach(browser => {
    console.log(browser);
});

Output

Chrome
Edge

map() – Transform each element
========================================
let arr = [1, 2, 3];

let result = arr.map(num => num * 2);

console.log(result);

Output

[2, 4, 6]

filter() – Filter elements
===========================
let arr = [10, 20, 30, 40];

let result = arr.filter(num => num > 20);

console.log(result);

Output

[30, 40]

find() – Return first matching element
========================================
let arr = [10, 20, 30, 40];

let result = arr.find(num => num > 20);

console.log(result);

Output

30

findIndex() – Return index of first match
========================================
let arr = [10, 20, 30, 40];

let result = arr.findIndex(num => num > 20);

console.log(result);

Output

2

some() – At least one match
===========================
let arr = [10, 20, 30];

console.log(arr.some(num => num > 25));

Output

true

every() – All elements match
==============================
let arr = [10, 20, 30];

console.log(arr.every(num => num > 5));

Output

true

reduce() – Accumulate values
=============================
let arr = [10, 20, 30];

let total = arr.reduce((sum, num) => sum + num, 0);

console.log(total);

Output

60

join() – Convert array to string
==================================
let arr = ["Chrome", "Edge", "Firefox"];

console.log(arr.join(", "));

Output

Chrome, Edge, Firefox

concat() – Merge arrays
=======================
let arr1 = [1, 2];
let arr2 = [3, 4];

console.log(arr1.concat(arr2));

Output

[1, 2, 3, 4]

