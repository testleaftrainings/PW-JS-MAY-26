================================================================================
              PLAYWRIGHT DESIGN PATTERNS & FIXTURE PATTERN
================================================================================


1. WHAT IS A DESIGN PATTERN?
================================================================================

A Design Pattern is a reusable solution to a commonly occurring software design
problem.

Instead of writing everything in one class or one test, we divide the
application into multiple reusable components.

BENEFITS:
--------------------------------------------------------------------------------
  • Improves code readability
  • Reduces duplicate code
  • Easier maintenance
  • Better scalability
  • Easier debugging
  • Encourages code reusability


================================================================================
              2. DESIGN PATTERNS USED IN PLAYWRIGHT FRAMEWORK
================================================================================

COMMONLY USED PATTERNS:
--------------------------------------------------------------------------------
  1. Page Object Model (POM)
  2. Fixture Pattern
  3. Builder Pattern
  4. Factory Pattern
  5. Singleton Pattern
  6. Repository Pattern
  7. Strategy Pattern
  8. Dependency Injection (through Fixtures)
  9. Facade Pattern
  10. Command Pattern

RECOMMENDED LEARNING ORDER:
--------------------------------------------------------------------------------
