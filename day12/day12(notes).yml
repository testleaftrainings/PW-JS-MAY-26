                    4. HTTP METHODS & CRUD OPERATIONS
================================================================================

WHAT ARE HTTP METHODS?
--------------------------------------------------------------------------------
HTTP Methods (HTTP Verbs) specify what action the client wants the server to
perform on a resource.

WHAT IS A RESOURCE?
--------------------------------------------------------------------------------
A resource represents any data exposed by a Web Service.

Examples:
  /users
  /orders
  /products
  /employees

CRUD MAPPING:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ CRUD          │ HTTP Method                                                 │
├───────────────┼─────────────────────────────────────────────────────────────┤
│ Create        │ POST                                                        │
│ Read          │ GET                                                         │
│ Update        │ PUT / PATCH                                                 │
│ Delete        │ DELETE                                                      │
└───────────────┴─────────────────────────────────────────────────────────────┘

GET:
--------------------------------------------------------------------------------
Purpose: Retrieve data
Example: GET /employees/101
Characteristics: Read only, Safe, No data modification

POST:
--------------------------------------------------------------------------------
Purpose: Create new resource
Example: POST /employees

PUT:
--------------------------------------------------------------------------------
Purpose: Replace the entire resource
Example: PUT /employees/101

PATCH:
--------------------------------------------------------------------------------
Purpose: Update selected fields
Example: PATCH /employees/101

DELETE:
--------------------------------------------------------------------------------
Purpose: Delete a resource
Example: DELETE /employees/101

PUT vs PATCH:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ PUT                          │ PATCH                                         │
├──────────────────────────────┼───────────────────────────────────────────────┤
│ Replaces entire resource     │ Updates selected fields                       │
│ Sends complete object        │ Sends modified fields only                    │
└──────────────────────────────┴───────────────────────────────────────────────┘
================================================================================
                    SOAP vs REST vs GraphQL vs gRPC
================================================================================

A comprehensive comparison of the four major API architectural styles.


================================================================================
                    1. DEFINITIONS & OVERVIEW
================================================================================

SOAP (Simple Object Access Protocol):
--------------------------------------------------------------------------------
A protocol-based web service architecture that uses XML for message format and
relies on application layer protocols (HTTP, SMTP, TCP) for message negotiation
and transmission.

Key Characteristics:
  • XML-based messaging
  • Strict standards and contracts (WSDL)
  • Built-in error handling
  • ACID compliance support
  • WS-Security for enterprise-level security

REST (Representational State Transfer):
--------------------------------------------------------------------------------
An architectural style that uses standard HTTP methods (GET, POST, PUT, DELETE)
and treats everything as a resource identified by URLs.

Key Characteristics:
  • Resource-based (URLs represent resources)
  • Stateless communication
  • Uses standard HTTP methods
  • Supports multiple formats (JSON, XML, HTML)
  • Cacheable responses
  • Simple and lightweight

GraphQL:
--------------------------------------------------------------------------------
A query language and runtime for APIs developed by Facebook. It allows clients
to request exactly the data they need, nothing more and nothing less.

Key Characteristics:
  • Single endpoint (/graphql)
  • Client-specified data requirements
  • Strongly typed schema (SDL)
  • Real-time subscriptions support
  • Introspection capabilities
  • No over-fetching or under-fetching

gRPC (gRPC Remote Procedure Calls):
--------------------------------------------------------------------------------
A high-performance RPC framework developed by Google, using Protocol Buffers
as the interface definition language and HTTP/2 as the transport.

Key Characteristics:
  • Binary protocol (Protocol Buffers)
  • HTTP/2-based transport
  • Bidirectional streaming
  • Strongly typed contracts (.proto files)
  • Language-agnostic code generation
  • High performance and low latency


