                    METHOD 1: DATA PARAMETERIZATION WITH JSON
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Feeding test data from external JSON files instead of hardcoding values.
Useful for data-driven testing.

WHAT IS JSON?
--------------------------------------------------------------------------------
JSON = JavaScript Object Notation
A text format for structured data that humans & machines both love.

JSON BUILDING BLOCKS:
--------------------------------------------------------------------------------
  {}  → Objects  → { key: value }
  []  → Arrays   → [ value1, value2 ]
  ""  → Strings  → "name": "Bhuvi"
  num → Numbers  → 7
  bool→ Boolean  → true
  null→ null     → null

No functions. No logic. Just pure data. — That's the magic!

WHY JSON WON:
--------------------------------------------------------------------------------
┌────────────────────────────────────────────────────────────────────────────┐
│ Reason                    │ Why It Mattered                                │
├───────────────────────────┼────────────────────────────────────────────────┤
│ Perfect Timing            │ Web apps needed constant server chat           │
│ Native to JS              │ JSON.parse(data) — instant objects!            │
│ Human-readable            │ Debug by looking — no archaeology required     │
│ Language-agnostic         │ Java, Python, C#, Rust — everyone speaks JSON  │
│ API Perfect               │ REST APIs became JSON machines                 │
└───────────────────────────┴────────────────────────────────────────────────┘

WHERE YOU SEE JSON DAILY:
--------------------------------------------------------------------------------
  • Playwright Tests → API responses
  • Config Files → package.json, tsconfig.json
  • Auth → Storage state, tokens
  • Cloud → Microservices chat
  • Databases → NoSQL, exports

SAMPLE JSON STRUCTURE (testData.json):
--------------------------------------------------------------------------------
[
  {
    "TcaseId": "TC001",
    "Username": "democsr",
    "Password": "crmsfa"
  },
  {
    "TcaseId": "TC002",
    "Username": "democsr2",
    "Password": "crmsfa"
  }
]

STEP-BY-STEP PROCESS FOR JSON:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ STEP 1: Create JSON File                                                    │
│   → Create a .json file inside the Data folder                             │
│   → Define test data in JSON format                                        │
│   → Use array of objects for multiple test cases                           │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 2: Import JSON into Spec File                                          │
│   → Create a .spec.ts file                                                 │
│   → Import data using:                                                     │
│     import * as testData from "./Data/xxx.json";                           │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 3: Use in Test Cases                                                   │
│   → Loop through imported data                                             │
│   → Access values using keys                                               │
│   → Example: testData[0].Username                                          │
│   → Perform validations with test data                                     │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 4: Run the Test                                                        │
│   → Execute the spec file                                                  │
│   → Test runs multiple times with different data                           │
│   → Observe data-driven testing in action                                  │
└─────────────────────────────────────────────────────────────────────────────┘

QUICK CODE REFERENCE:
--------------------------------------------------------------------------------
import credentials from "./Data/loginData.json";

test.describe("Data Driven Login Test", () => {
  for (const data of credentials) {
    test(`Test ${data.TcaseId} with ${data.Username}`, async ({ page }) => {
      await page.fill('#username', data.Username);
      await page.fill('#password', data.Password);
      await page.click('#loginBtn');
    });
  }
});

BENEFITS OF JSON PARAMETERIZATION:
--------------------------------------------------------------------------------
  ✓ No hardcoded values in test scripts
  ✓ Easy to add/modify test data
  ✓ Separate data from test logic
  ✓ Reuse same test with multiple datasets
  ✓ Perfect for regression testing




================================================================================
                    METHOD 2: ENVIRONMENT PARAMETERIZATION
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Environment parameterization allows the same test suite to run against different
environments (Dev, QA, UAT, Prod) without changing test code.

WHY ENVIRONMENT PARAMETERIZATION?
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Problem                           │ Solution                                 │
├───────────────────────────────────┼──────────────────────────────────────────┤
│ Hardcoded URLs in tests           │ Dynamic baseURL from environment       │
│ Different credentials per env     │ Environment-specific config            │
│ Test fails on different env       │ Single test suite for all env          │
│ Manual config changes per env     │ Automated environment selection        │
└─────────────────────────────────────────────────────────────────────────────┘

COMMON ENVIRONMENTS:
--------------------------------------------------------------------------------
  • DEV  → Development environment (developers)
  • QA   → Quality Assurance (testing team)
  • UAT  → User Acceptance Testing (stakeholders)
  • STG  → Staging (pre-production)
  • PROD → Production (live)



| Operating System / Shell         | Set Environment Variable |
| -------------------------------- | ------------------------ |
| **Windows PowerShell**           | `$env:envFileName="qa"`  |
| **Windows Command Prompt (cmd)** | `set envFileName=qa`     |
| **Linux/macOS (bash, zsh)**      | `export envFileName=qa`  |

The $ symbol indicates a variable in PowerShell.
env: is a PowerShell provider (or drive) that represents the operating system's Environment Variables.
envFileName  This is simply the name of the environment variable.

SETUP: playwright.config.ts
--------------------------------------------------------------------------------
import { defineConfig } from '@playwright/test';

export default defineConfig({
  use: {
    baseURL: process.env.BASE_URL || 'https://qa.example.com',
  },
});

ENVIRONMENT CONFIGURATION FILES (config/env.config.ts):
--------------------------------------------------------------------------------
export const config = {
  dev: {
    baseURL: 'https://dev.example.com',
    username: 'dev_user',
    password: 'dev_pass',
    apiBase: 'https://api-dev.example.com'
  },
  qa: {
    baseURL: 'https://qa.example.com',
    username: 'qa_user',
    password: 'qa_pass',
    apiBase: 'https://api-qa.example.com'
  },
  uat: {
    baseURL: 'https://uat.example.com',
    username: 'uat_user',
    password: 'uat_pass',
    apiBase: 'https://api-uat.example.com'
  },
  prod: {
    baseURL: 'https://example.com',
    username: 'prod_user',
    password: 'prod_pass',
    apiBase: 'https://api.example.com'
  }
};

ENVIRONMENT-SPECIFIC CONFIG (config/env.ts):
--------------------------------------------------------------------------------
// config/env.ts
const env = process.env.ENV || 'qa';

const configs = {
  dev: {
    baseURL: 'https://dev.example.com',
    credentials: {
      username: 'dev_user',
      password: 'dev_pass'
    }
  },
  qa: {
    baseURL: 'https://qa.example.com',
    credentials: {
      username: 'qa_user',
      password: 'qa_pass'
    }
  },
  uat: {
    baseURL: 'https://uat.example.com',
    credentials: {
      username: 'uat_user',
      password: 'uat_pass'
    }
  },
  prod: {
    baseURL: 'https://example.com',
    credentials: {
      username: 'prod_user',
      password: 'prod_pass'
    }
  }
};

export default configs[env as keyof typeof configs];

USING ENVIRONMENT CONFIG IN TESTS:
--------------------------------------------------------------------------------
import config from '../config/env';

test('Login with environment config', async ({ page }) => {
  await page.goto(config.baseURL);
  await page.fill('#username', config.credentials.username);
  await page.fill('#password', config.credentials.password);
  await page.click('#login');
});

RUNNING TESTS WITH ENVIRONMENT VARIABLES:
--------------------------------------------------------------------------------
# Run in QA environment (default)
npx playwright test

# Run in Dev environment
ENV=dev npx playwright test

# Run in UAT environment
ENV=uat npx playwright test

# Run in Production environment
ENV=prod npx playwright test

# Windows PowerShell
$env:ENV="prod"; npx playwright test

ENVIRONMENT VARIABLES WITH .env FILE:
--------------------------------------------------------------------------------
# .env file (add to .gitignore)
ENV=qa
BASE_URL=https://qa.example.com
API_KEY=abc123
DB_PASSWORD=secure_password

# Using dotenv package
npm install dotenv

# In config
import dotenv from 'dotenv';
dotenv.config();

const env = process.env.ENV || 'qa';
const baseURL = process.env.BASE_URL || 'https://qa.example.com';

ENVIRONMENT-SPECIFIC TEST EXECUTION:
--------------------------------------------------------------------------------
import { test } from '@playwright/test';

test.skip(process.env.ENV === 'prod', 'Skip destructive tests on production');

test('Create user', async ({ page }) => {
  // This test will skip on production
});

================================================================================
                    METHOD 3: DATA PARAMETERIZATION WITH CSV
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
CSV = Comma Separated Values
A plain text format for tabular data, commonly used for business data and
Excel exports.

WHY CSV NEEDS INSTALLATION (Unlike JSON):
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ CSV file content:                                                          │
│ ┌──────────────────────┐                                                   │
│ │ username,password    │                                                   │
│ │ demo,123             │                                                   │
│ │ admin,456            │                                                   │
│ └──────────────────────┘                                                   │
│                                                                             │
│ ❌ Node.js does NOT automatically know:                                     │
│    • Where columns start/end                                               │
│    • Where rows begin                                                      │
│    • How to handle commas inside values                                    │
│    • How to handle quoted values                                           │
│    • Which row maps to headers                                             │
│                                                                             │
│ → CSV = Just plain text file                                               │
│ → PACKAGE NEEDED to parse correctly                                        │
└─────────────────────────────────────────────────────────────────────────────┘

INSTALLATION:
--------------------------------------------------------------------------------
npm install csv-parse

WHY TWO IMPORTS FOR CSV?
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ IMPORT 1: fs (File System)                                                  │
│   import fs from "fs";                                                     │
│   fs.readFileSync("./data/login.csv")                                      │
│   → Reads file from system → brings content into code                     │
│   → WITHOUT fs → File content never reaches your script                   │
├─────────────────────────────────────────────────────────────────────────────┤
│ IMPORT 2: parse (CSV Parser)                                               │
│   import { parse } from "csv-parse/sync";                                 │
│   → Converts RAW TEXT → USABLE OBJECTS:                                   │
│                                                                             │
│   INPUT (Raw CSV):           OUTPUT (Array of Objects):                    │
│   ┌─────────────────┐        ┌─────────────────────────┐                   │
│   │ username,pass   │   →    │ { username:"demo",       │                   │
│   │ demo,123        │        │   password:"123" }       │                   │
│   └─────────────────┘        └─────────────────────────┘                   │
└─────────────────────────────────────────────────────────────────────────────┘

STEP-BY-STEP PROCESS FOR CSV:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ STEP 1: Install csv-parse package                                           │
│   npm install csv-parse                                                    │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 2: Import Dependencies                                                 │
│   import { parse } from "csv-parse/sync";                                  │
│   import fs from "fs";                                                     │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 3: Read CSV File                                                       │
│   fs.readFileSync("Data/login.csv")                                        │
│   → Reads raw CSV content from Data folder                                 │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 4: Parse CSV Content                                                   │
│   parse(content, { columns: true, skip_empty_lines: true })                │
│   → First row = column names                                               │
│   → Ignore blank rows                                                      │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 5: Store in Variable                                                   │
│   Store parsed result in 'records' variable                                │
│   Each row becomes a JavaScript object                                     │
├─────────────────────────────────────────────────────────────────────────────┤
│ STEP 6: Use in Tests                                                        │
│   Loop through records array                                               │
│   Access values using column names                                         │
│   Example: records[0].username, records[0].password                        │
└─────────────────────────────────────────────────────────────────────────────┘

CSV → JSON CONVERSION EXAMPLE:
--------------------------------------------------------------------------------
INPUT CSV:
┌──────┬──────────────────┬──────────┐
│ tcid │ username         │ password │
├──────┼──────────────────┼──────────┤
│ 1    │ demoSalesmanager │ crmsfa   │
│ 2    │ demoCSR          │ crmsfa   │
└──────┴──────────────────┴──────────┘

OUTPUT JSON (RECORDS):
[
  { tcid: "1", username: "demoSalesmanager", password: "crmsfa" },
  { tcid: "2", username: "demoCSR", password: "crmsfa" }
]

QUICK CODE REFERENCE:
--------------------------------------------------------------------------------
import { parse } from "csv-parse/sync";
import fs from "fs";

let records = parse(
  fs.readFileSync("Data/login.csv"),
  { columns: true, skip_empty_lines: true }
);

// Access: records[0].username → "demoSalesmanager"
// Access: records[1].password → "crmsfa"

USING IN TESTS:
--------------------------------------------------------------------------------
import { test } from '@playwright/test';
import fs from 'fs';
import { parse } from 'csv-parse/sync';

const records = parse(
  fs.readFileSync('Data/login.csv'),
  { columns: true, skip_empty_lines: true }
);

for (const record of records) {
  test(`Login with ${record.username}`, async ({ page }) => {
    await page.goto('https://example.com/login');
    await page.fill('#username', record.username);
    await page.fill('#password', record.password);
    await page.click('#login');
  });
}

JSON vs CSV COMPARISON:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ FORMAT  │ NATIVE TO NODE?   │ WHAT'S NEEDED?        │ BEST FOR              │
├─────────┼───────────────────┼───────────────────────┼───────────────────────┤
│ JSON    │ ✅ YES            │ Just import directly  │ API testing, configs  │
│ CSV     │ ❌ NO             │ fs + parse package    │ Business data, Excel  │
└─────────┴───────────────────┴───────────────────────┴───────────────────────┘



