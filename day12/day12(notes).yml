================================================================================
                    3. STATELESS vs STATEFUL
================================================================================

SOAP:
--------------------------------------------------------------------------------
State: Can be either (Stateful or Stateless)
  • Supports WS-Session for stateful operations
  • Can maintain session state if needed
  • Often used in transactional systems where state matters

REST:
--------------------------------------------------------------------------------
State: Stateless (by architectural constraint)
  • No client context stored on server
  • Each request contains all necessary information
  • Session state is client's responsibility
  • Easier to scale (no sticky sessions required)

GraphQL:
--------------------------------------------------------------------------------
State: Stateless (typically)
  • Each request is independent
  • No session state maintained
  • Authentication often handled via tokens (JWT)
  • Subscriptions are stateful (WebSocket-based)

gRPC:
--------------------------------------------------------------------------------
State: Can be Stateful (supports streaming)
  • Bidirectional streaming maintains state between messages
  • Normal RPC calls are stateless
  • Streaming allows persistent connections
  • HTTP/2 multiplexing supports multiple concurrent streams


