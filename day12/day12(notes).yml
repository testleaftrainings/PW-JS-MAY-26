================================================================================
                    5. DATA FORMATS
================================================================================

SOAP:
--------------------------------------------------------------------------------
XML only.

Pros:
  • Strict schema validation
  • Human-readable (though verbose)
  • Built-in error handling

Cons:
  • Very verbose
  • Heavy payload
  • Slower parsing
  • No binary data support (must be encoded)

REST:
--------------------------------------------------------------------------------
JSON (most common), XML, HTML, Plain Text, YAML, Protocol Buffers, etc.

Pros:
  • Lightweight (JSON)
  • Human-readable
  • Multiple format support
  • Faster than XML

Cons:
  • No built-in schema validation (optional)
  • Less strict than SOAP

GraphQL:
--------------------------------------------------------------------------------
JSON (most common), using GraphQL Query Language.

Pros:
  • Client can specify exact fields
  • No over-fetching or under-fetching
  • Strong typing via Schema Definition Language (SDL)

Cons:
  • Slightly more complex queries
  • HTTP status codes not used (always 200)

gRPC:
--------------------------------------------------------------------------------
Protocol Buffers (binary) by default.

Pros:
  • Compact binary format
  • Faster serialization/deserialization
  • Strong typing
  • Language-agnostic code generation

Cons:
  • Not human-readable (binary)
  • Need .proto files for definition
  • Less browser-friendly (needs gRPC-Web)

