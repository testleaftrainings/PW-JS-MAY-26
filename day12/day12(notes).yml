================================================================================
                    1. WHAT IS A WEB SERVICE?
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
A Web Service is a software component that enables two different applications
to communicate and exchange data over a network using standard web protocols
such as HTTP/HTTPS.

INTERVIEW DEFINITION:
  "A Web Service is a software component that enables different applications
   to communicate and exchange data over a network using standard web protocols
   like HTTP."

WHY DO WE NEED WEB SERVICES?
--------------------------------------------------------------------------------
WITHOUT WEB SERVICES:
  Mobile App → Database
  Website    → Database
  Desktop    → Database

  Each application would need its own logic and database access.

WITH WEB SERVICES:
            Database
                ▲
                │
          Web Service
         /     |      \
  Mobile App  Website  Desktop App

  All applications communicate with a single Web Service.

BENEFITS:
  • Reusability
  • Centralized business logic
  • Data consistency
  • Easy maintenance
  • Platform independence

REAL-WORLD EXAMPLES:
  • Amazon Product Search
  • Google Maps
  • Gmail Login
  • Weather Applications
  • UPI Payments
  • Flight Booking
  • Movie Ticket Booking

COMMUNICATION FLOW:
--------------------------------------------------------------------------------
Client (Mobile/Web)
      │
HTTP Request
      │
      ▼
Web Service (API)
      │
Business Logic
      │
Database
      │
HTTP Response
      ▼
Client

KEY CHARACTERISTICS:
  • Enables application-to-application communication
  • Uses HTTP/HTTPS
  • Exchanges JSON or XML
  • Platform independent
  • Language independent


================================================================================
                    2. MONOLITHIC vs MICROSERVICES ARCHITECTURE
================================================================================

MONOLITHIC ARCHITECTURE:
--------------------------------------------------------------------------------
A Monolithic Application is a single application containing all modules.

+----------------------+
|   User Interface     |
+----------------------+
|   Business Logic     |
+----------------------+
|  Data Access Layer   |
+----------------------+
|      Database        |
+----------------------+

Characteristics:
  • Single deployment
  • Usually one database
  • Tight coupling
  • Internal communication through method calls

Problems:
  • Difficult to scale
  • Entire application must be redeployed
  • One bug may affect the whole application
  • Difficult for large teams to maintain

MICROSERVICES ARCHITECTURE:
--------------------------------------------------------------------------------
Application is divided into multiple independent services.

          User Interface
                 │
      ------------------------
      │      │      │      │
      ▼      ▼      ▼      ▼
 Login  Search  Orders Payment
Service Service Service Service
      │      │      │      │
      ▼      ▼      ▼      ▼
     DB     DB     DB     DB

Characteristics:
  • Independent services
  • Independent deployments
  • Database per service
  • Loose coupling

Service Communication:
  Order Service → HTTP Request → Payment Service

  Services communicate using Web Services (REST APIs or SOAP APIs).

MONOLITHIC vs MICROSERVICES:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Monolithic                    │ Microservices                              │
├───────────────────────────────┼────────────────────────────────────────────┤
│ One application               │ Multiple independent services              │
│ One deployment                │ Independent deployments                    │
│ Shared database               │ Database per service                       │
│ Hard to scale                 │ Easy to scale individual services          │
│ Internal method calls         │ HTTP/API communication                     │
│ Tightly coupled               │ Loosely coupled                            │
└───────────────────────────────┴────────────────────────────────────────────┘


================================================================================
                        3. HTTP HEADERS
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
HTTP Headers are key-value pairs that provide metadata about an HTTP request
or response.

INTERVIEW DEFINITION:
  "HTTP Headers are key-value pairs sent with HTTP requests and responses that
   carry metadata about the message."

HTTP REQUEST STRUCTURE:
--------------------------------------------------------------------------------
GET /users/101 HTTP/1.1

Host: api.company.com
Authorization: Bearer token
Content-Type: application/json
Accept: application/json

Body

WHY HEADERS?
--------------------------------------------------------------------------------
Headers tell the server:
  • Who is making the request?
  • What format is the data?
  • What response format is expected?
  • Is the user authenticated?

COMMON REQUEST HEADERS:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Header          │ Purpose                                                    │
├─────────────────┼────────────────────────────────────────────────────────────┤
│ Content-Type    │ Format of request body                                    │
│ Accept          │ Expected response format                                  │
│ Authorization   │ Authentication                                            │
│ Host            │ Target server                                             │
│ User-Agent      │ Client information                                        │
│ Cookie          │ Session management                                        │
