================================================================================
                    8. STREAMING SUPPORT
================================================================================

SOAP:
--------------------------------------------------------------------------------
Streaming: MTOM for large attachments

Description:
  • MTOM (Message Transmission Optimization Mechanism)
  • SOAP with Attachments
  • Not native streaming

REST:
--------------------------------------------------------------------------------
Streaming: Server-Sent Events (SSE), WebSockets, Chunked Transfer

Description:
  • SSE (EventSource) → Server → Client
  • WebSockets → Bidirectional
  • Chunked transfer for large files
  • Not native streaming

GraphQL:
--------------------------------------------------------------------------------
Streaming: Subscriptions (via WebSockets)

Description:
  • Real-time data updates
  • Subscriptions via WebSocket
  • Live queries
  • Facebook Relay modern
  • Good support for real-time features

gRPC:
--------------------------------------------------------------------------------
Streaming: Native streaming (4 types)

Description:
  • Unary → Simple request-response
  • Server Streaming → Server sends multiple responses
  • Client Streaming → Client sends multiple requests
  • Bidirectional Streaming → Both send/receive simultaneously
  • Built on HTTP/2 multiplexing
  • Best streaming support among all

