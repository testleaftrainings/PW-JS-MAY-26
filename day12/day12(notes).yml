  • JWT / OAuth2
  • Query depth limiting (to prevent DoS)
  • Query cost analysis
  • Field-level authorization
  • Rate limiting

gRPC:
--------------------------------------------------------------------------------
Security: Built-in + Add-on

Features:
  • TLS/SSL encryption (gRPC over HTTP/2)
  • mTLS (mutual TLS)
  • Token-based auth (OAuth2)
  • Built-in security features
  • JWT support
  • API Key support

