================================================================================
                    11. INTERVIEW QUESTIONS
================================================================================

Q1: What are the main differences between SOAP and REST?
--------------------------------------------------------------------------------
SOAP is a protocol with strict standards, uses XML, supports ACID transactions,
and is more secure out-of-the-box. REST is an architectural style that uses
HTTP methods, supports multiple formats (JSON, XML), and is more lightweight
and scalable.

Q2: When would you use GraphQL over REST?
--------------------------------------------------------------------------------
When client needs: 1) Exactly the data they need (no over/under-fetching),
2) Multiple resources in one request, 3) Real-time subscriptions, 4) Complex
nested data, 5) Reduce number of API calls.

Q3: Why is gRPC faster than REST?
--------------------------------------------------------------------------------
gRPC uses Protocol Buffers (binary format) which is much lighter than JSON,
and HTTP/2 which supports multiplexing and persistent connections, reducing
latency and bandwidth.

Q4: When would you use SOAP instead of REST?
--------------------------------------------------------------------------------
When you need: 1) ACID compliance, 2) Built-in security (WS-Security),
3) Enterprise contracts (WSDL), 4) Payment/banking systems, 5) Systems
requiring strict contracts.

Q5: What is the biggest drawback of GraphQL?
--------------------------------------------------------------------------------
Complex query validation, potential for expensive queries (DoS), caching is
more complex compared to REST, and all requests typically return 200 OK
(making HTTP status codes less useful).

Q6: When to use gRPC instead of REST?
--------------------------------------------------------------------------------
When you need: 1) High performance, 2) Real-time streaming, 3) Microservices
communication, 4) Polyglot environments (many languages), 5) Low latency,
6) Small payload sizes.

Q7: What is the difference between GraphQL and gRPC?
--------------------------------------------------------------------------------
GraphQL is a query language for APIs (client-specified data), while gRPC is a
high-performance RPC framework using Protocol Buffers. GraphQL is frontend-
friendly; gRPC is backend/microservices-friendly.

Q8: Which is the most widely used today?
--------------------------------------------------------------------------------
REST is the most widely used for public APIs, followed by GraphQL for complex
frontends, gRPC for internal microservices, and SOAP in enterprise legacy
systems.


