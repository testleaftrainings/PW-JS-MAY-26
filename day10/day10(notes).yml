INTERVIEW QUESTIONS
================================================================================

Q1: What is the difference between page.on() and page.waitForEvent()?
--------------------------------------------------------------------------------
ANSWER:
  page.on() continuously listens for an event and executes every time the event
  occurs, whereas page.waitForEvent() waits for a single occurrence of the event
  and returns a Promise that resolves when the event happens.

Q2: Why do we use Promise.all() with waitForEvent('filechooser')?
--------------------------------------------------------------------------------
ANSWER:
  The file chooser event is triggered immediately after clicking the upload
  button. To avoid missing the event, Playwright must start listening before
  the click occurs. Promise.all() ensures both actions start simultaneously.

Q3: Why is the following code incorrect?
  Promise.all([
      await page.waitForEvent('filechooser'),
      await page.click('#upload')
  ]);
--------------------------------------------------------------------------------
ANSWER:
  The await keywords make execution sequential. Playwright waits for the file
  chooser event before clicking the upload button, causing the test to hang.

Q4: What does Promise<T> mean?
--------------------------------------------------------------------------------
ANSWER:
  Promise<T> represents an asynchronous operation that will eventually return
  a value of type T. After using await, the Promise resolves and returns the
  actual value.

Q5: What does storageState() save and what does it NOT save?
--------------------------------------------------------------------------------
ANSWER:
  storageState() saves cookies, localStorage, and sessionStorage.
  It does NOT save DOM, open tabs, scroll position, or UI state.
  Only authentication-related browser storage is persisted.


