PART 2: FILE UPLOAD
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Uploading files into a web application using Playwright.
Playwright simulates attaching files to <input type="file"> elements or
drag-and-drop areas.

WHEN type="file" IS PRESENT:
--------------------------------------------------------------------------------
Directly set the file(s) to the input element.

const fileInput = page.locator('input[type="file"]');
await fileInput.setInputFiles('tests/data/sample.pdf');

Multiple Files:
await fileInput.setInputFiles(['file1.png', 'file2.png']);

WHEN type="file" IS NOT PRESENT (Custom Upload UI):
--------------------------------------------------------------------------------
Some apps hide the <input> or use a styled button (drag-drop zones).

URL: https://the-internet.herokuapp.com/upload

Steps:
  1. Inspect and find the hidden file input
  2. Use setFiles on that hidden element

Example:
const fileChooser = page.waitForEvent('filechooser', { timeout: 10000 });
await page.click('#drag-drop-upload');
const loaded = await fileChooser;

If the input is not accessible → Workaround is to use OS-level automation
(not Playwright's scope).


COMMON MISTAKE:
--------------------------------------------------------------------------------
❌ INCORRECT:
Promise.all([
    await page.waitForEvent('filechooser'),
    await page.locator('#drag-drop-upload').click()
]);

What Happens:
  1. Wait for filechooser event
  2. Event never occurs
  3. Click never executes
  4. Test hangs

Reason: await makes execution sequential.

ALTERNATIVE: Event Listener Style
--------------------------------------------------------------------------------
page.on('filechooser', async fileChooser => {
    await fileChooser.setFiles('./test-data/sample.pdf');
});

await page.locator('#drag-drop-upload').click();

REAL PROBLEMS & SOLUTIONS:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Problem                    │ Solution                                       │
├────────────────────────────┼────────────────────────────────────────────────┤
│ CI/CD upload fails         │ Check file paths (use absolute paths)         │
│ Hidden file inputs         │ Use FileChooser event                         │
│ Drag-drop uploads          │ Use direct input or setInputFiles()           │
│ Headless mode issues       │ Debug with screenshots                        │
└────────────────────────────┴────────────────────────────────────────────────┘

path.join() EXPLANATION:
--------------------------------------------------------------------------------
This line tells Playwright where to save the downloaded file:

path.join(__dirname, '../../Data', download.suggestedFilename())

1. path.join():
  • Comes from Node.js's built-in path module
  • Safely combines multiple parts of a file path
  • Automatically adds / or \ depending on OS

  Example:
  path.join("folder", "subfolder", "file.txt")
  Windows: folder\subfolder\file.txt
  Mac/Linux: folder/subfolder/file.txt

2. __dirname:
  • Special variable in Node.js
  • Gives the absolute path of the current JavaScript file's directory

3. ../../Data:
  • Go two folders up from the current directory
  • Then go inside the "Data" folder

4. download.suggestedFilename():
  • Gives the original name of the file being downloaded
  • Playwright reads this automatically from the browser's download info

PUTTING IT ALL TOGETHER:
  path.join(__dirname, '../../Data', download.suggestedFilename())

  Start from the folder where this test file is located (__dirname)
  → Move two levels up to reach the main project folder
  → Go inside the Data folder
  → Add the original file name automatically suggested by the browser

Result example: C:\Projects\Data\JulPw-2.png

"types": ["node"]  errror in terminal 
===================================================================
if error occurs while importing the path, create a tsconfig.json file 
paste the below content which will add  "types": ["node"] 

{
  "compilerOptions": {
    "target": "ES2020",
    "module": "commonjs",
    "strict": true,
    "esModuleInterop": true,
    "moduleResolution": "node",
    "skipLibCheck": true,
    "ignoreDeprecations": "6.0",
    "types": ["node"] ,
    "resolveJsonModule": true
  }
}


