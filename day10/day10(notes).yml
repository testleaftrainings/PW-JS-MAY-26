PART 1: EVENT LISTENERS IN PLAYWRIGHT
================================================================================

WHAT ARE EVENT LISTENERS?
--------------------------------------------------------------------------------
Event listeners allow Playwright to listen for specific events happening in the
browser and execute code when those events occur.

SYNTAX:
page.on('eventName', callback);

EXAMPLE:
page.on('dialog', async dialog => {
    console.log(dialog.message());
    await dialog.accept();
});

COMMON EVENTS:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Event          │ Purpose                                                    │
├────────────────┼────────────────────────────────────────────────────────────┤
│ dialog         │ Handle alerts, confirms, prompts                          │
│ popup          │ Handle new tabs/windows                                   │
│ request        │ Capture network requests                                  │
│ response       │ Capture network responses                                 │
│ console        │ Capture browser console logs                              │
│ filechooser    │ Handle file uploads                                       │
│ crash          │ Detect page crashes                                       │
└────────────────┴────────────────────────────────────────────────────────────┘


page.on() vs page.waitForEvent()
================================================================================

page.on() - Continuous Listener:
--------------------------------------------------------------------------------
Registers a listener and keeps listening throughout the page lifecycle.

page.on('popup', popup => {
    console.log('Popup opened');
});

Characteristics:
  • Continuous listener
  • Executes every time the event occurs
  • Useful for monitoring/logging

page.waitForEvent() - One-time Listener:
--------------------------------------------------------------------------------
Waits for a specific event only once.

const popup = await page.waitForEvent('popup');

Characteristics:
  • One-time listener
  • Used for synchronization
  • Returns a Promise

COMPARISON TABLE:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ page.on()               │ page.waitForEvent()   │
├────────────────────────────┼────────────────────────┼───────────────────────┤
│ Listening Mode             │ Continuous              │ One-time              │
│ Style                      │ Callback-based          │ Promise-based         │
│ Suitable for               │ Monitoring              │ Synchronization       │
│ Returns event object       │ No (in callback)        │ Yes (after await)     │
└────────────────────────────┴────────────────────────┴───────────────────────┘


FILE UPLOAD USING EVENT LISTENER
================================================================================

PREFERRED APPROACH: Promise.all()
--------------------------------------------------------------------------------
When clicking a button opens the operating system's file chooser dialog:

const [fileChooser] = await Promise.all([
    page.waitForEvent('filechooser'),
    page.locator('#drag-drop-upload').click()
]);

await fileChooser.setFiles('./test-data/sample.pdf');

WHY Promise.all()?
--------------------------------------------------------------------------------
Goal: Start listening before triggering the click.

Execution Flow:
  1. Register filechooser listener
  2. Click upload button
  3. File chooser event occurs
  4. Promise resolves
  5. Upload file

When to Use:
  • Global monitoring
  • Repeated uploads

Framework Recommendation: Prefer Promise.all() because it's cleaner, one-time,
and leaves no leftover event listeners.


UNDERSTANDING PROMISE TYPES
================================================================================

A Promise represents a value that will be available in the future.

Generic Syntax: Promise<T>
  T = value returned after await

EXAMPLES:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Promise Type                    │ Value after await                         │
├─────────────────────────────────┼───────────────────────────────────────────┤
│ Promise<string>                 │ string                                    │
│ Promise<number>                 │ number                                    │
│ Promise<FileChooser>            │ FileChooser                               │
│ Promise<Page>                   │ Page                                      │
│ Promise<BrowserContext>         │ BrowserContext                            │
│ Promise<{cookies, origins}>     │ Object with cookies and origins          │
└─────────────────────────────────────────────────────────────────────────────┘

SIMPLE RULE:
Whenever you see Promise<T>, ask yourself:
  "If I put await before this, what value will I receive?"

