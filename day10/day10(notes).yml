                    PLAYWRIGHT NOTES: POPUP vs PAGE EVENTS
================================================================================

LEARNING OBJECTIVE
================================================================================

Understand:
  • page.waitForEvent('popup')
  • context.waitForEvent('page')
  • Why page.waitForEvent('page') is invalid
  • When to use each approach in real-world Playwright projects


WHY DO WE NEED EVENT HANDLING?
================================================================================

In modern web applications, clicking a button may:
  • Open a new tab
  • Open a child window
  • Launch an external website
  • Open a login page
  • Open a payment gateway

Playwright must know: "Which page should be controlled next?"

To achieve this, Playwright provides event listeners.

EVENT HANDLING BASICS:
--------------------------------------------------------------------------------
Syntax:
  object.waitForEvent("eventName")

Examples:
  page.waitForEvent("popup")
  page.waitForEvent("download")
  page.waitForEvent("dialog")
  context.waitForEvent("page")


UNDERSTANDING PAGE AND CONTEXT
================================================================================

BROWSER CONTEXT:
--------------------------------------------------------------------------------
A Browser Context is an isolated browser session.

Browser
   │
   └── Context
         │
         ├── Page 1
         ├── Page 2
         └── Page 3

PLAYWRIGHT CODE:
const context = await browser.newContext();
const page = await context.newPage();

Here:
  Browser → Parent
  Context → Session
  Page → Browser Tab


================================================================================
1. page.waitForEvent('popup')
================================================================================

WHAT?
--------------------------------------------------------------------------------
Waits for a new page/tab opened by the current page.

REAL-TIME SCENARIO:
--------------------------------------------------------------------------------
Application:
  Amazon Home Page → Click Terms & Conditions → New Tab Opens

Current page creates another page.

USAGE:
const [newPage] = await Promise.all([
    page.waitForEvent('popup'),
    page.click('text=Terms & Conditions')
]);

WHY USE Promise.all()?
--------------------------------------------------------------------------------
WRONG:
  await page.click("Terms");
  const popup = await page.waitForEvent("popup");

PROBLEM: Popup may open before Playwright starts listening.

CORRECT:
  const [popup] = await Promise.all([
      page.waitForEvent('popup'),
      page.click('text=Terms')
  ]);

VISUAL REPRESENTATION:
--------------------------------------------------------------------------------
Page A
   │
   └── Click
          │
          ▼
       Page B

Page B is a popup of Page A.

COMMON USE CASES:
--------------------------------------------------------------------------------
  • Terms & Conditions
  • Privacy Policy
  • Help Pages
  • Documentation Links
  • PDF Viewer
  • External Websites


================================================================================
2. context.waitForEvent('page')
================================================================================

WHAT?
--------------------------------------------------------------------------------
Waits for ANY new page created within the browser context.

REAL-TIME SCENARIO:
--------------------------------------------------------------------------------
Browser Context:
  Page A
  Page B
  Page C

Any page opens — Playwright listens at context level.

USAGE:
const [newPage] = await Promise.all([
    context.waitForEvent('page'),
    page.click('text=Open New Tab')
]);

VISUAL REPRESENTATION:
--------------------------------------------------------------------------------
Browser Context
 ├── Page A
 ├── Page B
 └── New Page

Context detects new page creation.

COMMON USE CASES:
--------------------------------------------------------------------------------
1. SSO Login:
   Application → Click Login → Microsoft Login Page → Authentication
   Use: context.waitForEvent('page')

2. Payment Gateway:
   Shopping Site → Click Pay → RazorPay / PayPal Page
   Use: context.waitForEvent('page')

3. OAuth Authentication:
   Application → Google Login → Google Page Opens
   Use: context.waitForEvent('page')


================================================================================
3. page.waitForEvent('page')
================================================================================

WHAT?
--------------------------------------------------------------------------------
This is INVALID.

EXAMPLE:
await page.waitForEvent('page');

RESULT:
Error: Unknown event "page"

WHY?
--------------------------------------------------------------------------------
Because the Page object does NOT emit a page event.

Page supports:
  • popup
  • download
  • dialog
  • request
  • response
  • load
  • domcontentloaded

NOT:
  • page


================================================================================
popup vs page EVENT COMPARISON
================================================================================

popup:
--------------------------------------------------------------------------------
  page.waitForEvent('popup')

Meaning: Current page creates another page.

Example: Parent Page → Click Link → Child Page

page:
--------------------------------------------------------------------------------
  context.waitForEvent('page')

Meaning: Any page created inside the browser context.

Example: Context → Page A, Page B, Page C

COMPARISON TABLE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ page.waitForEvent('popup') │ context.waitForEvent('page') │
├────────────────────────────┼────────────────────────────┼─────────────────────────────┤
│ Listener Scope             │ Current Page               │ Entire Context              │
│ Detects New Tab            │ Yes                        │ Yes                         │
│ Detects Popup              │ Yes                        │ Yes                         │
│ Detects Any New Page       │ No                         │ Yes                         │
│ More Specific              │ Yes                        │ No                          │
│ More Generic               │ No                         │ Yes                         │
└────────────────────────────┴────────────────────────────┴─────────────────────────────┘


================================================================================
WHICH ONE SHOULD I USE?
================================================================================

USE popup WHEN:
--------------------------------------------------------------------------------
Current page directly opens a new tab/window.

Examples:
  • Terms & Conditions
  • Privacy Policy
  • Help Link
  • External Documentation

CODE:
const [popup] = await Promise.all([
    page.waitForEvent('popup'),
    page.click()
]);

USE context page WHEN:
--------------------------------------------------------------------------------
You don't know which page will create the new page.

Examples:
  • SSO Login
  • OAuth Login
  • Payment Gateway
  • Multi-page Applications

CODE:
const [newPage] = await Promise.all([
    context.waitForEvent('page'),
    page.click()
]);


================================================================================
INTERVIEW QUESTIONS
================================================================================

Q1: Difference between popup and page event?
--------------------------------------------------------------------------------
ANSWER:
  popup waits for a page opened by the current page.
  page waits for any new page created within the browser context.

Q2: Is page.waitForEvent('page') valid?
--------------------------------------------------------------------------------
ANSWER:
  No. The Page object does not emit a page event.
  Only BrowserContext emits a page event.

Q3: Which is preferred?
--------------------------------------------------------------------------------
ANSWER:
  If the new tab is definitely opened by the current page,
  use page.waitForEvent('popup') because it is more specific.

  If any page within the browser context can create a new page,
  use context.waitForEvent('page').


