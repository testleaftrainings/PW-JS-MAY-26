PART 4: STORAGE STATE (AUTHENTICATION PERSISTENCE)
================================================================================

WHAT IS A BROWSER CONTEXT?
--------------------------------------------------------------------------------
A BrowserContext is an isolated browser profile.

Think:
  Chrome Profile A → cookies + localStorage + sessionStorage
  Chrome Profile B → completely separate identity

In Playwright:
const context = await browser.newContext();

Each context has its own:
  • cookies
  • localStorage
  • sessionStorage
  • authentication tokens

Basically → its own "user".

WHAT storageState() ACTUALLY DOES:
--------------------------------------------------------------------------------
await context.storageState({ path: 'auth.json' });

This command says:
  "Take everything that proves this user is logged in and serialize it into a file."

It captures:
  ✓ Cookies
  ✓ Local Storage
  ✓ Session Storage (origins-based)

It does NOT save DOM, tabs, or UI state.
Only authentication-related browser storage.

WHAT GETS SAVED (Real Example):
--------------------------------------------------------------------------------
{
  "cookies": [
    {
      "name": "session_id",
      "value": "abc123",
      "domain": ".example.com"
    }
  ],
  "origins": [
    {
      "origin": "https://example.com",
      "localStorage": [
        { "name": "token", "value": "jwt-token-value" }
      ]
    }
  ]
}

This is literally your logged-in identity bottled into JSON.

HOW IT WORKS INTERNALLY:
--------------------------------------------------------------------------------
When you log in:
  Username + Password → Server validates → Server sends cookie/token → Browser stores it

Next requests automatically include that cookie/token.

Playwright simply exports those stored credentials.
No magic. Just smart persistence.

TYPICAL WORKFLOW (Industry Standard):
--------------------------------------------------------------------------------
Step 1 — Login once (Run this only once):
await page.context().storageState({ path: 'auth.json' });

Step 2 — Reuse login everywhere:
test.use({ storageState: 'auth.json' });
  Browser opens already authenticated.
  No login steps executed.

IMPORTANT SUBTLE DETAIL:
--------------------------------------------------------------------------------
Storage state is tied to:
  • domain
  • cookie scope
  • same-origin policy

If your app redirects to another domain (SSO like Microsoft login), storage must
include those domains too. Otherwise authentication appears "lost".

COMMON MISUNDERSTANDING:
--------------------------------------------------------------------------------
People think this saves session like a snapshot.
It doesn't.

It saves credentials, not the browser state.

So:
  open tabs ❌
  scroll position ❌
  UI elements ❌
  login tokens ✅

FRAMEWORK PATTERN:
--------------------------------------------------------------------------------
globalSetup.spec.ts
       ↓
  login once
       ↓
  generate auth.json
       ↓
  all tests reuse it


