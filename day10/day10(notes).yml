GOLDEN RULES:
================================================================================

  1. Always use Promise.all() for filechooser events
  2. Use storageState() for login persistence
  3. Timestamp files with toISOString() for uniqueness
  4. Use path.join() for cross-platform path safety
  5. page.waitForEvent('page') is INVALID - use context.waitForEvent('page')

