part 2: TYPESCRIPT INTRODUCTION
================================================================================

TYPESCRIPT INSTALLATION COMMANDS
================================================================================

GLOBAL INSTALLATION:
--------------------------------------------------------------------------------
1. npm install typescript -g
2. Check: tsc --version


LOCAL PROJECT LEVEL INSTALLATION:
--------------------------------------------------------------------------------
npm install --save-dev typescript


RUNNING .TS FILE DIRECTLY
================================================================================

Follow below steps to directly run a .ts file without compiling to JavaScript:

STEP 1: Install ts-node globally
--------------------------------------------------------------------------------
npm install -g ts-node

STEP 2: Initialize TypeScript configuration
--------------------------------------------------------------------------------
npx tsc --init  → This will create a default tsconfig.json

STEP 3: Modify tsconfig.json
--------------------------------------------------------------------------------
{
  "compilerOptions": {
    "target": "ES2020",
    "module": "commonjs",
    "strict": true,
    "esModuleInterop": true,
    "moduleResolution": "node",
    "skipLibCheck": true,
    "ignoreDeprecations": "6.0",
    "types": ["node"],
    "resolveJsonModule": true
  }
}

STEP 4: Execute the file directly
--------------------------------------------------------------------------------
ts-node filename.ts

================================================================================
                         COMPILATION PROCESS
================================================================================

TRADITIONAL WAY:
--------------------------------------------------------------------------------
Step 1: tsc filename.ts  → Produces filename.js
Step 2: node filename.js

EASY WAY:
--------------------------------------------------------------------------------
npx ts-node filename.ts

WHY:
  • No manual compilation
  • No JS generation
  • Direct execution


================================================================================
WHY TYPESCRIPT IN AUTOMATION?
================================================================================

PROBLEM IN JAVASCRIPT:
--------------------------------------------------------------------------------
• No type checking
• Errors found only during execution
• Large frameworks become difficult to maintain

SOLUTION:
--------------------------------------------------------------------------------
TypeScript introduces static typing.
Errors are identified during compilation itself.

REAL-TIME BENEFIT:
--------------------------------------------------------------------------------
• Prevents incorrect test data
• Prevents framework misuse
• Improves IntelliSense
• Reduces flaky failures

================================================================================
THE TYPE SYSTEM
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
A set of rules that a type checker uses to assign types to your program.

TWO KINDS OF TYPE SYSTEMS:
--------------------------------------------------------------------------------
1. Explicit syntax type systems (you tell TypeScript the type)
2. Inferred type systems (TypeScript figures out the type automatically)


TYPE ANNOTATIONS:
--------------------------------------------------------------------------------
To explicitly signal to TypeScript what your types are, use annotations.

Syntax: value: type

EXAMPLES:
--------------------------------------------------------------------------------
let a: number = 1           // a is a number
let b: string = 'hello'     // b is a string
let c: boolean[] = [true, false]  // c is an array of booleans


TYPE INFERENCE:
--------------------------------------------------------------------------------
If you want TypeScript to infer your types for you, just leave them off:

let a = 1                   // a is a number (inferred)
let b = 'hello'             // b is a string (inferred)
let c = [true, false]       // c is an array of booleans (inferred)



================================================================================
                         TYPESCRIPT DATA TYPES
================================================================================

1. number
--------------------------------------------------------------------------------
WHAT: Used to store numeric values.

REAL-TIME EXAMPLE - Test Execution Count:
--------------------------------------------------------------------------------
let totalTests: number = 250;
let passedTests: number = 245;
let failedTests: number = 5;

WHY: Execution metrics are always numeric.


2. string
--------------------------------------------------------------------------------
WHAT: Used to store textual values.

REAL-TIME EXAMPLE - Login Credentials:
--------------------------------------------------------------------------------
let username: string = "admin@testleaf.com";
let password: string = "Test@123";

WHY: Usernames, passwords, URLs and locator names are strings.


3. boolean
--------------------------------------------------------------------------------
WHAT: Stores true or false.

REAL-TIME EXAMPLE - Element Visibility Validation:
--------------------------------------------------------------------------------
let isLoginButtonVisible: boolean = true;

PLAYWRIGHT EXAMPLE:
--------------------------------------------------------------------------------
const isVisible: boolean = await page.locator("#login").isVisible();

WHY: Most validations produce true or false results.


4. undefined
--------------------------------------------------------------------------------
WHAT: Variable declared but value not assigned.

REAL-TIME EXAMPLE - Optional Test Data:
--------------------------------------------------------------------------------
let otp: string | undefined;

WHY: OTP may not be available immediately.


5. null
--------------------------------------------------------------------------------
WHAT: Represents intentional absence of value.

REAL-TIME EXAMPLE - User Profile Data:
--------------------------------------------------------------------------------
let profilePicture: string | null = null;

WHY: User has not uploaded a profile picture.


6. any
--------------------------------------------------------------------------------
WHAT: Accepts any datatype.

WHY: Useful when data structure is completely unknown.

REAL-TIME EXAMPLE - Dynamic API Response:
--------------------------------------------------------------------------------
let response: any = await apiResponse.json();

RISK:
console.log(response.userName.toUpperCase());

If API returns: { "userName": 12345 }

Runtime Failure: toUpperCase is not a function

INTERVIEW POINT:
any disables TypeScript safety. Use only when absolutely required.


7. unknown
--------------------------------------------------------------------------------
WHAT: Accepts any datatype but validation is mandatory.

WHY: Safer alternative to any.

REAL-TIME EXAMPLE - Third-Party API Response:
--------------------------------------------------------------------------------
let response: unknown = await apiResponse.json();

Before Usage:
--------------------------------------------------------------------------------
if (typeof response === "object" && response !== null) {
    console.log(response);
}

================================================================================
TYPESCRIPT DATA TYPES - any vs unknown
================================================================================

✅ any — "Turn Off TypeScript"
--------------------------------------------------------------------------------
let data: any = "Message received from the server";
data = 1234;
data = true;

data.toUpperCase();  // ✅ No error at compile time
data.push(10);       // ✅ No error
data();              // ✅ No error

🔴 PROBLEM:
TypeScript does not check anything on 'any'.
Even wrong operations compile successfully, and your app crashes at runtime.

So "any" means: "I don't care about type safety."


✅ unknown — "Safe Version of any"
--------------------------------------------------------------------------------
let value: unknown;

value = 40;
value = "Hello";

value.toUpperCase(); // ❌ ERROR (compile time)

TypeScript blocks you here because: "I don't know what type this is yet."

FIX - Type Checking:
--------------------------------------------------------------------------------
if (typeof value === "string") {
    console.log(value.toUpperCase()); // ✅ Allowed
}

✅ Now TypeScript knows it is a string.
✅ You proved the type — so it allows safe operations.


REAL TIME EXAMPLE FOR "unknown" DATATYPE:
--------------------------------------------------------------------------------
Reusable Utility Functions

Suppose you're building a common logger:

function logData(data: unknown) {
    if (typeof data === "string") {
        console.log(data.toUpperCase());
    }
}

If you use 'any', someone can pass: logData(123); and it crashes.
With unknown, framework forces validation.


================================================================================
COMPARISON: any vs unknown
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ any                    │ unknown                │
├────────────────────────────┼────────────────────────┼────────────────────────┤
│ Type Safety                │ ❌ None                │ ✅ Required            │
│ Compile-time Checking      │ ❌ Disabled            │ ✅ Enabled             │
│ Can call any method        │ ✅ Yes (dangerous)     │ ❌ No (needs check)    │
│ Runtime crashes            │ ⚠️ Possible            │ ✅ Prevented           │
│ Framework recommendation   │ ❌ Avoid               │ ✅ Use for unknown data│
└────────────────────────────┴────────────────────────┴────────────────────────┘




8. never
--------------------------------------------------------------------------------
WHAT: Represents a function that never returns.

WHY: Execution stops completely.

DEFINITION:
--------------------------------------------------------------------------------
In Playwright, 'never' is used for functions that permanently stop a test when
a critical failure happens.

EXAMPLE 1 - Simple Beginner Example:
--------------------------------------------------------------------------------
function throwError(message: string): never {
    throw new Error(message);
}

function checkNumber(num: number) {
    if (num > 0) {
        console.log("Positive number");
    } else {
        throwError("Number must be positive");
    }
}

checkNumber(5);   // Output: Positive number
checkNumber(-1);  // Throws Error: Number must be positive


EXAMPLE 2 - Real Time Playwright Example:
--------------------------------------------------------------------------------
import { test, expect } from "@playwright/test";

// A function that always stops the test
function stopTest(message: string): never {
    throw new Error(message);  // ❌ Test execution stops here
}

test("Login test with never example", async ({ page }) => {

    await page.goto("http://leaftaps.com/opentaps/control/main");

    const title = await page.title();

    if (title !== "Login") {  // when the title value is false
        stopTest("Login page did not load correctly"); // ✅ never
    }

    // ✅ This line runs ONLY if the title is correct
    console.log("Test continues safely...");
});


KEY CHARACTERISTICS OF never:
--------------------------------------------------------------------------------
• Function NEVER returns a value
• Function throws an exception OR
• Function has infinite loop
• Used for error handling functions
• Indicates unreachable code after call



9. tuple
--------------------------------------------------------------------------------
WHAT: Fixed-size array with fixed datatype order.

WHY: Some data always follows a specific order.

REAL-TIME EXAMPLE 1 - Login Credentials:
--------------------------------------------------------------------------------
let loginData: [string, string] = [
    "admin@testleaf.com",
    "Test@123"
];

Meaning:
  Index 0 → Username
  Index 1 → Password

REAL-TIME EXAMPLE 2 - API Validation Result:
--------------------------------------------------------------------------------
let apiResult: [number, string, boolean] = [
    200,
    "Success",
    true
];

Meaning:
  Index 0 → Status Code
  Index 1 → Message
  Index 2 → Validation Result

REAL-TIME EXAMPLE 3 - Execution Summary:
--------------------------------------------------------------------------------
let executionSummary: [string, number, number] = [
    "Regression",
    250,
    245
];

Meaning:
  Index 0 → Suite Name
  Index 1 → Total Tests
  Index 2 → Passed Tests




