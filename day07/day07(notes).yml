PART 1: ALERT HANDLING IN PLAYWRIGHT - DEEP DIVE
================================================================================


FIRST UNDERSTAND WHAT AN ALERT IS
================================================================================

JavaScript Alerts are Browser Native Dialogs.

Examples:
--------------------------------------------------------------------------------
alert("Hello");
confirm("Are you sure?");
prompt("Enter your name");

These are NOT HTML elements.

They belong to:
  Browser Process

NOT to:
  DOM or Render Process


BROWSER ARCHITECTURE RELATION
================================================================================

When this executes:
alert("Hello");

Flow:
--------------------------------------------------------------------------------
Application JS
      ↓
Render Process
      ↓
Browser Process
      ↓
Native Dialog Appears

At this moment:
  • DOM becomes blocked
  • User interaction stops
  • JavaScript execution pauses

This is how browser dialogs work.


WHY CAN'T LOCATOR HANDLE ALERTS?
================================================================================

Many beginners try:
  page.locator("alert")
or
  page.getByText("OK")

This will NEVER work.

Reason:
  Alert is NOT part of DOM

It belongs to Browser Process.
Inspect Element won't show it.


 page.on()
================================================================================

page.on("dialog", async (alert) => {
  // handler
})

WHAT IS page.on()?
--------------------------------------------------------------------------------
It is an Event Listener.

Syntax:
  page.on(eventName, callback)

Similar to:
  button.addEventListener("click", callback)


WHAT HAPPENS INTERNALLY?
--------------------------------------------------------------------------------
page.on("dialog", callback)

means:
  "Hey Playwright, if any dialog appears, immediately notify me."

Playwright registers an event listener.

INTERNAL FLOW:
--------------------------------------------------------------------------------
Your Test
      ↓
page.on("dialog")
      ↓
Listener Registered
      ↓
Waiting...
      ↓
Button Click
      ↓
Application Creates Alert
      ↓
Browser Process Creates Dialog
      ↓
Playwright Detects Dialog
      ↓
dialog Event Fires
      ↓
Callback Executes


WHY LISTENER BEFORE CLICK?
================================================================================

CORRECT:
--------------------------------------------------------------------------------
page.on("dialog", callback)
await page.click()

WRONG:
--------------------------------------------------------------------------------
await page.click()
page.on("dialog", callback)

Reason:
  Alert may appear before listener is registered.
  Then Playwright misses the event.


UNDERSTANDING THE DIALOG OBJECT
================================================================================

Inside the callback, alert is a Dialog object.

Dialog Object contains:
  • type()
  • message()
  • accept()
  • dismiss()
  • defaultValue()


alert.type()
--------------------------------------------------------------------------------
Returns the dialog type.

Possible values:
  • alert
  • confirm
  • prompt
  • beforeunload

Example:
alert("Hello") returns "alert"


alert.message()
--------------------------------------------------------------------------------
Returns the displayed text.

Example:
alert("Welcome to Testleaf")

Code:
console.log(alert.message())  // Output: Welcome to Testleaf


alert.accept()
--------------------------------------------------------------------------------
Equivalent to: User clicks OK

Example:
await alert.accept()


alert.dismiss()
--------------------------------------------------------------------------------
Equivalent to: User clicks Cancel

Example:
await alert.dismiss()


PROMPT HANDLING
================================================================================

Prompt Dialog:
prompt("Enter Name")

Normally:
  User Types Something → Clicks OK

Playwright:
await alert.accept("Testleaf")

Equivalent:
  Enter Name: Testleaf → Click OK


HIDDEN PLAYWRIGHT FEATURE
================================================================================

When you have:
page.on("dialog", async (dialog) => {
    await dialog.accept();
})

and an alert appears:

Playwright:
  Auto Pauses Execution → Handles Alert → Continues Test

No explicit wait required.






INTERVIEW ANSWER (Ready to Use)
================================================================================

"JavaScript alerts are browser-native dialogs that belong to the Browser
Process and are not part of the DOM. Therefore, Playwright cannot interact
with them using locators. Playwright listens for dialog events using
page.on('dialog') or page.waitForEvent('dialog'). When a dialog appears,
Playwright creates a Dialog object through which we can inspect the dialog
type, message, and perform actions such as accept() or dismiss(). For
single-alert scenarios, waitForEvent('dialog') is generally preferred, while
page.on('dialog') is useful when multiple dialogs may appear during the test
execution."


