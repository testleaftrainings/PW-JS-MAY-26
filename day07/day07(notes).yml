└─────────────┴───────────────────────────────────────────────────────────────┘

GOLDEN RULES:
--------------------------------------------------------------------------------
• Use unknown instead of any whenever possible
• Use never for framework exceptions
• Use tuple when order and datatype are fixed

SUMMARY:
  any     → Avoid when possible
  unknown → Preferred for external data
  never   → Used for fatal framework failures
  tuple   → Used for fixed structured test data


================================================================================
                            DATA STRUCTURES  
          (TypeScript + Real-Time Automation Framework Perspective)
================================================================================

1. WHAT IS A DATA STRUCTURE?
================================================================================

A Data Structure is a way of organizing and storing data so that it can be
accessed, managed, and modified efficiently.

REAL-TIME EXAMPLE:
--------------------------------------------------------------------------------
Instead of:
let username = "admin";
let password = "admin123";
let url = "https://qa-app.com";

Store related data together:
const config = {
    username: "admin",
    password: "admin123",
    url: "https://qa-app.com"
}

This improves maintainability and readability.


2. WHY DO WE NEED DATA STRUCTURES?
================================================================================

WITHOUT DATA STRUCTURES:
--------------------------------------------------------------------------------
let empId1 = 101;
let empId2 = 102;
let empId3 = 103;

Difficult to manage when data grows.

WITH DATA STRUCTURES:
--------------------------------------------------------------------------------
const empIds = [101, 102, 103];

Easy to: Add, Remove, Search, Sort, Iterate


3. ARRAY
================================================================================

Stores multiple values in a single variable.

const browsers = ["chrome", "edge", "firefox", "safari"];

REAL-TIME AUTOMATION EXAMPLE - Store supported browsers:
--------------------------------------------------------------------------------
const browsers = ["chrome", "edge", "firefox", "safari"];

Access: browsers[0]  // chrome

FRAMEWORK USAGE:
  • Test Data
  • URLs
  • Browser Names
  • User Roles
  • Expected Values


4. OBJECT
================================================================================

Stores data as key-value pairs.

const employee = {
    empId: 882,
    designation: "Sr.SDET"
}

REAL-TIME AUTOMATION EXAMPLE - Environment Configuration:
--------------------------------------------------------------------------------
const config = {
    username: "DemoCSR",
    password: "crmsfa",
    url: "https://leaftaps.com"
}

FRAMEWORK USAGE:
  • Config Files
  • Test Data
  • API Payloads
  • Environment Settings


5. NESTED OBJECT
================================================================================

Object inside another object.

const empInfo = {
    bhuvaneshInfo: {
        empId: 882,
        designation: "Sr.SDET"
    },
    vinothInfo: {
        empId: 445,
        designation: "SDET"
    }
}

STRUCTURE:
--------------------------------------------------------------------------------
empInfo
│
├── bhuvaneshInfo
│   ├── empId
│   └── designation
│
└── vinothInfo
    ├── empId
    └── designation

REAL-TIME AUTOMATION EXAMPLE - Multiple Environment Configurations:
--------------------------------------------------------------------------------
const environments = {
    qa: {
        url: "https://qa-app.com"
    },
    prod: {
        url: "https://prod-app.com"
    }
}

Access: environments.qa.url


6. TYPE ALIAS
================================================================================

Used to create reusable custom types.

WITHOUT TYPE ALIAS:
--------------------------------------------------------------------------------
bhuvaneshInfo: { empId: number, phno: number }
vinothInfo: { empId: number, phno: number }

Repeated structure.

WITH TYPE ALIAS:
--------------------------------------------------------------------------------
type Employee = {
    empId: number,
    phno: number
}

Reuse:
bhuvaneshInfo: Employee
vinothInfo: Employee

BENEFITS:
  • Reusability
  • Readability
  • Maintainability
  • Less duplication


7. UNION TYPE ( | )
================================================================================

Represents "OR".

type Browser = "chrome" | "edge" | "firefox" | "safari";

Meaning: browser can be chrome OR edge OR firefox OR safari

REAL-TIME AUTOMATION EXAMPLE:
--------------------------------------------------------------------------------
type Environment = "QA" | "UAT" | "PROD";

Restricts invalid values.

let env: Environment = "QA";     // Valid
let env: Environment = "DEV";    // Invalid

