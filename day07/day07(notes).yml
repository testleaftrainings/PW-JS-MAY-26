┌─────────────────────────────────────────────────────────────────────────────┐
│ Type        │ Usage                                                         │
├─────────────┼───────────────────────────────────────────────────────────────┤
│ number      │ Execution counts, status codes                                │
│ string      │ Credentials, URLs, locators                                   │
