================================================================================
                    9. VALIDATION BEFORE SAVING
================================================================================

Before inserting a record, ServiceNow validates all mandatory fields.

Mandatory fields discussed:
  • Caller
  • Short Description

If any mandatory field is missing:
  • Validation fails
  • The record is NOT inserted into the Incident table
  • The user remains on the same page


================================================================================
                    10. IMPORTANT LEARNING
================================================================================

Seeing an Incident Number does NOT mean the record exists.

EXAMPLE:
--------------------------------------------------------------------------------
Open New Incident
       ↓
ServiceNow displays: INC0010007
       ↓
User clicks Submit
       ↓
Mandatory fields missing
       ↓
Validation fails
       ↓
Record NOT saved

The Incident Number is generated BEFORE saving.
The record is inserted into the database ONLY after successful validation.


================================================================================
                    11. UI vs REST API
================================================================================

CREATING AN INCIDENT THROUGH THE UI:
--------------------------------------------------------------------------------
Login → Incident → Create New → Fill Form → Submit → Incident Created

CREATING AN INCIDENT THROUGH REST API:
--------------------------------------------------------------------------------
POST /api/now/table/incident

BOTH APPROACHES ULTIMATELY PERFORM THE SAME BUSINESS OPERATION:
  → Insert a record into the Incident table.


================================================================================
                          QUICK REVISION
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Concept            │ Remember                                              │
├────────────────────┼───────────────────────────────────────────────────────┤
│ ServiceNow         │ Enterprise workflow automation platform               │
│ Data Storage       │ Information is stored in tables                       │
│ Incident Table     │ Stores incident records                               │
│ Table API          │ Used for CRUD operations                              │
│ Incident URL       │ /api/now/table/incident                               │
│ Caller             │ Person reporting the issue                            │
│ Configuration Item │ Affected asset from CMDB                              │
│ Assignment Group   │ Team responsible                                      │
│ Short Description  │ Mandatory one-line summary                            │
│ Submit             │ Triggers validation and record creation               │
│ Validation         │ Mandatory fields checked before saving                │
│ Incident Number    │ Generated before save; not proof record exists        │
│ UI & REST          │ Both perform same database operation                  │
└────────────────────┴───────────────────────────────────────────────────────┘


================================================================================
                             KEY TAKEAWAYS
================================================================================

  • ServiceNow stores business information in tables, and the Table API is the
    primary REST interface for accessing those tables.

  • External systems integrate with ServiceNow through REST APIs, eliminating
    the need for manual UI interactions.

  • An Incident can be created through either the UI or a REST API, but both
    ultimately insert a record into the Incident table.

  • The Incident form contains business fields (Caller, Category, Impact,
    Urgency, Assignment Group, etc.), each mapping to corresponding database
    fields used by the REST API.

  • Clicking Submit does not immediately save the record. ServiceNow first
    validates mandatory fields, executes business rules, and only then inserts
    the record into the database.

  • An Incident Number is generated before the record is saved. Therefore,
    seeing an Incident Number alone does NOT guarantee that the record exists
    in the database.


