================================================================================
                    6. INCIDENT FORM FIELDS
================================================================================

NUMBER:
--------------------------------------------------------------------------------
Example: INC0010007

  • Automatically generated
  • Business identifier
  • Generated before the record is saved
  • Not supplied while creating records through REST APIs

CALLER (⭐ Important):
--------------------------------------------------------------------------------
Represents: Who reported the issue?

REST field: caller_id

CATEGORY:
--------------------------------------------------------------------------------
Represents the type of issue.

Examples: Hardware, Software, Network, Inquiry

SUBCATEGORY:
--------------------------------------------------------------------------------
Provides a more specific classification.

Example: Hardware → Laptop

SERVICE:
--------------------------------------------------------------------------------
Business service affected.

Examples: VPN, Office365, SAP

SERVICE OFFERING:
--------------------------------------------------------------------------------
Specific offering within a business service.

Example: Office365 → Outlook, Teams, OneDrive

CONFIGURATION ITEM (CI):
--------------------------------------------------------------------------------
Represents the affected asset.

Examples: Laptop, Server, Database, Network Device

Information comes from the CMDB.

CHANNEL:
--------------------------------------------------------------------------------
Indicates how the incident was created.

Examples: Portal, Phone, Email, REST API, Monitoring Tool

STATE:
--------------------------------------------------------------------------------
Represents the lifecycle of an incident.

  New → In Progress → On Hold → Resolved → Closed

IMPACT:
--------------------------------------------------------------------------------
Represents: How many users or business services are affected?

Values: High, Medium, Low

URGENCY:
--------------------------------------------------------------------------------
Represents: How quickly must the issue be resolved?

Values: High, Medium, Low

PRIORITY:
--------------------------------------------------------------------------------
Automatically calculated by ServiceNow.

Generally derived from: Impact + Urgency

Users normally do not edit this directly.

ASSIGNMENT GROUP:
--------------------------------------------------------------------------------
Represents the team responsible for resolving the incident.

Examples: Network Team, Windows Team, Database Team

ASSIGNED TO:
--------------------------------------------------------------------------------
Specific engineer responsible for the incident.

SHORT DESCRIPTION (⭐ Mandatory):
--------------------------------------------------------------------------------
Provides a one-line summary of the issue.

Example: "Laptop not booting"

DESCRIPTION:
--------------------------------------------------------------------------------
Detailed explanation of the issue.


