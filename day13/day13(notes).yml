================================================================================
                    INTERVIEW QUESTIONS
================================================================================

Q1: What is a Web Service?
--------------------------------------------------------------------------------
A software component that enables different applications to communicate and
exchange data over a network using standard web protocols like HTTP.

Q2: Why are Web Services important in Microservices?
--------------------------------------------------------------------------------
Microservices are independent applications that communicate over a network.
They use Web Services (REST/SOAP APIs) to exchange data.

Q3: What are HTTP Headers?
--------------------------------------------------------------------------------
Key-value pairs containing metadata about an HTTP request or response.

Q4: Difference between Content-Type and Accept?
--------------------------------------------------------------------------------
Content-Type: Format of the request body.
Accept: Format expected in the response.

Q5: What are HTTP Methods?
--------------------------------------------------------------------------------
HTTP Methods define the action the client wants the server to perform on a
resource.

Q6: Map CRUD operations to HTTP methods.
--------------------------------------------------------------------------------
CREATE → POST
READ   → GET
UPDATE → PUT / PATCH
DELETE → DELETE

Q7: Difference between PUT and PATCH?
--------------------------------------------------------------------------------
PUT: Replaces the entire resource.
PATCH: Updates only specified fields.

Q8: What are HTTP Status Codes?
--------------------------------------------------------------------------------
Three-digit numbers returned by the server indicating the outcome of processing
a request.

Q9: Difference between 401 and 403?
--------------------------------------------------------------------------------
401: Authentication required or invalid.
403: Authenticated but not authorized.

Q10: Difference between Path Parameter and Query Parameter?
--------------------------------------------------------------------------------
Path Parameter: Identifies a specific resource.
Query Parameter: Filters or modifies the result.

Q11: Difference between URI and URL?
--------------------------------------------------------------------------------
URI: Identifies a resource.
URL: Identifies and locates a resource.


