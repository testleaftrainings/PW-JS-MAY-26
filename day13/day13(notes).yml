                        5. URL ANATOMY
================================================================================

EXAMPLE:
--------------------------------------------------------------------------------
https://dev324532.service-now.com/api/now/table/incident

PROTOCOL:
--------------------------------------------------------------------------------
https
Defines how communication happens.
Examples: HTTP, HTTPS, FTP

DOMAIN / HOST:
--------------------------------------------------------------------------------
dev324532.service-now.com
Identifies the server.

Components:
  dev324532  → Subdomain
  service-now → Domain
  com        → Top-level domain

PATH:
--------------------------------------------------------------------------------
/api/now/table/incident

Breakdown:
  /api      → API module
  /now      → ServiceNow namespace
  /table    → Table API
  /incident → Incident resource

COMPLETE INTERPRETATION:
--------------------------------------------------------------------------------
"Using HTTPS, connect to the ServiceNow instance dev324532, access the Table
API, and work with the Incident table."

BASE URL:
--------------------------------------------------------------------------------
https://dev324532.service-now.com

Common root address. Usually remains constant.

ENDPOINT:
--------------------------------------------------------------------------------
/api/now/table/incident

Represents a specific resource or API.

Examples:
  /api/now/table/user
  /api/now/table/problem
  /api/now/table/change_request


================================================================================
                        6. URL vs URI
================================================================================

URI (Uniform Resource Identifier):
--------------------------------------------------------------------------------
Identifies a resource.
Example: /users/101

URL (Uniform Resource Locator):
--------------------------------------------------------------------------------
Identifies AND locates a resource.
Example: https://example.com/users/101

RELATIONSHIP:
--------------------------------------------------------------------------------
                 URI
               /     \
              /       \
        URL           URN

Every URL is a URI, but not every URI is a URL.

URI vs URL:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ URI                          │ URL                                           │
├──────────────────────────────┼───────────────────────────────────────────────┤
│ Identifies resource          │ Identifies and locates resource              │
│ May not include protocol     │ Includes protocol and host                   │
│ Broader concept              │ Specific type of URI                         │
└──────────────────────────────┴───────────────────────────────────────────────┘


