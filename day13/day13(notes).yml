================================================================================
                             KEY TAKEAWAYS
================================================================================

  • A Web Service enables communication between applications over HTTP/HTTPS.
  • Microservices rely on Web Services for inter-service communication.
  • An HTTP request consists of a Method, URL, Headers, and optionally a Body.
  • HTTP Headers carry metadata, while the Body carries business data.
  • HTTP Methods define CRUD operations.
  • HTTP Status Codes communicate the result of a request.
  • Parameterization makes APIs dynamic through Path, Query, Header, Body,
    and Form parameters.
  • A Base URL identifies the API server, while an Endpoint identifies a
    specific resource.
  • Every URL is a URI, but not every URI is a URL.

