                    PLAYWRIGHT API TESTING NOTES – DAY 13
================================================================================

Topic: Web Services Testing using Playwright (ServiceNow Examples)


================================================================================
                    1. INTRODUCTION TO PLAYWRIGHT API TESTING
================================================================================

Playwright is not limited to browser automation. It also provides built-in
support for testing REST APIs.

The APIRequestContext object is responsible for sending HTTP requests such as:
  • GET
  • POST
  • PUT
  • PATCH
  • DELETE

EXAMPLE:
const response = await request.post(url, {
    data: {
        short_description: "Server Down"
    }
});


================================================================================
                    2. UNDERSTANDING THE post() METHOD
================================================================================

SYNTAX:
--------------------------------------------------------------------------------
post(
    url: string,
    options?: { ... }
): Promise<APIResponse>

The method contains:
  • URL (Mandatory)
  • Options (Optional)
  • Returns an APIResponse

URL:
--------------------------------------------------------------------------------
Represents the API endpoint where the request is sent.

Example:
const url = "https://devxxxx.service-now.com/api/now/table/incident";

OPTIONS:
--------------------------------------------------------------------------------
The options parameter is optional.

await request.post(url)
await request.post(url, { ... })

Both are valid.

The options object contains additional information required by the API request.

Common properties:
  • headers
  • data
  • params
  • form
  • multipart
  • timeout
  • failOnStatusCode
  • ignoreHTTPSErrors
  • maxRedirects
  • maxRetries


================================================================================
                    3. RETURN TYPE
================================================================================

Promise<APIResponse>

Since the request is asynchronous, Playwright returns a Promise.

Example:
const response = await request.post(...)

The response object contains:
  • Status
  • Headers
  • Response Body
  • Cookies


================================================================================
                    4. COMMON REQUEST OPTIONS
================================================================================

data:
--------------------------------------------------------------------------------
Represents the request body.

Example:
await request.post(url, {
    data: {
        short_description: "Server Down",
        category: "Network"
    }
})

Playwright automatically converts the JavaScript object into JSON.

headers:
--------------------------------------------------------------------------------
Used to send metadata about the request.

Example:
headers: {
    Authorization: `Bearer ${token}`,
    "Content-Type": "application/json",
    Accept: "application/json"
}

Headers are processed before the request body.

Common headers:
┌─────────────────────────────────────────────────────────────────────────────┐
│ Header        │ Purpose                                                    │
├───────────────┼────────────────────────────────────────────────────────────┤
│ Authorization │ Authentication                                             │
│ Content-Type  │ Request Body Format                                        │
│ Accept        │ Expected Response Format                                   │
└───────────────┴────────────────────────────────────────────────────────────┘

params:
--------------------------------------------------------------------------------
Used for Query Parameters.

Example:
params: {
    sysparm_limit: 5
}

Generated URL: ...?sysparm_limit=5

form:
--------------------------------------------------------------------------------
Used for application/x-www-form-urlencoded.

Example:
form: {
    username: "admin",
    password: "admin123"
}

multipart:
--------------------------------------------------------------------------------
Used for file uploads.

Example:
multipart: {
    file: fs.createReadStream("error.png")
}

timeout:
--------------------------------------------------------------------------------
Maximum waiting time for the response.

Example: timeout: 30000

failOnStatusCode:
--------------------------------------------------------------------------------
If set to true, Playwright throws an exception for non-success HTTP status
codes.

Example: failOnStatusCode: true

ignoreHTTPSErrors:
--------------------------------------------------------------------------------
Ignores SSL certificate validation errors.

Example: ignoreHTTPSErrors: true

maxRedirects:
--------------------------------------------------------------------------------
Maximum number of redirects Playwright will follow automatically.

maxRetries:
--------------------------------------------------------------------------------
Automatically retries failed requests (supported retry scenarios).


================================================================================
                    5. UNDERSTANDING HEADERS
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
headers?: {
    [key: string]: string
}

It means:
  • Header name must be a string.
  • Header value must be a string.

Example:
headers: {
    Authorization: "Bearer token",
    Accept: "application/json"
}

WHY ARE SOME KEYS ENCLOSED IN QUOTES?
--------------------------------------------------------------------------------
Keys containing special characters must be enclosed in quotes.

Correct:
headers: {
    "Content-Type": "application/json"
}

Incorrect:
headers: {
    Content-Type: "application/json"
}

Reason: JavaScript interprets Content-Type as Content - Type, which is treated
as a subtraction expression.

Keys without special characters do not require quotes.

Example:
Authorization: "Bearer token"
Accept: "application/json"


================================================================================
                    6. UNDERSTANDING THE API RESPONSE
================================================================================

After sending the request:
const response = await request.post(...)

Playwright returns an APIResponse.

It contains:
APIResponse
│
├── status()
├── headers()
├── ok()
├── json()
└── text()


================================================================================
                    7. response.status()
================================================================================

Returns the HTTP Status Code.

Example: response.status()
Output: 201

Used for validating whether the API returned the expected status.


================================================================================
                    8. response.headers()
================================================================================

Returns all response headers.

Example: response.headers()
Output:
{
    "content-type": "application/json",
    "content-length": "185"
}


================================================================================
                    9. response.ok()
================================================================================

Returns a boolean value: true or false.

It internally checks whether the HTTP status code represents a successful
response (generally 2xx).


================================================================================
                    10. response.json()
================================================================================

SIGNATURE:
response.json(): Promise<any>

Purpose: Converts the response body into a JavaScript object.

Example Response:
{
    "result": {
        "number": "INC0010008"
    }
}

Usage:
const body = await response.json();

Access properties:
body.result.number

WHY Promise?
Reading and parsing the response body is asynchronous.

Hence, await response.json() is required.

WHY any?
Playwright cannot predict the structure of every API response.

Therefore it returns: Promise<any>


================================================================================
                    11. response.text()
================================================================================

Returns the response body as plain text.

Example:
const text = await response.text();

Used when the response is:
  • Plain Text
  • HTML
  • XML
  • Non-JSON content


================================================================================
                    12. COMPARISON OF RESPONSE METHODS
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Method             │ Returns            │ Await Required                    │
├────────────────────┼────────────────────┼───────────────────────────────────┤
│ response.status()  │ HTTP Status Code   │ No                                │
│ response.headers() │ Response Headers   │ No                                │
│ response.ok()      │ Boolean            │ No                                │
│ response.json()    │ JavaScript Object  │ Yes                               │
│ response.text()    │ Plain Text         │ Yes                               │
└────────────────────┴────────────────────┴───────────────────────────────────┘


================================================================================
                    13. RETRIEVING VALUES FROM API RESPONSE
================================================================================

Example Response:
{
    "result": {
        "sys_id": "12345",
        "number": "INC0010008",
        "short_description": "Server Down"
    }
}

Retrieving values:
const body = await response.json();
const sysId = body.result.sys_id;
const incidentNumber = body.result.number;
const description = body.result.short_description;


================================================================================
                    14. API VALIDATION BEST PRACTICES
================================================================================

Always validate the HTTP response before extracting response data.

RECOMMENDED APPROACH:
expect(response.status()).toBe(201);
const body = await response.json();

AVOID directly accessing properties before confirming the request was successful.

INCORRECT:
const body = await response.json();
const sysId = body.result.sys_id;

If the API returns an error response, result may not exist, causing runtime
errors.


================================================================================
                    15. SUCCESSFUL vs FAILED API RESPONSES
================================================================================

SUCCESSFUL RESPONSE:
{
    "result": {
        "sys_id": "123",
        "number": "INC0010008"
    }
}

ERROR RESPONSE:
{
    "error": {
        "message": "User is not authenticated"
    },
    "status": "failure"
}

Always inspect the response structure before accessing properties.


================================================================================
                    16. METHOD CHAINING IN SERVICENOW
================================================================================

STEP 1: Create Incident (POST)
  Retrieve: sys_id, Incident Number

STEP 2: Retrieve Incident (GET /api/now/table/incident/{sys_id})
  Use the sys_id returned from the POST response.

STEP 3: Validate Retrieved Record
  expect(body.result.sys_id).toBe(userId);
  expect(body.result.number).toBe(incidentNumber);


================================================================================
                    17. SERVICENOW RECORD IDENTIFIERS
================================================================================

sys_id:
--------------------------------------------------------------------------------
  • Internal unique identifier
  • Used by ServiceNow APIs
  • Primary identifier for retrieving records

Example: 0f7f5a2e2f390310f678c7ca6fa4e3c0

number:
--------------------------------------------------------------------------------
  • Business-friendly identifier displayed in the UI.
  • Example: INC0010002

The API retrieves records using sys_id, while number is mainly intended for
users.


================================================================================
                    18. UNDERSTANDING CHOICE FIELDS
================================================================================

Fields such as:
  • Urgency
  • Priority
  • Impact
  • State

are Choice Fields.

Although they may display numeric values such as: 1, 2, 3

they are commonly represented as string values in the API.

Example:
{
    "urgency": "1"
}

The values represent predefined business choices rather than numbers used for
calculations.


================================================================================
                             KEY TAKEAWAYS
================================================================================

  • request.post() returns a Promise<APIResponse>.
  • data represents the request body.
  • headers carry request metadata such as authentication and content type.
  • Header keys containing special characters (e.g., Content-Type) must be
    enclosed in quotes.
  • Always validate the response status before accessing the response body.
  • response.json() returns a JavaScript object, while response.text() returns
    plain text.
  • Use sys_id for record retrieval in ServiceNow APIs.
  • Validate both sys_id and business identifiers (such as the incident number)
    when chaining API requests.
  • Choice fields in ServiceNow often use string values even when they appear
    numeric.


================================================================================
                         POSTMAN VARIABLES (pm.variables)
================================================================================


INTRODUCTION
================================================================================

If you're referring to pm.variables in Postman, it's used to get, set, and
manage variables during API testing.

WHAT ARE PM VARIABLES?
================================================================================

pm stands for Postman.

pm.variables provides access to variables that Postman resolves during request
execution.

EXAMPLE:
pm.variables.get("token");

This retrieves the value of the variable named token.


WHY DO WE NEED VARIABLES?
================================================================================

Imagine your Login API returns:
{
    "token": "abc123xyz"
}

Instead of hardcoding the token in every request, you can store it in a
variable and reuse it.


TYPES OF VARIABLES IN POSTMAN
================================================================================

Postman supports multiple variable scopes.

┌─────────────────────────────────────────────────────────────────────────────┐
│ Variable Type        │ Scope                 │ Lifetime                    │
├──────────────────────┼───────────────────────┼─────────────────────────────┤
│ Local Variable       │ Current request/script│ Temporary                   │
│ Collection Variable  │ Entire collection     │ Until changed               │
│ Environment Variable │ Current environment   │ Until changed               │
│ Global Variable      │ All collections       │ Until changed               │
└──────────────────────┴───────────────────────┴─────────────────────────────┘


pm.variables
================================================================================

pm.variables looks for a variable in the available scopes (local, data,
environment, collection, global) using Postman's variable resolution order.

GET A VARIABLE:
--------------------------------------------------------------------------------
let token = pm.variables.get("token");
console.log(token);

SET A LOCAL VARIABLE:
--------------------------------------------------------------------------------
pm.variables.set("username", "John");

This variable is available only during the current request execution.


OTHER COMMON VARIABLE APIS
================================================================================

ENVIRONMENT VARIABLES:
--------------------------------------------------------------------------------
Set:   pm.environment.set("token", "abc123");
Get:   let token = pm.environment.get("token");

COLLECTION VARIABLES:
--------------------------------------------------------------------------------
Set:   pm.collectionVariables.set("token", "abc123");
Get:   pm.collectionVariables.get("token");

GLOBAL VARIABLES:
--------------------------------------------------------------------------------
Set:   pm.globals.set("token", "abc123");
Get:   pm.globals.get("token");


REAL EXAMPLE
================================================================================

LOGIN REQUEST:
--------------------------------------------------------------------------------
Response:
{
    "access_token": "eyJhbGciOi..."
}

TESTS TAB:
--------------------------------------------------------------------------------
let response = pm.response.json();
pm.environment.set("accessToken", response.access_token);

NEXT API REQUEST:
--------------------------------------------------------------------------------
Headers:
Authorization: Bearer {{accessToken}}

Postman automatically replaces {{accessToken}} with the stored value.


VARIABLE HIERARCHY (Highest to Lowest Priority)
================================================================================

Local Variables
        ↓
Data Variables
        ↓
Environment Variables
        ↓
Collection Variables
        ↓
Global Variables

If the same variable name exists in multiple scopes, Postman uses the one with
the highest priority.


WHEN TO USE WHICH VARIABLE?
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Variable Type          │ Use Case                                          │
├────────────────────────┼───────────────────────────────────────────────────┤
│ Local (pm.variables)   │ Temporary values needed only during the current  │
│                        │ request                                          │
│ Environment            │ URLs, tokens, usernames for Dev/QA/Prod          │
│ Collection             │ Values shared across all requests in a           │
│                        │ collection                                       │
│ Global                 │ Values used across multiple collections          │
│                        │ (use sparingly)                                  │
└────────────────────────┴───────────────────────────────────────────────────┘


INTERVIEW QUESTION
================================================================================

Q: What is the difference between pm.variables and pm.environment?

ANSWER:
  • pm.variables accesses variables using Postman's variable resolution and is
    commonly used for temporary, request-level values.

  • pm.environment specifically accesses environment variables, which persist
    in the selected environment until changed or deleted.


QUICK REFERENCE
================================================================================

PM VARIABLES:
--------------------------------------------------------------------------------
  • pm is the Postman scripting object
  • pm.variables.get() retrieves a variable using Postman's variable
    resolution order
  • pm.variables.set() creates a temporary local variable for the current
    request execution

COMMON METHODS:
--------------------------------------------------------------------------------
pm.variables.get("name");
pm.variables.set("name", "value");

pm.environment.get("token");
pm.environment.set("token", "value");

pm.collectionVariables.get("id");
pm.collectionVariables.set("id", "1001");

pm.globals.get("baseUrl");
pm.globals.set("baseUrl", "https://api.example.com");

BEST PRACTICES:
--------------------------------------------------------------------------------
  • Store base URLs and authentication tokens as Environment Variables
  • Store shared collection data as Collection Variables
  • Use pm.variables for temporary values needed only during a single request
    execution

================================================================================
                    API VALIDATION: POSTMAN vs PLAYWRIGHT
================================================================================


INTRODUCTION
================================================================================

The only difference is how you write the validation script.

WHAT CAN WE VALIDATE?
================================================================================

For any API, we can validate:
  1. Status Code
  2. Response Time
  3. Response Headers
  4. Response Body
  5. Specific Field Values
  6. Data Types
  7. Field Existence
  8. Response Schema
  9. Business Rules


SAMPLE SERVICENOW CREATE INCIDENT RESPONSE
================================================================================

{
    "result": {
        "sys_id": "0f7f5a2e2f390310f678c7ca6fa4e3c0",
        "number": "INC0010002",
        "short_description": "Server Down",
        "urgency": "1",
        "state": "1"
    }
}


================================================================================
                    1. STATUS CODE VALIDATION
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
pm.test("Status code should be 201", function () {
    pm.response.to.have.status(201);
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(response.status()).toBe(201);


================================================================================
                    2. CHECK REQUEST SUCCESS
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
pm.test("Request Successful", function () {
    pm.expect(pm.response.code).to.equal(201);
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(response.ok()).toBeTruthy();


================================================================================
                    3. RESPONSE TIME VALIDATION
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
pm.test("Response time < 2000 ms", function () {
    pm.expect(pm.response.responseTime).to.be.below(2000);
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
// Playwright does not provide built-in responseTime()
// Measure manually:
const start = Date.now();
const response = await request.post(url, options);
const end = Date.now();
expect(end - start).toBeLessThan(2000);


================================================================================
                    4. HEADER VALIDATION
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
pm.test("Content-Type Validation", function () {
    pm.expect(pm.response.headers.get("Content-Type"))
      .to.include("application/json");
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(response.headers()["content-type"])
    .toContain("application/json");


================================================================================
                    5. VALIDATE A FIELD VALUE
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
const body = pm.response.json();

pm.test("Verify Short Description", function () {
    pm.expect(body.result.short_description)
      .to.eql("Server Down");
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
const body = await response.json();
expect(body.result.short_description)
    .toBe("Server Down");


================================================================================
                    6. VALIDATE FIELD EXISTS
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
const body = pm.response.json();

pm.test("sys_id exists", function () {
    pm.expect(body.result.sys_id).to.exist;
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
const body = await response.json();
expect(body.result.sys_id).toBeDefined();


================================================================================
                    7. VALIDATE DATA TYPE
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
const body = pm.response.json();

pm.test("Incident Number should be String", function () {
    pm.expect(body.result.number)
      .to.be.a("string");
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(typeof body.result.number)
    .toBe("string");


================================================================================
                    8. VALIDATE MULTIPLE VALUES
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
const body = pm.response.json();

pm.test("Validate Incident", function () {
    pm.expect(body.result.urgency).to.eql("1");
    pm.expect(body.result.state).to.eql("1");
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(body.result.urgency).toBe("1");
expect(body.result.state).toBe("1");


================================================================================
                    9. VALIDATE PARTIAL TEXT
================================================================================

Assume: { "number": "INC0010002" }

POSTMAN:
--------------------------------------------------------------------------------
pm.expect(body.result.number).to.include("INC");

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(body.result.number).toContain("INC");


================================================================================
                    10. VALIDATE ENTIRE OBJECT
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
pm.expect(body.result).to.deep.include({
    urgency: "1",
    state: "1"
});

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(body.result).toMatchObject({
    urgency: "1",
    state: "1"
});


================================================================================
                    11. VALIDATE ARRAY SIZE
================================================================================

Suppose GET Incident returns: { "result": [ {}, {}, {} ] }

POSTMAN:
--------------------------------------------------------------------------------
pm.expect(body.result.length).to.eql(3);

PLAYWRIGHT:
--------------------------------------------------------------------------------
expect(body.result.length).toBe(3);


================================================================================
                    12. SAVE VALUES FOR METHOD CHAINING
================================================================================

POSTMAN:
--------------------------------------------------------------------------------
const body = pm.response.json();
pm.environment.set("sysId", body.result.sys_id);

// Retrieve later:
pm.environment.get("sysId");

PLAYWRIGHT:
--------------------------------------------------------------------------------
let sysId;
const body = await response.json();
sysId = body.result.sys_id;


================================================================================
                    VALIDATION COMPARISON TABLE
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Validation      │ Postman                           │ Playwright            │
├─────────────────┼───────────────────────────────────┼───────────────────────┤
│ Status Code     │ pm.response.to.have.status(201)   │ expect(response.      │
│                 │                                   │ status()).toBe(201)   │
│ Success         │ pm.response.code                  │ response.ok()         │
│ Response Body   │ pm.response.json()                │ await response.json() │
│ Response Header │ pm.response.headers.get()         │ response.headers()    │
│ Field Exists    │ to.exist                          │ toBeDefined()         │
│ Field Value     │ to.eql()                          │ toBe()                │
│ Contains Text   │ to.include()                      │ toContain()           │
│ Data Type       │ to.be.a()                         │ typeof                │
│ Array Size      │ .length                           │ .length               │
│ Save Variable   │ pm.environment.set()              │ Normal variable       │
└─────────────────┴───────────────────────────────────┴───────────────────────┘


================================================================================
                    BEST PRACTICE IN PLAYWRIGHT
================================================================================

A good validation flow looks like this:

const response = await request.post(url, options);

// 1. Validate Status
expect(response.status()).toBe(201);

// 2. Validate Headers
expect(response.headers()["content-type"])
    .toContain("application/json");

// 3. Parse Body
const body = await response.json();

// 4. Validate Business Data
expect(body.result.number).toContain("INC");
expect(body.result.short_description).toBe("Server Down");
expect(body.result.sys_id).toBeDefined();
expect(body.result.urgency).toBe("1");


ORDER MAKES TESTS READABLE AND EASY TO DEBUG:
--------------------------------------------------------------------------------
  1. Validate the HTTP response (status and headers)
  2. Parse the response body
  3. Validate the business data returned by the API

