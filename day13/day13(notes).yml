================================================================================
                        1. HTTP HEADERS
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
HTTP Headers are key-value pairs that provide metadata about an HTTP request
or response.

INTERVIEW DEFINITION:
  "HTTP Headers are key-value pairs sent with HTTP requests and responses that
   carry metadata about the message."

HTTP REQUEST STRUCTURE:
--------------------------------------------------------------------------------
GET /users/101 HTTP/1.1

Host: api.company.com
Authorization: Bearer token
Content-Type: application/json
Accept: application/json

Body

WHY HEADERS?
--------------------------------------------------------------------------------
Headers tell the server:
  • Who is making the request?
  • What format is the data?
  • What response format is expected?
  • Is the user authenticated?

COMMON REQUEST HEADERS:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Header          │ Purpose                                                    │
├─────────────────┼────────────────────────────────────────────────────────────┤
│ Content-Type    │ Format of request body                                    │
│ Accept          │ Expected response format                                  │
│ Authorization   │ Authentication                                            │
│ Host            │ Target server                                             │
│ User-Agent      │ Client information                                        │
│ Cookie          │ Session management                                        │
└─────────────────────────────────────────────────────────────────────────────┘

COMMON RESPONSE HEADERS:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Header          │ Purpose                                                    │
├─────────────────┼────────────────────────────────────────────────────────────┤
│ Content-Type    │ Response format                                            │
│ Content-Length  │ Size of response                                           │
│ Cache-Control   │ Caching rules                                              │
│ Set-Cookie      │ Creates cookies                                            │
└─────────────────────────────────────────────────────────────────────────────┘

CONTENT-TYPE vs ACCEPT:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Content-Type                │ Accept                                         │
├─────────────────────────────┼────────────────────────────────────────────────┤
│ Format of request body      │ Expected response format                       │
│ "I'm sending..."            │ "I want to receive..."                         │
└─────────────────────────────┴────────────────────────────────────────────────┘


================================================================================
                    2. HTTP METHODS & CRUD OPERATIONS
================================================================================

WHAT ARE HTTP METHODS?
--------------------------------------------------------------------------------
HTTP Methods (HTTP Verbs) specify what action the client wants the server to
perform on a resource.

WHAT IS A RESOURCE?
--------------------------------------------------------------------------------
A resource represents any data exposed by a Web Service.

Examples:
  /users
  /orders
  /products
  /employees

CRUD MAPPING:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ CRUD          │ HTTP Method                                                 │
├───────────────┼─────────────────────────────────────────────────────────────┤
│ Create        │ POST                                                        │
│ Read          │ GET                                                         │
│ Update        │ PUT / PATCH                                                 │
│ Delete        │ DELETE                                                      │
└───────────────┴─────────────────────────────────────────────────────────────┘

GET:
--------------------------------------------------------------------------------
Purpose: Retrieve data
Example: GET /employees/101
Characteristics: Read only, Safe, No data modification

POST:
--------------------------------------------------------------------------------
Purpose: Create new resource
Example: POST /employees

PUT:
--------------------------------------------------------------------------------
Purpose: Replace the entire resource
Example: PUT /employees/101

PATCH:
--------------------------------------------------------------------------------
Purpose: Update selected fields
Example: PATCH /employees/101

DELETE:
--------------------------------------------------------------------------------
Purpose: Delete a resource
Example: DELETE /employees/101

PUT vs PATCH:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ PUT                          │ PATCH                                         │
├──────────────────────────────┼───────────────────────────────────────────────┤
│ Replaces entire resource     │ Updates selected fields                       │
│ Sends complete object        │ Sends modified fields only                    │
└──────────────────────────────┴───────────────────────────────────────────────┘




================================================================================
                        3. PARAMETERIZATION
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Parameterization is the process of sending dynamic values to an API so that
the same endpoint can handle different requests.

TYPES OF PARAMETERIZATION:
--------------------------------------------------------------------------------
1. Path Parameter:
   Example: GET /employees/101
   101 is the path parameter.
   Purpose: Identify a specific resource.

2. Query Parameter:
   Example: GET /employees?department=QA
   Purpose: Filter, search, sort, paginate.

3. Header Parameter:
   Example: Authorization: Bearer token
   Purpose: Send metadata.

4. Body Parameter:
   Example: { "name": "John", "department": "QA" }
   Purpose: Send business data.

5. Form Parameter:
   Examples: Login forms, Registration forms, File uploads
   Content Types: application/x-www-form-urlencoded, multipart/form-data

PATH vs QUERY PARAMETER:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Path Parameter              │ Query Parameter                               │
├─────────────────────────────┼───────────────────────────────────────────────┤
│ Identifies resource         │ Filters resources                             │
│ Mandatory                   │ Usually optional                              │
│ Part of URL                 │ After ?                                       │
└─────────────────────────────┴───────────────────────────────────────────────┘

================================================================================
                        4. HTTP STATUS CODES
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
HTTP Status Codes are 3-digit numbers returned by the server indicating the
outcome of processing an HTTP request.

CATEGORIES:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Range         │ Meaning                                                    │
├───────────────┼────────────────────────────────────────────────────────────┤
│ 1xx           │ Informational                                              │
│ 2xx           │ Success                                                    │
│ 3xx           │ Redirection                                                │
│ 4xx           │ Client Error                                               │
│ 5xx           │ Server Error                                               │
└───────────────┴────────────────────────────────────────────────────────────┘

COMMON STATUS CODES:
--------------------------------------------------------------------------------
200 OK           → Request successful
201 Created      → New resource created
204 No Content   → Operation successful (no response body)

400 Bad Request  → Invalid request
401 Unauthorized → Authentication required or invalid credentials
403 Forbidden    → Authenticated but lacks permission
404 Not Found    → Requested resource doesn't exist

500 Internal Server Error → Unexpected server failure
503 Service Unavailable   → Server temporarily unavailable

401 vs 403:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ 401                         │ 403                                           │
├─────────────────────────────┼───────────────────────────────────────────────┤
│ Authentication required     │ Authentication successful but authorization  │
│ or invalid credentials      │ failed                                        │
└─────────────────────────────┴───────────────────────────────────────────────┘

200 vs 201:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ 200                         │ 201                                           │
├─────────────────────────────┼───────────────────────────────────────────────┤
│ Success                     │ Resource created                              │
└─────────────────────────────┴───────────────────────────────────────────────┘



