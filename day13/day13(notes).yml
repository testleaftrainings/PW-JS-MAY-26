================================================================================
                        1. SERVICENOW
================================================================================

WHAT IS SERVICENOW?
--------------------------------------------------------------------------------
ServiceNow is a cloud-based enterprise workflow automation platform that helps
organizations automate IT and business processes.

Initially designed for IT Service Management (ITSM), it now supports multiple
business functions.

COMMON MODULES:
--------------------------------------------------------------------------------
  • Incident Management
  • Problem Management
  • Change Management
  • Asset Management
  • CMDB (Configuration Management Database)
  • HR Service Delivery
  • Customer Service Management
  • Knowledge Management

EVERYTHING IS STORED IN TABLES:
--------------------------------------------------------------------------------
ServiceNow stores business data in database tables.

┌─────────────────────────────────────────────────────────────────────────────┐
│ Table          │ Purpose                                                    │
├────────────────┼────────────────────────────────────────────────────────────┤
│ incident       │ Incident records                                           │
│ problem        │ Problem records                                            │
│ change_request │ Change records                                             │
│ sys_user       │ Users                                                      │
│ cmdb_ci        │ Configuration Items                                        │
└────────────────┴────────────────────────────────────────────────────────────┘


================================================================================
                    2. WHY SERVICENOW USES REST APIS
================================================================================

Different enterprise applications need to communicate with ServiceNow.

Examples:
  • Microsoft Teams
  • Jira
  • Azure DevOps
  • SAP
  • AWS
  • Monitoring Tools

REST APIs enable these applications to:
  • Create records
  • Read records
  • Update records
  • Delete records

without opening the ServiceNow UI.

EXAMPLE:
--------------------------------------------------------------------------------
Monitoring Tool detects: Server Down
       ↓
Calls: POST /api/now/table/incident
       ↓
ServiceNow automatically creates: INC0010056


