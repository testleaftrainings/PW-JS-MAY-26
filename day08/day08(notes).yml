📑 Agenda – Day 08 | OOP's 

1. INTERSECTION TYPE ( & )
================================================================================

Represents "AND". Combines multiple types.

When does Intersection Work?

Intersection is mostly useful with Objects.

type Credentials = {
    username: string,
    password: string
}

type EnvironmentUrl = {
    url: string
}

Combine:
type TestConfig = Credentials & EnvironmentUrl;

Result:
{
    username: string,
    password: string,
    url: string
}

Here intersection makes sense because:
Object can contain properties from both types.

REAL-TIME AUTOMATION EXAMPLE - Framework Configuration:
--------------------------------------------------------------------------------
type TestConfig = Credentials & EnvironmentUrl;

const preCondition : TestConfig = {
    username: "DemoCSR",
    password: "crmsfa",
    url: "https://leaftaps.com"
}


2. TYPE NARROWING (Most Important Concept)
================================================================================

INITIAL STATE:
--------------------------------------------------------------------------------
type Browser = "chrome" | "edge" | "firefox" | "safari";
let browserName: Browser;

Possible values: chrome, edge, firefox, safari

AFTER ASSIGNMENT:
--------------------------------------------------------------------------------
browserName = "chrome";

TypeScript narrows: chrome | edge | firefox | safari → to → chrome

This is called: Type Narrowing (Control Flow Analysis)

WHY IT MATTERS:
TypeScript can predict unreachable code and catch mistakes during compilation.



REAL-TIME PLAYWRIGHT EXAMPLE:
--------------------------------------------------------------------------------
type Environment = "QA" | "UAT" | "PROD";

function execute(env: Environment){

    switch(env){

        case "QA":
            console.log("Run QA URL");
            break;

        case "UAT":
            console.log("Run UAT URL");
            break;

        case "PROD":
            console.log("Run PROD URL");
            break;
    }
}


