================================================================================
1. CLASS
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
A Class is a blueprint or template used to create objects.

REAL LIFE EXAMPLE:
--------------------------------------------------------------------------------
House Plan = Class
Actual House = Object

AUTOMATION EXAMPLE:
--------------------------------------------------------------------------------
LoginPage, HomePage, LeadPage are all classes.

SYNTAX:
--------------------------------------------------------------------------------
class LoginPage {
    login() {
        console.log("Login Successful");
    }
}

At this stage:
  • No memory allocated
  • No object created
  • Only a blueprint exists


================================================================================
2. OBJECT
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
An Object is an instance of a class.

SYNTAX:
--------------------------------------------------------------------------------
class LoginPage {
    login() {
        console.log("Login Successful");
    }
}

const page = new LoginPage();

Here:
  LoginPage = Blueprint
  page = Actual Object

Memory is allocated only when new LoginPage() is executed.

WHY OBJECT IS REQUIRED?
--------------------------------------------------------------------------------
Many learners ask: "Why can't I directly call login()?"

Because:
  Class = Design
  Object = Real Entity

EXAMPLE:
--------------------------------------------------------------------------------
class Employee {
    work() {
        console.log("Working");
    }
}

// Wrong:
Employee.work();  // Error

// Correct:
const emp = new Employee();
emp.work();

REAL-TIME PLAYWRIGHT EXAMPLE:
--------------------------------------------------------------------------------
class LoginPage {
    async login() {
        console.log("Login");
    }
}

// Test File:
const loginPage = new LoginPage();
await loginPage.login();


================================================================================
3. CONSTRUCTOR
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
A special method automatically executed when an object is created.

SYNTAX:
--------------------------------------------------------------------------------
class Employee {
    constructor() {
        console.log("Object Created");
    }
}

new Employee();  // Output: Object Created

WHY CONSTRUCTOR?
--------------------------------------------------------------------------------
To initialize object data during object creation.

EXAMPLE:
--------------------------------------------------------------------------------
class Employee {
    name: string;

    constructor(name: string) {
        this.name = name;
    }
}

const emp = new Employee("Bhuvanesh");
// name = "Bhuvanesh" is initialized automatically

REAL-TIME PLAYWRIGHT EXAMPLE:
--------------------------------------------------------------------------------
class LoginPage {
    constructor(private page: Page) {}
}

Why? The Playwright page object must be available throughout the class.

FREQUENTLY ASKED QUESTION:
--------------------------------------------------------------------------------
Q: Should file name and class name be the same?
A: No, it is not mandatory. This is valid:

   File: test.ts
   class LoginPage {}

However, industry convention follows:
   LoginPage.ts contains class LoginPage {}

This improves readability and maintainability.


================================================================================
4. ACCESS MODIFIERS
================================================================================

Used to control visibility of class members.

TypeScript provides:
  • public
  • private
  • protected

PUBLIC (Default):
--------------------------------------------------------------------------------
Accessible everywhere.

EXAMPLE:
class Employee {
    public name = "Bhuvanesh";
}

const emp = new Employee();
console.log(emp.name);  // Output: Bhuvanesh

PRIVATE:
--------------------------------------------------------------------------------
Accessible only inside the same class.

EXAMPLE:
class Employee {
    private salary = 50000;
}

emp.salary;  // ❌ Compiler Error - Property 'salary' is private

WHY PRIVATE?
--------------------------------------------------------------------------------
To protect sensitive information.

Automation examples:
  • private passwordLocator
  • private token
  • private apiKey

These should not be exposed outside the class.

PROTECTED:
--------------------------------------------------------------------------------
Accessible:
  • Inside the same class
  • Inside child classes (inheritance)
  • Not accessible outside

EXAMPLE:
class BasePage {
    protected browser = "chrome";
}

class LoginPage extends BasePage {
    showBrowser() {
        console.log(this.browser);  // ✅ Accessible in child class
    }
}

// Outside:
const page = new BasePage();
page.browser;  // ❌ Error - Property 'browser' is protected

================================================================================
                    ACCESS MODIFIERS IN TYPESCRIPT - DEEP UNDERSTANDING
================================================================================

LEARNING GOAL
================================================================================

Most beginners learn:

  public    → Accessible Everywhere
  private   → Accessible Inside Same Class
  protected → Accessible Inside Same Class + Child Class

But the real question is: WHY?

Understanding the reason is more important than memorizing the definition.


FIRST PRINCIPLE
================================================================================

ACCESS MODIFIERS ARE NOT OBJECT BASED
--------------------------------------------------------------------------------

Many beginners think:

const obj = new BaseClass();

"Since I created the object, I should be able to access everything."

This is WRONG.

Access Modifiers are SCOPE BASED, not OBJECT BASED.

IMPORTANT RULE:
--------------------------------------------------------------------------------
The compiler always asks: "WHO is calling the method?"
It never asks: "Which object is being used?"


EXAMPLE DEMONSTRATION
================================================================================

class BaseClass {
    public clickElement() {
        console.log("Clicked");
    }

    protected takeSnap() {
        console.log("Screenshot");
    }

    private captureToken() {
        console.log("Token Captured");
    }
}

const obj = new BaseClass();

QUESTION: Can obj access all methods?
ANSWER: NO

WHY? Because access modifiers check the LOCATION of the calling code,
not OBJECT CREATION.


QUESTION 1: Why can I access public methods?
================================================================================

obj.clickElement();  // ✅ Allowed

COMPILER CHECK:
  Is clickElement public? → YES
  Result: ALLOWED


QUESTION 2: Why can't I access private methods?
================================================================================

obj.captureToken();  // ❌ Compilation Error

COMPILER CHECK:
  Is captureToken public? → NO
  Is caller inside BaseClass? → NO
  Result: COMPILATION ERROR


QUESTION 3: Why can't I access protected methods?
================================================================================

obj.takeSnap();  // ❌ Compilation Error

COMPILER CHECK:
  Is caller inside BaseClass? → NO
  Is caller inside Child Class? → NO
  Result: COMPILATION ERROR


QUESTION 4: Why are private and protected accessible inside the same class?
================================================================================

class BaseClass {
    protected takeSnap() {}
    private captureToken() {}

    public performAction() {
        this.takeSnap();      // ✅ Allowed
        this.captureToken();  // ✅ Allowed
    }
}

WHY DOES THIS WORK?
  Caller = performAction()
  Location = BaseClass

COMPILER CHECK:
  Is caller inside BaseClass? → YES
  Result: ALLOWED


QUESTION 5: Who can access private methods?
================================================================================

class BaseClass {
    private captureToken() {}

    public performAction() {
        this.captureToken();  // ✅ Allowed
    }
}

QUESTION: Who is allowed to call captureToken()?
ANSWER: Only code written INSIDE BaseClass

const obj = new BaseClass();
obj.captureToken();  // ❌ Not Allowed (caller is outside BaseClass)


QUESTION 6: If the object belongs to the class, why can't it access private methods?
================================================================================

const obj = new BaseClass();

QUESTION: obj belongs to BaseClass. Why not access private methods?
ANSWER: Object Ownership ≠ Access Permission

The compiler does not care who owns the object.
The compiler only cares who is making the method call.


VISUAL UNDERSTANDING
================================================================================

WRONG THINKING:
--------------------------------------------------------------------------------
Object Created → Can Access Everything  [INCORRECT]

CORRECT THINKING:
--------------------------------------------------------------------------------
Method Call → Who is Calling? → Check Modifier → Allow / Deny


UNDERSTANDING PROTECTED
================================================================================

BASE CLASS:
--------------------------------------------------------------------------------
class BasePage {
    protected waitForElement() {
        console.log("Waiting");
    }
}

CHILD CLASS:
--------------------------------------------------------------------------------
class LoginPage extends BasePage {
    login() {
        this.waitForElement();  // ✅ Allowed
    }
}

WHY ALLOWED?
  LoginPage is part of inheritance hierarchy.

COMPILER CHECK:
  Caller inside Child Class? → YES
  Result: ALLOWED

OUTSIDE CLASS:
--------------------------------------------------------------------------------
const login = new LoginPage();
login.waitForElement();  // ❌ Not Allowed

COMPILER CHECK:
  Outside Class? → YES
  Result: NOT ALLOWED


REAL-TIME AUTOMATION FRAMEWORK EXAMPLE
================================================================================

BASE PAGE:
--------------------------------------------------------------------------------
class BasePage {
    public click() {
        // Available to everyone
    }

    protected waitForElement() {
        // Needed by child pages
    }

    private captureFrameworkToken() {
        // Internal framework logic only
    }
}

LOGIN PAGE (CHILD):
--------------------------------------------------------------------------------
class LoginPage extends BasePage {
    async login() {
        await this.click();           // ✅ public - allowed
        await this.waitForElement();  // ✅ protected - allowed
        // await this.captureFrameworkToken(); // ❌ private - not accessible
    }
}

WHY THIS DESIGN?
  • click() → public → used by all tests
  • waitForElement() → protected → needed by child pages, not exposed outside
  • captureFrameworkToken() → private → internal framework logic only


ACCESS MODIFIER MATRIX
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Location               │ public          │ private         │ protected      │
├────────────────────────┼─────────────────┼─────────────────┼────────────────┤
│ Same Class             │ ✅ Allowed      │ ✅ Allowed      │ ✅ Allowed     │
│ Child Class            │ ✅ Allowed      │ ❌ Not Allowed  │ ✅ Allowed     │
│ Outside Class          │ ✅ Allowed      │ ❌ Not Allowed  │ ❌ Not Allowed │
└────────────────────────┴─────────────────┴─────────────────┴────────────────┘


JAVA LINK
================================================================================

Exactly the same concept exists in Java.

  private   → Only same class
  protected → Same class + inheritance hierarchy
  public    → Everywhere

The only difference is:
  • TypeScript performs these checks at COMPILE TIME
  • Java performs them at COMPILE TIME as well

Conceptually, both behave the same.


FINAL INTERVIEW TAKEAWAY
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Access modifiers are SCOPE-BASED, not OBJECT-BASED.                         │
│                                                                             │
│ The compiler does not check who owns the object.                            │
│ It checks WHERE the calling code is written.                                │
│                                                                             │
│ private   → Only same class                                                 │
│ protected → Same class + child classes                                      │
│ public    → Anywhere                                                        │
└─────────────────────────────────────────────────────────────────────────────┘

GOLDEN RULE:
================================================================================

Do NOT ask:   "Which object is calling?"
ASK:          "From which location is the call being made?"

Once you remember this rule, access modifiers become crystal clear.





================================================================================
FUNCTION VS METHOD
================================================================================

FUNCTION:
--------------------------------------------------------------------------------
function login() { }
Independent, not associated with any class.

METHOD:
--------------------------------------------------------------------------------
class LoginPage {
    login() { }  // Method inside class
}

RULE:
  Every Method is a Function
  But NOT every Function is a Method


================================================================================
IMPORTANT INTERVIEW DIFFERENCES
================================================================================

JAVA:
--------------------------------------------------------------------------------
• Compile-time Polymorphism (Method Overloading)
• Runtime Polymorphism (Method Overriding)

TYPESCRIPT:
--------------------------------------------------------------------------------
• Runtime Polymorphism (Method Overriding)
• Compile-time Style Support (Overload Signatures)
• NOT true Java-style method overloading

TypeScript uses Prototype-Based Inheritance internally but provides class syntax
similar to Java for better developer experience.


