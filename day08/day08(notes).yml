│ Concept          │ Summary                                                  │
├──────────────────┼──────────────────────────────────────────────────────────┤
│ Class            │ Blueprint / Template for creating objects               │
│ Object           │ Actual instance of a class (memory allocated)           │
│ Constructor      │ Initializes object data, auto-executes on object creation│
│ public           │ Accessible everywhere (default)                         │
│ private          │ Accessible only inside the same class                   │
│ protected        │ Accessible within class + child classes                 │
│ Inheritance      │ Reuse existing functionality via extends keyword        │
│ static Variable  │ Belongs to class (accessed via ClassName)               │
│ static Method    │ Called using class name, no object required             │
│ static Block     │ Executes once during class loading                      │
│ Function         │ Independent, not bound to any class                     │
│ Method           │ Function declared inside a class                        │
└──────────────────┴──────────────────────────────────────────────────────────┘

