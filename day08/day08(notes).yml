================================================================================
                         ENUMS IN TYPESCRIPT
                    (AUTOMATION FRAMEWORK CONTEXT)
================================================================================

INTRODUCTION
================================================================================

Enums are used when we have a fixed set of constants. In automation frameworks,
common examples include Execution Status, Browser Types, User Roles, and
Environment Names.

WHAT IS ENUM?
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Enum (Enumeration) is a TypeScript feature used to define a fixed set of named
constants.

INSTEAD OF:
--------------------------------------------------------------------------------
let browser = "chrome";
let status = "PASS";
let role = "ADMIN";

WE CAN USE:
--------------------------------------------------------------------------------
enum Browser {
    CHROME,
    FIREFOX,
    EDGE
}

WHY USE ENUMS?
================================================================================

• Avoid hardcoded values
• Avoid spelling mistakes (compile-time validation)
• Improve code readability
• Provide IDE auto-suggestions
• Maintain centralized constants
• Enable safe refactoring


REAL-TIME AUTOMATION EXAMPLES
================================================================================

1. BROWSER TYPES:
--------------------------------------------------------------------------------
enum Browser {
    CHROME = "chrome",
    FIREFOX = "firefox",
    EDGE = "msedge"
}

let browser = Browser.CHROME;

Use Cases:
  • Cross-browser execution
  • Framework configuration
  • Browser selection logic

2. EXECUTION STATUS:
--------------------------------------------------------------------------------
enum ExecutionStatus {
    PASS = "PASS",
    FAIL = "FAIL",
    SKIP = "SKIP"
}

Use Cases:
  • Custom reporting
  • Extent/Allure Reports
  • Test result processing

3. ENVIRONMENT SELECTION:
--------------------------------------------------------------------------------
enum Environment {
    QA = "https://qa.testleaf.com",
    UAT = "https://uat.testleaf.com",
    PROD = "https://prod.testleaf.com"
}

Use Cases:
  • Environment management
  • URL selection
  • Configuration management

4. USER ROLES:
--------------------------------------------------------------------------------
enum UserRole {
    ADMIN = "ADMIN",
    MANAGER = "MANAGER",
    USER = "USER",
    GUEST = "GUEST"
}


TYPES OF ENUM
================================================================================

1. NUMERIC ENUM
--------------------------------------------------------------------------------

WHAT:
If values are not initialized, TypeScript automatically assigns numbers starting
from 0.

SYNTAX:
enum ExecutionStatus {
    PASS,    // 0
    FAIL,    // 1
    SKIP     // 2
}

INTERNAL REPRESENTATION:
enum ExecutionStatus {
    PASS = 0,
    FAIL = 1,
    SKIP = 2
}

USAGE:
console.log(ExecutionStatus.PASS);  // Output: 0

WHEN TO USE:
  • When numeric values are sufficient
  • Less commonly used in automation projects

2. STRING ENUM (RECOMMENDED FOR AUTOMATION)
--------------------------------------------------------------------------------

WHAT:
Values are explicitly assigned as strings.

SYNTAX:
enum ExecutionStatus {
    PASS = "PASS",
    FAIL = "FAIL",
    SKIP = "SKIP"
}

USAGE:
console.log(ExecutionStatus.PASS);  // Output: PASS

WHY PREFER STRING ENUMS:
  • Readable logs
  • Readable reports
  • Easy debugging
  • Better maintainability
  • Self-documenting code

REAL PROJECT RECOMMENDATION:
  Always prefer String Enum in automation frameworks.


ENUM vs TYPE ALIAS
================================================================================

TYPE ALIAS:
--------------------------------------------------------------------------------
type Browser = "chrome" | "firefox" | "msedge";

let browser: Browser = "chrome";

PURPOSE: Creates a custom datatype for compile-time validation

ENUM:
--------------------------------------------------------------------------------
enum Browser {
    CHROME = "chrome",
    FIREFOX = "firefox",
    EDGE = "msedge"
}

let browser = Browser.CHROME;

PURPOSE: Creates named constants usable at compile time AND runtime

COMPARISON TABLE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ Enum               │ Type Alias                │
├────────────────────────────┼────────────────────┼───────────────────────────┤
│ Creates Constants          │ Yes                │ No                        │
│ Exists at Runtime          │ Yes                │ No                        │
│ Generates JavaScript Code  │ Yes                │ No                        │
│ Auto Suggestion            │ Excellent          │ Good                      │
│ Used for Fixed Values      │ Yes                │ Yes                       │
│ Can have methods           │ No		  │ No                        │
└────────────────────────────┴────────────────────┴───────────────────────────┘


ENUM vs TYPE ASSERTION
================================================================================

These are completely different concepts.

ENUM:
--------------------------------------------------------------------------------
PURPOSE: Store predefined constant values.

EXAMPLE:
enum UserRole {
    ADMIN = "ADMIN",
    USER = "USER"
}

let role = UserRole.ADMIN;

TYPE ASSERTION:
--------------------------------------------------------------------------------
PURPOSE: Tell TypeScript to trust the developer about a datatype.

EXAMPLE:
let value: unknown = "Playwright";
let data = value as string;

Meaning: "I know this value is string. Trust me."

COMPARISON TABLE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Feature                    │ Enum               │ Type Assertion            │
├────────────────────────────┼────────────────────┼───────────────────────────┤
│ Stores Constants           │ Yes                │ No                        │
│ Creates Types              │ No                 │ No                        │
│ Helps Runtime Logic        │ Yes                │ No                        │
│ Changes Compiler Perception│ No                 │ Yes                       │
│ Used for Data Conversion   │ No                 │ No                        │
└────────────────────────────┴────────────────────┴───────────────────────────┘


WHEN TO USE ENUM?
================================================================================

USE ENUM FOR:
--------------------------------------------------------------------------------
✓ Browser Types (CHROME, FIREFOX, EDGE, SAFARI)
✓ Execution Status (PASS, FAIL, SKIP)
✓ Environment Names (QA, UAT, PROD, DEV)
✓ User Roles (ADMIN, MANAGER, USER, GUEST)
✓ Payment Status (PENDING, COMPLETED, FAILED, REFUNDED)
✓ Order Status (CREATED, PROCESSING, SHIPPED, DELIVERED)
✓ HTTP Status Codes (OK, CREATED, BAD_REQUEST, UNAUTHORIZED)

WHEN NOT TO USE ENUM:
--------------------------------------------------------------------------------
✗ For simple datatype restrictions (use Type Alias instead)

EXAMPLE - Prefer Type Alias:
type Browser = "chrome" | "firefox" | "msedge";


INTERVIEW SUMMARY
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Concept                      │ Key Point                                     │
├──────────────────────────────┼───────────────────────────────────────────────┤
│ Enum Definition              │ Fixed set of named constants                 │
│ Numeric Enum                 │ Auto-assigns values (0, 1, 2...)             │
│ String Enum                  │ Explicit string values (recommended)         │
│ Primary Benefit              │ No hardcoded values, no spelling mistakes    │
│ Enum vs Type Alias           │ Enum = runtime constants; Type Alias = types │
│ Enum vs Type Assertion       │ Completely different concepts                │
│ Automation Recommendation    │ Always prefer String Enum                    │
└──────────────────────────────┴───────────────────────────────────────────────┘


GOLDEN RULES
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Type Alias          → Creates Custom Types (compile-time only)             │
│ Enum                → Creates Fixed Constants (runtime + compile-time)     │
│ Type Assertion      → Forces TypeScript to Trust the Developer             │
└─────────────────────────────────────────────────────────────────────────────┘

REAL PROJECT EXAMPLE:
================================================================================

// enums/Browser.enum.ts
export enum Browser {
    CHROME = "chrome",
    FIREFOX = "firefox",
    EDGE = "msedge",
    SAFARI = "webkit"
}

// enums/Environment.enum.ts
export enum Environment {
    QA = "https://qa.testleaf.com",
    UAT = "https://uat.testleaf.com",
    PROD = "https://prod.testleaf.com"
}

// config/playwright.config.ts
import { Browser, Environment } from './enums';

const browser = Browser.CHROME;
const baseURL = Environment.QA;

export default defineConfig({
    use: {
        browserName: browser,
        baseURL: baseURL
    }
});


