================================================================================
                    TYPE ASSERTION IN TYPESCRIPT
================================================================================

WHAT IS TYPE ASSERTION?
================================================================================

DEFINITION:
--------------------------------------------------------------------------------
Type Assertion tells TypeScript:

  "Trust me, I know the datatype better than you."

IMPORTANT:
  • It does NOT change the actual datatype
  • It only tells the TypeScript compiler to treat a value as a specific type


WHY DO WE NEED TYPE ASSERTION?
================================================================================

Sometimes TypeScript cannot determine the exact type.

EXAMPLE:
--------------------------------------------------------------------------------
let value: unknown = "Playwright";

Here TypeScript only knows: value is unknown

So this will FAIL:
console.log(value.toUpperCase());
// Compile Error: Object is of type 'unknown'


HOW TO PERFORM TYPE ASSERTION?
================================================================================

METHOD 1: Using "as"
--------------------------------------------------------------------------------
let value: unknown = "Playwright";
console.log((value as string).toUpperCase());
// Output: PLAYWRIGHT

METHOD 2: Angle Bracket Syntax
--------------------------------------------------------------------------------
let value: unknown = "Playwright";
console.log((<string>value).toUpperCase());
// Output: PLAYWRIGHT

NOTE:
  • Prefer "as" syntax
  • Angle bracket syntax is avoided in React projects


REAL-TIME PLAYWRIGHT EXAMPLES
================================================================================

EXAMPLE 1: API Response
--------------------------------------------------------------------------------
Without Type Assertion:
let response: unknown = await apiResponse.json();
console.log(response.userName);
// Compile Error: Object is of type 'unknown'

With Type Assertion:
let response: unknown = await apiResponse.json();
console.log((response as any).userName);

EXAMPLE 2: Environment Configuration
--------------------------------------------------------------------------------
let envData: unknown = {
    url: "https://testleaf.com"
};
console.log((envData as { url: string }).url);
// Output: https://testleaf.com

EXAMPLE 3: HTML Element Handling
--------------------------------------------------------------------------------
const element = document.getElementById("username");
// TypeScript sees: HTMLElement | null

To access input-specific properties:
const input = document.getElementById("username") as HTMLInputElement;
console.log(input.value);


TYPE ASSERTION vs TYPE NARROWING
================================================================================

TYPE ASSERTION:
--------------------------------------------------------------------------------
let data: unknown = "Playwright";
console.log((data as string).toUpperCase());

Meaning: Developer is forcing TypeScript to trust him.

TYPE NARROWING (Recommended):
--------------------------------------------------------------------------------
let data: unknown = "Playwright";

if (typeof data === "string") {
    console.log(data.toUpperCase());
}

Meaning: TypeScript validates before usage.


RISK OF TYPE ASSERTION
================================================================================

EXAMPLE:
--------------------------------------------------------------------------------
let value: unknown = 100;
console.log((value as string).toUpperCase());

TypeScript: No Compile Error
Runtime: TypeError: toUpperCase is not a function

REASON:
  Type Assertion does NOT convert data.
  It only changes compiler perception.


INTERVIEW EXAMPLE
================================================================================

function getResponse(): unknown {
    return {
        userName: "Admin"
    };
}

const response = getResponse() as { userName: string };
console.log(response.userName);
// Output: Admin


