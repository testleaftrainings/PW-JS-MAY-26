                    BONUS - REAL INTERVIEW ANSWER STRUCTURE
================================================================================

If asked "Why is Playwright faster than Selenium?"

ANSWER STRUCTURE:
--------------------------------------------------------------------------------
1. Selenium uses HTTP requests for each command (multiple layers)
2. Playwright uses persistent WebSocket (direct communication)
3. Playwright can interact directly with:
   - Render Process (DOM operations)
   - Browser Process (user interactions)
   - Network Process (API calls)
   - Service Worker Process (offline/PWA)
4. Result: Real-time, bi-directional communication with no HTTP overhead

If asked "How does Playwright interact with browser components?"

ANSWER STRUCTURE:
--------------------------------------------------------------------------------
1. Render Process → DOM, locators, getByText()
2. Browser Process → mouse, keyboard, permissions, geolocation
3. Network Process → goto(), API testing, route()
4. Service Worker → offline testing, caching, PWA

