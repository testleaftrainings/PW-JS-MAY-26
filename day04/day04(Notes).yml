                    PRIORITY OF EXECUTION
================================================================================

PRIORITY ORDER (Highest to Lowest):
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ 1. Terminal Command Line (Highest Priority)                                 │
│ 2. Script / Test File                                                       │
│ 3. Configuration File (Lowest Priority)                                     │
└─────────────────────────────────────────────────────────────────────────────┘

