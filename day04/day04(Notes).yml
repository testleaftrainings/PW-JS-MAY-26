================================================================================
                    FREQUENTLY ASKED QUESTIONS
================================================================================

QUESTION 1: Does Playwright use my installed browser?
--------------------------------------------------------------------------------

ANSWER: NO (by default)
--------------------------------------------------------------------------------
Playwright does NOT use the browser already installed on your machine.
When you install Playwright, it downloads its own browser binaries
(Chromium, Firefox, WebKit) into a local cache.

DEFAULT BROWSER STORAGE LOCATION:
--------------------------------------------------------------------------------
C:\Users\DELL\AppData\Local\ms-playwright

FLOW:
--------------------------------------------------------------------------------
Your Test → Playwright → Downloaded Chromium.exe → Browser Launches

WHY PLAYWRIGHT DOWNLOADS ITS OWN BROWSERS:
--------------------------------------------------------------------------------
• Ensures every team member uses the exact same browser version
• Prevents failures caused by browser updates on individual machines
• Makes test execution consistent across local, CI/CD, and production

PROBLEM IT SOLVES:
--------------------------------------------------------------------------------
• Avoids "Works on my machine" issues
• Eliminates browser version mismatch problems
• Ensures stable and repeatable test execution

CAN PLAYWRIGHT USE MY INSTALLED BROWSER?
--------------------------------------------------------------------------------
YES, with channel option:

await chromium.launch({
  channel: 'chrome'  // Uses installed Chrome
});

await chromium.launch({
  channel: 'msedge'  // Uses installed Edge
});

QUICK REFERENCE TABLE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Browser Type                        │ Uses Installed Browser?               │
├─────────────────────────────────────┼───────────────────────────────────────┤
│ chromium.launch()                   │ No (uses downloaded .exe)             │
│ firefox.launch()                    │ No (uses downloaded .exe)             │
│ webkit.launch()                     │ No (uses downloaded .exe)             │
│ chromium.launch({channel:'chrome'}) │ Yes (uses system Chrome)              │
│ chromium.launch({channel:'msedge'}) │ Yes (uses system Edge)                │
└─────────────────────────────────────┴───────────────────────────────────────┘


QUESTION 2: Why .spec.ts extension is mandatory?
--------------------------------------------------------------------------------

ANSWER: .spec.ts is NOT technically mandatory.
--------------------------------------------------------------------------------
It is the default naming convention used by the Playwright Test Runner to
discover test files.

WHY WE USE .spec.ts:
--------------------------------------------------------------------------------
• Clearly distinguishes test files from framework and utility files
• Helps Playwright automatically discover test files
• Separates test files from utility, page object, and configuration files
• Makes large frameworks easier to organize

CUSTOMIZATION OPTION:
--------------------------------------------------------------------------------
The pattern can be customized using testMatch configuration:

export default defineConfig({
  testMatch: '**/*.test.ts',  // Use .test.ts instead of .spec.ts
});

PROBLEM IT SOLVES:
--------------------------------------------------------------------------------
• Prevents Playwright from executing non-test files accidentally
• Improves test discovery and execution
• Keeps framework structure clean and maintainable

CAN WE USE A DIFFERENT EXTENSION?
--------------------------------------------------------------------------------
YES! You can configure testMatch to use any pattern:
• *.test.ts
• *.e2e.ts
• *.playwright.ts
• any custom pattern


QUESTION 3: What are Test Count and Workers Count?
--------------------------------------------------------------------------------

ANSWER:
--------------------------------------------------------------------------------
TEST COUNT:
Number of test cases Playwright discovered and is going to execute.

WORKERS COUNT:
Number of parallel worker processes Playwright created to run those tests.

HOW COUNTS CHANGE:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ Factor                    │ Effect on Test Count    │ Effect on Workers    │
├───────────────────────────┼─────────────────────────┼──────────────────────┤
│ Number of test() blocks   │ Directly proportional   │ No effect            │
│ test.describe() grouping  │ No effect               │ No effect            │
│ test.skip() / test.only() │ Increases/Decreases     │ No effect            │
│ workers config            │ No effect               │ Directly proportional│
│ --workers flag            │ No effect               │ Overrides config     │
│ CPU cores on machine      │ No effect               │ Max limit            │
└────────────────────────────┴─────────────────────────┴──────────────────────┘

EXAMPLE OUTPUT:
--------------------------------------------------------------------------------
Running 12 tests using 4 workers

Meaning:
• 12 test cases discovered
• 4 parallel processes running them
• Each worker runs ~3 tests

DEFAULT BEHAVIOR:
--------------------------------------------------------------------------------
• Workers default to: number of CPU cores / 2
• Tests distributed evenly across workers
• Tests run in parallel by default

CONFIGURING WORKERS:
--------------------------------------------------------------------------------
// In config file
export default defineConfig({
  workers: 2,  // Force 2 workers
});

// Command line override
npx playwright test --workers=1  // Sequential execution

WHEN WORKERS = 1:
--------------------------------------------------------------------------------
• Tests run sequentially
• Easier debugging
• No test interference
• Slower execution

WHEN WORKERS > 1:
--------------------------------------------------------------------------------
• Tests run in parallel
• Faster execution
• May cause test conflicts
• Requires isolated test data


========================================================================


What is a page fixture :
------------------------
In Playwright, a page fixture is a predefined setup that provides a fresh browser page for each test. 
It ensures that tests run in isolation, preventing interference from previous tests. 
The page fixture is part of Playwright's test runner and is automatically available in test functions.

-------------------------------------------------------------------------------------

DOM Structure :
--------------
Document Object Model (DOM) is a programming interface for web documents. It represents the page so that programs can change the document structure, style, and content. The DOM represents the document as nodes and objects; that way, programming languages can interact with the page.

<html>
  <head>
    <title>Testleaf Page</title>
  </head>
  <body>
    <div>
      <h1>Welcome to Testleaf</h1>
      <p>This is a sample paragraph.</p>

      <!-- Label and Textbox -->
      <label for="username">Enter Name:</label>
      <input type="text" id="username" name="username">

    </div>
  </body>
</html>


CSS Selectors :
-----------------
1. By ID :
Syntax : #idValue 
Example : #username

2. By Class :
Syntax : .classValue
Example : .inputLogin

3. By Attribute :
[tagName[attribute='value']]
Example : input[id='username']

4. Descendant Combinator 
Example : form input

5. Child Combinator
Example : form > input




