CONFIGURATION FILE EXPLANATION
================================================================================

Before you execute your first Playwright script, follow below steps for better
understanding of configuration file:

STEP 1: Set headless: false
--------------------------------------------------------------------------------
export default defineConfig({
  use: {
    headless: false,  // Shows browser UI while testing
  },
});

Why: Helps visualize test execution during development

STEP 2: Comment Firefox and WebKit projects
--------------------------------------------------------------------------------
projects: [
  {
    name: 'chromium',
    use: { ... },
  },
  // {
  //   name: 'firefox',
  //   use: { ... },
  // },
  // {
  //   name: 'webkit',
  //   use: { ... },
  // },
];

Why: Faster execution during development (run only Chromium)

STEP 3: Set workers: 1
--------------------------------------------------------------------------------
export default defineConfig({
  workers: 1,  // Run tests sequentially
});

Why: Easier debugging (no parallel execution conflicts)


