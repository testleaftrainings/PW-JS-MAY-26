-----------------------------------------------------------------
Why Asynchronous Programming?
Asynchronous programming is a programming technique where long-running operations 
are executed without blocking the main execution thread. The program can continue 
performing other tasks while waiting for the operation to complete, improving 
responsiveness and performance.

------------------------------------------------------------------
What is a Promise?
=====================

A Promise is a JavaScript object that represents the future result of an asynchronous operation.

Think of it this way:

Current Status:
"I have started the work."

Future Status:
"I will either complete it successfully
or fail."

A Promise is JavaScript's way of saying:

"I don't have the result right now.
I'll give it to you later."
Promise States

A Promise can be in only one of three states.

1. Pending
2. Fulfilled (Resolved)
3. Rejected
----------------------------------------------------
Pending
========
Work is still running.

Downloading file...
Calling API...
Loading webpage...


Fulfilled
=========
Work completed successfully.

API response received.
File downloaded.
Page loaded.

Rejected
========
Work failed.

Network error.
Server error.
File not found.

========================================================================

What is async?
===================================

async is a keyword used to declare an asynchronous function.

An async function always returns a Promise, regardless of what value you return.

Which Functions Can Be Async?
1)Function Declaration
2)Function Expression
3)Arrow Function

Note : Playwright page methods are typically async.

What is await?
===================================

await is used to pause the execution of an async function until a Promise is resolved or rejected.

Without await, JavaScript continues execution immediately.

With await, JavaScript waits for the result before moving to the next line.

Why do we need Async/Await?

Consider the following operations:
----------------------------------
API calls
Database calls
File reading
Browser automation (Playwright)
Network requests

These operations take time to complete.

Instead of blocking the entire application, JavaScript performs them asynchronously.

Async/Await provides a cleaner way to handle such operations compared to .then()[callback hell] chains.

Which Functions Can Use await?
------------------------------
Rule

await can only be used inside:
1)Async Functions
2)Top-level modules (modern JavaScript environments)


================================================================================
              WHAT REALLY HAPPENS WHEN YOU WRITE: await page.click('#login')
================================================================================

Let's take a real Playwright line:

await page.click('#login');


================================================================================
                    STEP-BY-STEP BREAKDOWN
================================================================================

STEP 1: Playwright returns a Promise
--------------------------------------------------------------------------------
page.click() immediately returns a Promise.


The function doesn't wait yet — it just returns a Promise object immediately.


STEP 2: await sees a Promise
--------------------------------------------------------------------------------
await tells JavaScript:
  "Pause this function here and continue after this Promise finishes."

IMPORTANT:
  ✓ Only the current function pauses
  ✓ The JS engine keeps running other work (event loop continues)
  ✓ Other tests, timers, or callbacks can still execute

VISUAL:
--------------------------------------------------------------------------------
async function test() {
  console.log('Before click');     // ← Executes immediately
  await page.click('#login');       // ← PAUSE HERE (Promise pending)
  console.log('After click');       // ← Waits until Promise resolves
}


STEP 3: Callback is registered (hidden from you)
--------------------------------------------------------------------------------
Internally, this happens:

page.click().then(() => {
  // resume test execution here
});

That then(() => { ... }) is the callback.

The callback is registered but NOT executed yet.
It sits waiting for the Promise to complete.


STEP 4: Browser action happens
--------------------------------------------------------------------------------
Playwright:
  • Sends command to browser via WebSocket
  • Waits for action + auto-waits (visibility, stability, etc.)
  • This happens OUTSIDE the JS call stack

Playwright's auto-waiting ensures:
  ✓ Element is attached to DOM
  ✓ Element is visible
  ✓ Element is stable (not moving)
  ✓ Element is clickable (not covered)

This is why Playwright doesn't need explicit waitForElementVisible().


STEP 5: Promise is fulfilled
--------------------------------------------------------------------------------
Once the click completes:
  • Promise status changes from Pending → Fulfilled
  • Resume callback is placed in Microtask Queue

PROMISE STATES:
--------------------------------------------------------------------------------
┌─────────────┐    ┌─────────────┐    ┌─────────────┐
│   Pending   │ →  │  Fulfilled  │ or │   Rejected  │
│  (Waiting)  │    │ (Success)   │    │  (Error)    │
└─────────────┘    └─────────────┘    └─────────────┘


STEP 6: Event loop resumes your test
--------------------------------------------------------------------------------
When call stack is empty:
  • Microtask queue is processed
  • Your test function continues
  • console.log('After click'); executes

EVENT LOOP PRIORITY:
--------------------------------------------------------------------------------
┌─────────────────────────────────────────────────────────────────────────────┐
│ 1. Call Stack (currently executing code)                                    │
│ 2. Microtask Queue (Promise callbacks, queueMicrotask) ← await resumes here │
│ 3. Task Queue (setTimeout, setInterval, I/O events)                         │
└─────────────────────────────────────────────────────────────────────────────┘


================================================================================
                    COMPLETE VISUAL FLOW
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Step 1: page.click() returns Promise immediately                            │
│ Step 2: await pauses test function                                          │
│ Step 3: Callback registered (Promise.then())                                │
│ Step 4: Playwright sends command to browser (auto-wait + click)             │
│ Step 5: Promise fulfills → callback added to Microtask Queue                │
│ Step 6: Event loop picks callback → test resumes                            │
└─────────────────────────────────────────────────────────────────────────────┘


================================================================================
                    TIMELINE DIAGRAM
================================================================================

Time →

Test:  "Before click" → [PAUSED] ................... → "After click"
        │                  │                            ↑
        │                  │                            │
Playwright:               [Click command to browser]    │
                          [Auto-wait + Action]          │
                          [Promise resolves] ───────────┘

Promise:  [Pending] ................................. [Fulfilled]
                          ↑
                          │
Microtask Queue:          [Callback waiting] → [Processed]


================================================================================
                    KEY INSIGHTS (INTERVIEW READY)
================================================================================

1. await does NOT block the entire JavaScript engine
   ────────────────────────────────────────────────────────────────────────────
   • Only the current async function pauses
   • Other code (other tests, timers) can still run
   • This is NOT like Thread.sleep() in Java

2. Playwright's auto-waiting happens OUTSIDE the JS call stack
   ────────────────────────────────────────────────────────────────────────────
   • Visibility checks, stability checks happen in browser
   • JS engine is free to do other work
   • This is why Playwright tests are efficient

3. Promise callbacks go to Microtask Queue (higher priority)
   ────────────────────────────────────────────────────────────────────────────
   • Microtask Queue is processed BEFORE Task Queue
   • This ensures Promise callbacks happen quickly
   • Higher priority than setTimeout callbacks

4. Playwright actions are NOT synchronous
   ────────────────────────────────────────────────────────────────────────────
   • Without await, test would continue immediately
   • Click may not have happened yet
   • This would cause flaky tests


================================================================================
                    COMMON INTERVIEW QUESTIONS
================================================================================

Q: What happens if I remove await?
────────────────────────────────────────────────────────────────────────────────
A: Without await, the test continues immediately without waiting for the click
   to complete. This leads to race conditions and flaky tests.

await page.click('#login');  // ✓ Waits for click
page.click('#login');         // ✗ Continues immediately (Promise not awaited)


Q: Is await same as Thread.sleep()?
────────────────────────────────────────────────────────────────────────────────
A: NO. Thread.sleep() blocks the entire thread. await only pauses the current
   async function while allowing other JavaScript code to run.


Q: How does Playwright know when to resume?
────────────────────────────────────────────────────────────────────────────────
A: Through the Promise's then() callback. When the browser action completes,
   the Promise resolves and the callback is added to Microtask Queue.
   The event loop then executes it when call stack is empty.


Q: Why doesn't Playwright need explicit waitForElementVisible()?
────────────────────────────────────────────────────────────────────────────────
A: Playwright's auto-waiting is built into every action. Before clicking,
   it automatically waits for:
   • Element to be attached
   • Element to be visible
   • Element to be stable
   • Element to be clickable




================================================================================
                    REAL EXAMPLE WITH TIMING
================================================================================

import { test } from '@playwright/test';

test('demo', async ({ page }) => {

  console.log('1: Before goto');           // ← Executes immediately
  await page.goto('https://example.com');  // ← Pauses here
  console.log('2: After goto');            // ← Resumes after page loads

  console.log('3: Before click');          // ← Executes immediately
  await page.click('#login');              // ← Pauses here
  console.log('4: After click');           // ← Resumes after click completes
});

ACTUAL SEQUENCE:
--------------------------------------------------------------------------------
1: Before goto          (immediate)
[Waiting for page load...]
2: After goto           (after page loads)
3: Before click         (immediate)
[Waiting for element + click...]
4: After click          (after click completes)


