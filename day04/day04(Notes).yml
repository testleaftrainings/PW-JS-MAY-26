================================================================================
                    BROWSER COMPONENTS AND PLAYWRIGHT MAPPING
================================================================================


1. RENDER PROCESS
================================================================================

WHAT IT DOES:
--------------------------------------------------------------------------------
Responsible for:
• Rendering HTML
• Rendering CSS
• Executing JavaScript
• Managing DOM
• Running Web Workers

LEARNING CONNECTION - page.goto()
--------------------------------------------------------------------------------
await page.goto("https://playwright.dev");

What happens?
• Network Process → Downloads page
• Render Process →
    - Parses HTML
    - Builds DOM
    - Executes JavaScript
    - Renders UI

LEARNING CONNECTION - locator()
--------------------------------------------------------------------------------
await page.locator('#username').fill('Admin');

What happens?
Playwright → Render Process → DOM Search → Element Found

Reason: DOM lives inside Render Process.

LEARNING CONNECTION - getByText()
--------------------------------------------------------------------------------
await page.getByText('Login').click();

What happens?
Render Process → Search Visible Text → Locate Element → Perform Action

This is why text-based locators are Render Process activities.

CSS SELECTORS:
--------------------------------------------------------------------------------
await page.locator('#username');
await page.locator('.input-field');
await page.locator('input[name="username"]');

What happens?
Playwright → Render Process → DOM Query Engine → Matching Element Returned


2. BROWSER PROCESS
================================================================================

WHAT IT DOES:
--------------------------------------------------------------------------------
Responsible for:
• Permissions
• Security
• Geolocation
• User Input
• Browser Settings

LEARNING CONNECTION - Mouse Actions
--------------------------------------------------------------------------------
await page.click('#login');

What happens?
Playwright → Browser Process → Mouse Event Generated → Render Process Receives Event

LEARNING CONNECTION - Keyboard Actions
--------------------------------------------------------------------------------
await page.keyboard.type('Admin');

What happens?
Browser Process → Keyboard Event → Target Element

LEARNING CONNECTION - Geolocation Testing
--------------------------------------------------------------------------------
const context = await browser.newContext({
  geolocation: {
    latitude: 13.0827,
    longitude: 80.2707
  },
  permissions: ['geolocation']
});

What happens?
Playwright → Browser Process → Location Permission → Mock GPS Location

LEARNING CONNECTION - Permissions
--------------------------------------------------------------------------------
permissions: ['notifications']

What happens?
Browser Process → Grant Permission → Application Uses Notification API


3. NETWORK PROCESS
================================================================================

WHAT IT DOES:
--------------------------------------------------------------------------------
Responsible for:
• HTTP Requests
• HTTP Responses
• WebSockets
• API Communication

LEARNING CONNECTION - page.goto()
--------------------------------------------------------------------------------
await page.goto(url);

What happens?
Network Process → Request Sent → Response Received → Page Delivered

LEARNING CONNECTION - API Testing
--------------------------------------------------------------------------------
const response = await request.get('/users');

What happens?
Playwright → Network Process → HTTP Request → HTTP Response

LEARNING CONNECTION - Network Interception
--------------------------------------------------------------------------------
await page.route('**/users', route => {
  route.fulfill({
    status: 200
  });
});

What happens?
Playwright → Network Process → Intercept Request → Modify Response

This is one reason Playwright is powerful.


4. SERVICE WORKER PROCESS
================================================================================

WHAT IT DOES:
--------------------------------------------------------------------------------
Responsible for:
• Caching
• Offline Mode
• Push Notifications
• PWA Support

LEARNING CONNECTION:
--------------------------------------------------------------------------------
Suppose application supports:
• Offline Shopping
• Offline Banking
• Offline Ticket Booking

Service Worker:
• Stores Cached Data
• Handles Offline Requests

Playwright can inspect and validate this behavior.


================================================================================
              RELATION TO WEBSOCKET vs W3C PROTOCOL
================================================================================

SELENIUM ARCHITECTURE:
--------------------------------------------------------------------------------
Test → HTTP Request → Driver → Browser

Uses: W3C WebDriver Protocol

Every command: New Request + New Response

PLAYWRIGHT ARCHITECTURE:
--------------------------------------------------------------------------------
Test → Persistent WebSocket → Browser Internals

Directly communicates with:
• Browser Process
• Network Process
• Render Process
• Service Worker Process

WHY PLAYWRIGHT IS MORE EFFICIENT:
--------------------------------------------------------------------------------
Playwright can do:
• page.route()
• page.on('request')
• page.on('response')
• page.context()
• browser.newContext()

more efficiently than Selenium because of WebSocket communication.


================================================================================
              RELATION TO IN-PROCESS vs OUT-OF-PROCESS
================================================================================

CYPRESS:
--------------------------------------------------------------------------------
Runs Inside Render Process

Characteristics:
• In-Process Automation
• Shares Browser Runtime

SELENIUM:
--------------------------------------------------------------------------------
Runs Outside Browser
Uses Driver

Characteristics:
• Out-of-Process Automation

PLAYWRIGHT:
--------------------------------------------------------------------------------
Runs Outside Browser + Direct Browser Communication

Characteristics:
• Hybrid Architecture
• Process Isolation like Selenium
• Speed similar to In-Process tools


