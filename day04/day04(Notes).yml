                    ONE-LINE TAKEAWAY (INTERVIEW READY)
================================================================================

"When you write await page.click(), Playwright immediately returns a Promise,
pauses only the current test function, registers a callback, sends the click
command to the browser with auto-waiting, and when the Promise resolves, the
callback is placed in the Microtask Queue, which the event loop processes to
resume the test — all without blocking other JavaScript code."

-------------------------------------------

1. In-Process Automation

What it is

Automation code runs inside the browser process.
Test code and application code share the same runtime.

Example

Application
     ↓
Browser Process
     ↓
Cypress Test Code

Why we need it

Direct access to DOM.
Fast communication.

Problem it solves

Eliminates external driver communication.

Tool Example : Cypress
-------------------------------------------------------------------------------------
2. Out-of-Process Automation

What it is

Test code runs outside the browser.
Commands are sent to the browser through an external layer.

Example

Test Script
      ↓
WebDriver
      ↓
Browser Driver
      ↓
Browser

Why we need it?

Process isolation.
Browser independence.

Problem it solves?

Standardized browser automation.

Tool Example : Selenium


------------------------------------------------------------------

Where Does Playwright Fit?
Playwright is Neither Pure In-Process Nor Pure Out-of-Process

Architecture :

Playwright Test
(Node.js Process)
        ↓
Playwright API
        ↓
WebSocket / CDP / Browser Protocol
        ↓
Browser Process
        ↓
Renderer Process

Notice:

Test code runs outside the browser ✅
No WebDriver/ChromeDriver ❌
Direct browser protocol communication ✅
Why People Call Playwright "Hybrid"

Because it combines advantages of both approaches.

From Out-of-Process

Playwright gets:

Process Isolation
Separate Test Runtime
Better Stability

Like Selenium.

From In-Process

Playwright gets:

Fast Communication
Real-time Events
Network Interception
Tracing
Auto Waiting

Like Cypress.
