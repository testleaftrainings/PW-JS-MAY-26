                    NODE TYPES REFERENCE
================================================================================

/// <reference types="node" />

WHAT IT DOES:
--------------------------------------------------------------------------------
This tells TypeScript to include Node.js type definitions so things like
process are recognized.

WHY YOU GET ERROR WITHOUT IT:
--------------------------------------------------------------------------------
In your config, you're using:
process.env.CI

process is a Node.js global, not a browser/JS standard.
TypeScript doesn't automatically know about Node globals unless you tell it.

So without this line:
/// <reference types="node" />

TypeScript thinks:
❌ Cannot find name 'process'

WHAT THIS LINE ACTUALLY DOES:
--------------------------------------------------------------------------------
It pulls in types from @types/node which defines things like:
• process
• __dirname
• Buffer
• fs, path, etc.

WHERE TO ADD:
--------------------------------------------------------------------------------
// playwright.config.ts
/// <reference types="node" />
import { defineConfig } from '@playwright/test';

export default defineConfig({
  // config here
});


