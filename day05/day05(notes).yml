================================================================================
                    PLAYWRIGHT LOCATOR - DEEP DIVE
================================================================================

METHOD SIGNATURE
================================================================================

page.locator(selector): Locator

RETURN TYPE: Locator (NOT Element, HTMLElement, ElementHandle, or Array)

It always returns a Locator object.


WHAT IS A LOCATOR?
================================================================================

A Locator is a smart object that knows:
  • How to find an element
  • When to find an element
  • How to retry finding an element

EXAMPLE:
--------------------------------------------------------------------------------
const username = page.locator('#username');

At this point:
  • No DOM lookup happened
  • No element was found yet
  • Only a Locator object is created


LAZY EVALUATION
================================================================================

const username = page.locator('#username');

Playwright stores: "Whenever needed, find element matching #username"

Actual lookup happens here:
await username.fill('admin');


SCENARIO 1: EXACTLY ONE ELEMENT MATCHES
================================================================================

DOM:
<input id="username">

CODE:
--------------------------------------------------------------------------------
const username = page.locator('#username');
await username.fill('admin');

PLAYWRIGHT FLOW:
--------------------------------------------------------------------------------
Locator → Find matching elements → Found 1 element → Perform action

RESULT: SUCCESS


SCENARIO 2: MULTIPLE ELEMENTS MATCH
================================================================================

DOM:
<button>Login</button>
<button>Login</button>

CODE:
--------------------------------------------------------------------------------
await page.locator('button').click();

PLAYWRIGHT FLOW:
--------------------------------------------------------------------------------
Locator → Find matching elements → Found 2 elements → click() requires ONE element

RESULT: STRICT MODE VIOLATION

ERROR:
locator('button') resolved to 2 elements


SCENARIO 3: NO ELEMENTS MATCH
================================================================================

DOM: (No matching element)

CODE:
--------------------------------------------------------------------------------
await page.locator('#username').fill('admin');

PLAYWRIGHT FLOW:
--------------------------------------------------------------------------------
Auto Wait → Retry → Retry → Retry → Timeout

RESULT: Timeout Error


BUT WAIT... LOCATOR CAN REPRESENT MULTIPLE ELEMENTS!
================================================================================

EXAMPLE:
const buttons = page.locator('button');

DOM:
<button>Save</button>
<button>Delete</button>
<button>Cancel</button>

Locator contains: 3 matching elements

NO ERROR YET! Because const buttons = page.locator('button'); is only creating
a Locator.


WHEN DOES ERROR HAPPEN?
================================================================================

When you perform an action requiring uniqueness.

EXAMPLE:
await buttons.click();

Now: 3 buttons found → Error: Strict Mode Violation


HOW TO HANDLE MULTIPLE ELEMENTS?
================================================================================

METHOD           | EXAMPLE                                                    |
-----------------|------------------------------------------------------------|
first()          | await page.locator('button').first().click();              |
last()           | await page.locator('button').last().click();               |
nth()            | await page.locator('button').nth(1).click();               |
all()            | const buttons = await page.locator('button').all();        |
                 | Returns: Locator[]                                         |
count()          | const count = await page.locator('button').count();        |
                 | Returns: number (e.g., 3)                                  |


COMMON INTERVIEW QUESTIONS
================================================================================

Q: Does page.locator() return the element?
--------------------------------------------------------------------------------
A: NO. page.locator() returns a Locator, which is a query object, not the
   actual element.

Q: Does locator immediately find the element?
--------------------------------------------------------------------------------
A: NO. Locator uses Lazy Evaluation. The actual DOM lookup happens only when
   an action or assertion is executed.

Q: What if locator matches multiple elements?
--------------------------------------------------------------------------------
A: Locator creation succeeds. If an action like click() or fill() is performed,
   Playwright throws a Strict Mode Violation because the action requires a
   single unique element. To work with multiple matches, use first(), last(),
   nth(), count(), or all().


MENTAL MODEL
================================================================================

const locator = page.locator('button');

Think of it as:

  "I know HOW to find the button, but I won't search for it until you ask me
   to do something."


QUICK REFERENCE TABLE
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Scenario                    │ Behavior                                       │
├─────────────────────────────┼────────────────────────────────────────────────┤
│ Creating Locator            │ No DOM lookup (Lazy Evaluation)               │
│ 1 element matches           │ Action succeeds                                │
│ Multiple elements match     │ Strict Mode Violation on action               │
│ No elements match           │ Auto-wait + Retry → Timeout                   │
│ .first() / .last() / .nth() │ Returns new Locator for specific element      │
│ .all()                      │ Returns array of Locator objects              │
│ .count()                    │ Returns number of matching elements           │
└─────────────────────────────┴────────────────────────────────────────────────┘


ONE-LINE TAKEAWAY (INTERVIEW READY)
================================================================================

"page.locator() returns a Locator object, not an element. It uses lazy
evaluation, meaning actual DOM lookup happens only when an action or assertion
is performed. If multiple elements match, actions requiring uniqueness throw
a Strict Mode Violation."

