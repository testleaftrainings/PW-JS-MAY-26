CSS Selectors in Playwright
What is a CSS Selector?

CSS Selectors are patterns used to locate HTML elements based on:

Tag Name
ID
Class
Attribute
Attribute Value
Partial Attribute Value

In Playwright:

await page.locator('css-selector');

Example:

await page.locator('#username');

Understanding the Building Blocks

Consider the element:

<input id="username"
       class="input-field"
       name="userName"
       type="text"
       placeholder="Enter Username">

Part	        Value
--------------------------
Tag Name	input
ID Attribute	id
ID Value	username
Class Attribute	class
Class Value	input-field
Name Attribute	name
Name Value	userName
Type Attribute	type
Type Value	text


1. ID Selector (#)
-------------------------
Syntax
#attributeValue

or

tagName#attributeValue

Breakdown  : input#username

Part		Meaning
-------------------------
input		Tag Name
#		Represents ID
username	ID Value

HTML

<input id="username">

Playwright

await page.locator('#username');

await page.locator('input#username');

2. Class Selector (.)
-------------------------
Syntax
.classValue

or

tagName.classValue

Breakdown :	button.btn-primary

Part		Meaning
-------------------------
button		Tag Name
.		Represents Class
btn-primary	Class Value

HTML

<button class="btn-primary">

Playwright

await page.locator('.btn-primary');

await page.locator('button.btn-primary');

3. Attribute Selector ([])
-------------------------
Syntax
tagName[attribute='value']

Breakdown :	input[name='username']

Part		Meaning
-------------------------
input		Tag Name
name		Attribute Name
username	Attribute Value

HTML

<input name="username">

Playwright

await page.locator("input[name='username']");


4. Combining Multiple Attributes
---------------------------------

When one attribute is not enough to uniquely identify an element.

Syntax

tagName[attribute1='value1'][attribute2='value2']

Example

input[name='username'][type='text']

Part		Meaning
-------------------------
input		Tag Name
name		Attribute 1
username	Attribute 1 Value
type		Attribute 2
text		Attribute 2 Value

Playwright

await page.locator("input[name='username'][type='text']");


Combining ID and Attribute
-------------------------
Syntax
tagName#idValue[attribute='value']

Example

a#crmLink[href='/crmsfa/control/main']

Part		Meaning
-------------------------
a		Tag Name
#crmLink	ID Value
href		Attribute
/crmsfa/	Attribute Value

Playwright

await page.locator("a#crmLink[href='/crmsfa/control/main']");

5. Substring Matching
-------------------------

Used when values are dynamic.

Example:

<input id="user_12345">

Tomorrow:

<input id="user_67890">

Exact ID matching will fail.

A) Starts With (^=)
-------------------------
Syntax
tagName[attribute^='prefix']

Example :	input[id^='user_']

Part	Meaning
-------------------------
input	Tag Name
id	Attribute
^=	Starts With
user_	Prefix

Matches:

<input id="user_12345">
<input id="user_56789">

Playwright

await page.locator("input[id^='user_']");

B) Ends With ($=)
-------------------------
Syntax
tagName[attribute$='suffix']

Example : input[id$='12345']

Part	Meaning
------------------
input	Tag Name
id	Attribute
$=	Ends With
12345	Suffix

Matches:

<input id="user_12345">

Playwright

await page.locator("input[id$='12345']");


C) Contains (*=)
-------------------------
Syntax

tagName[attribute*='substring']

Example :	input[id*='user']


Part	Meaning
-------------------------
input	Tag Name
id	Attribute
*=	Contains
user	Substring

Matches:

<input id="user_12345">
<input id="admin_user">

Playwright

await page.locator("input[id*='user']");

----------------------------------------------------------------------------------


Playwright locator methods :
----------------------------

nth(), first(), and last() are Playwright Locator API methods.

They help you choose which element to act on when a locator matches multiple elements.

Strict Mode Violation Error :
-----------------------------
When a locator matches more than one element, Playwright throws an error to prevent ambiguity.
To fix this, use nth(), first(), or last() to specify which element you want to interact with.

-------------------------------------------------------------------------------------
What is a page fixture :
------------------------
In Playwright, a page fixture is a predefined setup that provides a fresh browser page for each test. 
It ensures that tests run in isolation, preventing interference from previous tests. 
The page fixture is part of Playwright's test runner and is automatically available in test functions.

