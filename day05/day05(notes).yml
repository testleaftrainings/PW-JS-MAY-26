Advanced Relative Xpath Locators :
--------------------------
axes path : xpath based on relationship
1) parent to child 
syntax : // relative xpath of parent/ child tag
//p[@class='top']/label

2) child to parent
syntax : // relative xpath of child/parent::parent tag
//input[@id='password']/parent::p

3) GP to GC
syntax : // relative xpath of grand parent//Grand child tag
//form[@id='login']//label


4) GC to GP
syntax : // relative xpath of grand child / ancestor:: grand parent tag
//input[@class='decorativeSubmit']/ancestor::form

5) elder sibling  to younger 
syntax : // relative xpath of elder sibling / following-sibling:: younger sibling tag
//label[text()='Username']/following-sibling::input

6)younger to elder sibling  
syntax : // relative xpath of younger sibling / preceding-sibling::   tag of elder sibling
//input[@id='username']/preceding-sibling::label


