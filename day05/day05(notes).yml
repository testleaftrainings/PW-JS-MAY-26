================================================================================
                              PLAYWRIGHT LOCATORS
================================================================================

INTRODUCTION
================================================================================

Locators are the central piece of Playwright's auto-waiting and retry-ability.
In a nutshell, locators represent a way to find element(s) on the page at any
moment.


QUICK GUIDE - RECOMMENDED BUILT-IN LOCATORS
================================================================================

┌─────────────────────────────────────────────────────────────────────────────┐
│ Locator Method              │ Description                                    │
├─────────────────────────────┼────────────────────────────────────────────────┤
│ page.getByRole()            │ Locate by explicit/implicit accessibility      │
│ page.getByText()            │ Locate by text content                         │
│ page.getByLabel()           │ Locate form control by associated label text   │
│ page.getByPlaceholder()     │ Locate input by placeholder attribute          │
│ page.getByAltText()         │ Locate element (usually image) by alt text     │
│ page.getByTitle()           │ Locate element by title attribute              │
│ page.getByTestId()          │ Locate element by data-testid attribute        │
└─────────────────────────────┴────────────────────────────────────────────────┘

EXAMPLE USAGE:
--------------------------------------------------------------------------------
await page.getByLabel('User Name').fill('John');
await page.getByLabel('Password').fill('secret-password');
await page.getByRole('button', { name: 'Sign in' }).click();
await expect(page.getByText('Welcome, John!')).toBeVisible();


LOCATING ELEMENTS
================================================================================

Playwright comes with multiple built-in locators. To make tests resilient,
prioritize user-facing attributes and explicit contracts such as getByRole().

DOM Example:
--------------------------------------------------------------------------------
<button>Sign in</button>

Locator:
--------------------------------------------------------------------------------
await page.getByRole('button', { name: 'Sign in' }).click();



LOCATOR RE-USE (Dynamic Element Location)
--------------------------------------------------------------------------------
Every time a locator is used for an action, an up-to-date DOM element is
located. If the DOM changes between calls, the new element is used.

const locator = page.getByRole('button', { name: 'Sign in' });
await locator.hover();
await locator.click();


LOCATE BY ROLE
================================================================================

The getByRole() locator reflects how users and assistive technology perceive
the page. When locating by role, you should usually pass the accessible name.

DOM Example:
--------------------------------------------------------------------------------
<h3>Sign up</h3>
<label>
  <input type="checkbox" /> Subscribe
</label>
<br/>
<button>Submit</button>

Locators:
--------------------------------------------------------------------------------
await expect(page.getByRole('heading', { name: 'Sign up' })).toBeVisible();
await page.getByRole('checkbox', { name: 'Subscribe' }).check();
await page.getByRole('button', { name: 'submit'}).click();

Role locators include: buttons, checkboxes, headings, links, lists, tables, etc.
They follow W3C specifications for ARIA role, attributes, and accessible name.

WHEN TO USE ROLE LOCATORS:
Prioritize role locators as they align with user and assistive technology
perception.


LOCATE BY LABEL
================================================================================

Most form controls have dedicated labels. Use getByLabel() to locate by
associated label text.

DOM Example:
--------------------------------------------------------------------------------
<label>Password <input type="password" /></label>

Locator:
--------------------------------------------------------------------------------
await page.getByLabel('Password').fill('secret');

WHEN TO USE LABEL LOCATORS:
Use for locating form fields.


LOCATE BY PLACEHOLDER
================================================================================

Inputs may have a placeholder attribute. Use getByPlaceholder().

DOM Example:
--------------------------------------------------------------------------------
<input type="email" placeholder="name@example.com" />

Locator:
--------------------------------------------------------------------------------
await page.getByPlaceholder('name@example.com').fill('playwright@microsoft.com');

WHEN TO USE PLACEHOLDER LOCATORS:
Use for form elements without labels but with placeholder text.


LOCATE BY TEXT
================================================================================

Find an element by its text content using getByText(). Supports substring,
exact string, or regular expression.

DOM Example:
--------------------------------------------------------------------------------
<span>Welcome, John</span>

Locators:
--------------------------------------------------------------------------------
await expect(page.getByText('Welcome, John')).toBeVisible();
await expect(page.getByText('Welcome, John', { exact: true })).toBeVisible();
await expect(
    page.getByText(/welcome, [A-Za-z ]+$/i)
).toBeVisible();
NOTE:
Matching by text normalizes whitespace (multiple spaces → one, line breaks →
spaces, trims leading/trailing whitespace).

WHEN TO USE TEXT LOCATORS:
Use for non-interactive elements (div, span, p, etc.). For interactive elements
(button, a, input), use role locators. Also useful for filtering items in lists.


LOCATE BY ALT TEXT
================================================================================

Images should have alt attribute. Use getByAltText() to locate by text
alternative.

DOM Example:
--------------------------------------------------------------------------------
<img alt="playwright logo" src="/img/playwright-logo.svg" width="100" />

Locator:
--------------------------------------------------------------------------------
await page.getByAltText('playwright logo').click();

WHEN TO USE ALT LOCATORS:
Use for elements supporting alt text (img, area).


LOCATE BY TITLE
================================================================================

Locate an element with a matching title attribute using getByTitle().

DOM Example:
--------------------------------------------------------------------------------
<span title='Issues count'>25 issues</span>

Locator:
--------------------------------------------------------------------------------
await expect(page.getByTitle('Issues count')).toHaveText('25 issues');

WHEN TO USE TITLE LOCATORS:
Use when the element has a title attribute.


LOCATE BY TEST ID
================================================================================

Testing by test ids is the most resilient way. QA and developers define explicit
test ids and query with getByTestId(). However, it's not user-facing.

DOM Example:
--------------------------------------------------------------------------------
<button data-testid="directions">Itinéraire</button>

Locator:
--------------------------------------------------------------------------------
await page.getByTestId('directions').click();

WHEN TO USE TESTID LOCATORS:
Use when choosing the test id methodology or when role/text locators are not
feasible.

SET A CUSTOM TEST ID ATTRIBUTE:
--------------------------------------------------------------------------------
By default, getByTestId() uses data-testid. Configure a custom attribute in
playwright.config.ts:

import { defineConfig } from '@playwright/test';

export default defineConfig({
  use: {
    testIdAttribute: 'data-pw'
  }
});

Now use in HTML:
<button data-pw="directions">Itinéraire</button>

Locator (same usage):
await page.getByTestId('directions').click();


CHAINING LOCATORS
--------------------------------------------------------------------------------
All locator creation methods are also available on Locator and FrameLocator
classes, allowing chaining and iterative narrowing.

const locator = page
    .frameLocator('#my-frame')
    .getByRole('button', { name: 'Sign in' });
await locator.click();



NOTE:
Use the code generator to generate a locator, then edit it as needed.

