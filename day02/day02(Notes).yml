Topic: Iteration Statements (JavaScript)
Focus: for, while, do...while

==================================================

FOR LOOP – Behaviour Notes
==================================================

Definition
Used when the number of iterations is known or count-controlled.

Execution Behaviour
• Executes in three parts: initialization → condition → increment/decrement
• Condition is checked before each iteration
• Stops when condition becomes false
• Suitable for counter-based repetition

Structure

for (initialization; condition; increment) {
   // repeated block
}

Flow Order

Initialization runs once
Condition checked
Block executes if true
Increment runs
Condition rechecked

Key Characteristics
• Best for fixed iteration count
• Loop variable usually declared inside
• Clear and compact structure
• Risk of infinite loop if condition never becomes false

Use Cases
• Iterating arrays
• Number-based loops
• Index-controlled logic

==================================================
2) WHILE LOOP – Behaviour Notes

Definition
Used when number of iterations is unknown and depends on condition.

Execution Behaviour
• Condition checked first
• Executes only if condition is true
• May execute zero times

Structure

while (condition) {
   // repeated block
}

Flow Order

Condition checked
If true → block executes
After execution → condition rechecked

Key Characteristics
• Entry-controlled loop
• Best for dynamic conditions
• Must manually control increment inside block
• High risk of infinite loop if update missing

Use Cases
• Waiting for user input
• Polling mechanism
• Conditional repetition

==================================================
3) DO...WHILE LOOP – Behaviour Notes

Definition
Executes block at least once, regardless of condition.

Execution Behaviour
• Block executes first
• Condition checked after execution
• Continues if condition is true

Structure

do {
   // repeated block
} while (condition);

Flow Order

Block executes
Condition checked
If true → repeat

Key Characteristics
• Exit-controlled loop
• Guaranteed minimum one execution
• Useful for validation scenarios

Use Cases
• Menu-driven programs
• Input validation
• Retry mechanisms

==================================================

STRING – Core Behaviour Notes
==================================================

Definition
A String is an immutable sequence of characters.

Key Behaviour
• Strings are primitive data types
• Strings are immutable (cannot modify original value)
• All string methods return a new string
• Index starts from 0

Example Concept

"Playwright"
P = index 0

==================================================
1) slice() – Behaviour Notes

Definition
Used to extract a portion of a string.

Structure

string.slice(startIndex, endIndex)

Execution Behaviour
• Returns a new string
• End index is excluded
• Supports negative index
• Does NOT modify original string

Important Characteristics

• startIndex → position to begin extraction
• endIndex → position to stop (not included)
• If endIndex not given → extracts till end
• Negative index counts from end of string

Negative Index Behaviour

-1 → last character
-2 → second last

Key Usage Scenarios

• Extracting first few characters
• Removing last character
• Trimming file extensions
• Substring extraction

Why slice() is powerful

• Supports negative indexing
• More flexible than substring()
• Predictable behaviour

Regular Expression's

https://www.programiz.com/javascript/regex

[^abc] means any character except a or b or c.

[^0-9] means any non-digit character.

