Topic: Conditional Statements (JavaScript)

==================================================

IF STATEMENT – Behaviour Notes
==================================================

Definition
Used to evaluate logical conditions (true / false).

Execution Behaviour
• Evaluates condition expression
• Executes block only if condition is true
• Supports relational and logical operators
• Multiple conditions supported
• Executes top-to-bottom

Falsy Values in JavaScript:Only 8 values are falsy.

false
0
-0
0n
""
null
undefined
NaN

Key Characteristics
• Can evaluate complex expressions
• Best suited for range-based conditions
• Uses >, <, >=, <=, &&, ||
• Stops after first true condition
• Flexible and dynamic

Example Use Cases
• Marks grading system
• Age validation
• Tax slab calculation
• Form validation logic


==================================================
2) SWITCH STATEMENT – Behaviour Notes

Definition
Used for exact value matching.

Execution Behaviour
• Evaluates expression once
• Compares using strict equality (===)
• Matches only exact values
• Executes matching case block
• Requires break to stop fall-through

Structure :
switch (expression) {
   case value1:
      // executes if expression === value1
      break;
   case value2:
      break;
   default:
      // executes if no match
}

