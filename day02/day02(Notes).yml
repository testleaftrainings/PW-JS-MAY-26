Topic: Variables in JavaScript
Focus: let and const

==================================================

LET – Behaviour Notes
==================================================

Definition
Used to declare a block-scoped variable.

Scope Behaviour
• Block-scoped ({ })
• Accessible only within the block where declared
• Not accessible outside the block

Example Structure

let variableName = value;

Key Characteristics
• Can be reassigned
• Cannot be redeclared in the same scope
• Best used when value will change

Reassignment Behaviour
• Allowed
• Useful for counters and dynamic values

Redeclaration Behaviour
• Not allowed in the same scope
• Prevents accidental duplicate declarations

Temporal Dead Zone (TDZ)
• Cannot access before declaration
• Causes ReferenceError

Use Cases
• Loop counters
• Conditional updates
• Dynamic data handling

==================================================
2) CONST – Behaviour Notes

Definition
Used to declare a block-scoped constant variable.

Scope Behaviour
• Block-scoped ({ })
• Accessible only within declared block

Example Structure

const variableName = value;

Key Characteristics
• Must be initialized at declaration
• Cannot be reassigned
• Cannot be redeclared in same scope

Reassignment Behaviour
• Not allowed
• Causes TypeError if attempted


Use Cases
• Configuration values
• Fixed references
• Constants
• API endpoints
• Base URLs

